<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 BEST AI AWARDS | 後台極簡控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --ai-cyan: #00f2ff; --ai-pink: #ff00d0; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0b1329; background-image: radial-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 0); background-size: 24px 24px; }
        .cyber-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(0, 242, 255, 0.15); transition: all 0.3s ease; }
        .cyber-card:hover { border-color: var(--ai-cyan); box-shadow: 0 0 20px rgba(0, 242, 255, 0.15); }
        .glow-text { text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        .cyber-select {
            background-color: #0f172a; border: 1px solid #334155; color: #f1f5f9;
            font-weight: bold; padding: 0.35rem 0.5rem; border-radius: 0.5rem; outline: none;
        }
        .cyber-select:focus, .cyber-textarea:focus {
            border-color: var(--ai-cyan); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen p-4 md:p-8">

    <!-- 🌟 新增：新預約頂部閃爍提示橫幅 -->
    <div id="new-order-banner" class="fixed top-4 left-1/2 transform -translate-x-1/2 -translate-y-10 z-50 bg-gradient-to-r from-cyan-500 to-blue-600 text-slate-950 font-black px-6 py-3.5 rounded-full shadow-[0_0_35px_rgba(0,242,255,0.6)] flex items-center gap-2.5 text-sm border-2 border-white/20 transition-all duration-500 opacity-0 pointer-events-none">
        <i class="fa-solid fa-bell animate-bounce text-lg"></i>
        <span>偵測到新預約！流水號已更新</span>
    </div>

    <!-- 全局常駐雙圖實體檔案選擇器 -->
    <input type="file" id="global-file-input-A" class="hidden" accept="image/*" />
    <input type="file" id="global-file-input-B" class="hidden" accept="image/*" />

    <header class="max-w-7xl mx-auto mb-8 flex flex-col sm:flex-row justify-between items-center border-b border-cyan-500/20 pb-4 gap-4">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-cyan-400 animate-ping"></div>
            <h1 class="text-2xl font-black tracking-wider text-white">智慧創新大賞 <span class="text-cyan-400 font-mono text-lg">LITE CONTROL CORE</span></h1>
        </div>
        
        <!-- 🌟 右側按鈕控制區：新增「音效啟動/解鎖」開關 -->
        <div class="flex items-center gap-3">
            <button id="sound-toggle" onclick="toggleSound()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold px-4 py-2 rounded-lg text-sm flex items-center gap-2 border border-slate-700 transition-all">
                <i id="sound-icon" class="fa-solid fa-volume-xmark text-rose-500"></i> <span id="sound-text">啟用音效提示</span>
            </button>
            <button onclick="fetchAllTasks()" class="bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold px-4 py-2 rounded-lg text-sm transition flex items-center gap-2 shadow-[0_0_15px_rgba(0,242,255,0.3)]">
                <i class="fa-solid fa-arrows-rotate"></i> 重新整理數據
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="tasks-container" class="grid grid-cols-1 gap-6 transition-all duration-500"></div>
    </main>

    <script>
        const API_BASE_URL = "https://aicameraliveprint-back.onrender.com";
        let localTasksCache = {};
        let currentUploadTaskId = null;
        let soundEnabled = false; // 音效預設關閉 (遵循瀏覽器安全性規範)

        // 🌟 1. Web Audio API：精準合成「叮咚」二重奏聲音 (完全不需載入任何 .mp3 外部資源，0 延遲且保證不當機)
        function playDingDong() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                
                // 第一音「Ding」：高頻、清脆 (A5 階音)
                const osc1 = ctx.createOscillator();
                const gain1 = ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(880, ctx.currentTime); 
                gain1.gain.setValueAtTime(0.2, ctx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
                osc1.connect(gain1);
                gain1.connect(ctx.destination);
                osc1.start();
                osc1.stop(ctx.currentTime + 0.8);

                // 第二音「Dong」：延時 0.22 秒、中低頻、厚實 (F5 階音)
                const delay = 0.22;
                const osc2 = ctx.createOscillator();
                const gain2 = ctx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(698.46, ctx.currentTime + delay); 
                gain2.gain.setValueAtTime(0, ctx.currentTime);
                gain2.gain.setValueAtTime(0.2, ctx.currentTime + delay);
                gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 1.1);
                osc2.connect(gain2);
                gain2.connect(ctx.destination);
                osc2.start(ctx.currentTime + delay);
                osc2.stop(ctx.currentTime + delay + 1.1);
            } catch (e) {
                console.error("音效合成失敗:", e);
            }
        }

        // 🌟 2. 音效提示開啟與解鎖 (點擊時自動解鎖 AudioContext)
        function toggleSound() {
            soundEnabled = !soundEnabled;
            const icon = document.getElementById('sound-icon');
            const text = document.getElementById('sound-text');
            const btn = document.getElementById('sound-toggle');
            
            if (soundEnabled) {
                icon.className = "fa-solid fa-volume-high text-cyan-400";
                text.innerText = "音效提示：已啟用";
                btn.className = "bg-cyan-950/40 hover:bg-cyan-950/60 text-cyan-400 font-bold px-4 py-2 rounded-lg text-sm flex items-center gap-2 border border-cyan-400/50 shadow-[0_0_15px_rgba(0,242,255,0.2)]";
                // 順便發出一次測試音效，用以向瀏覽器登記音效授權
                playDingDong();
            } else {
                icon.className = "fa-solid fa-volume-xmark text-rose-500";
                text.innerText = "音效提示：已停用";
                btn.className = "bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold px-4 py-2 rounded-lg text-sm flex items-center gap-2 border border-slate-700";
            }
        }

        // 🌟 3. 觸發新單聲光雙重提醒
        function triggerNewOrderAlert() {
            // A. 音效叮咚聲
            if (soundEnabled) {
                playDingDong();
            }

            // B. 彈出頂部提示橫幅並發光
            const banner = document.getElementById('new-order-banner');
            if (banner) {
                banner.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-10');
                banner.classList.add('opacity-100', 'translate-y-0');

                // 讓卡片容器整體閃爍一下呼吸光圈
                const container = document.getElementById('tasks-container');
                if (container) {
                    container.classList.add('ring-4', 'ring-cyan-400/30', 'ring-offset-2', 'ring-offset-[#0b1329]');
                    setTimeout(() => {
                        container.classList.remove('ring-4', 'ring-cyan-400/30', 'ring-offset-2', 'ring-offset-[#0b1329]');
                    }, 1500);
                }

                // 3.5秒後自動隱藏橫幅
                setTimeout(() => {
                    banner.classList.remove('opacity-100', 'translate-y-0');
                    banner.classList.add('opacity-0', 'pointer-events-none', '-translate-y-10');
                }, 3500);
            }
        }

        async function updateTaskMeta(taskId, field, value) {
            const task = localTasksCache[taskId];
            if (task) {
                task[field] = value;
            }
        }

        function downloadSourceImage(taskId) {
            const task = localTasksCache[taskId];
            if (!task || !task.sourceImage) {
                alert("找不到該任務的原始客照！");
                return;
            }
            const link = document.createElement('a');
            link.href = task.sourceImage;
            link.download = `雷雕客照_#${taskId}.jpg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function downloadResultImage(taskId, choice) {
            const task = localTasksCache[taskId];
            if (!task) return;
            const base64Str = choice === 'A' ? task.resultImageA : task.resultImageB;
            if (!base64Str) {
                alert("圖片資料尚未同步，請稍後再試！");
                return;
            }
            const link = document.createElement('a');
            link.href = base64Str;
            link.download = `雷雕結果_#${taskId}_最終${choice}款.jpg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function triggerDualUpload(taskId, targetType) {
            currentUploadTaskId = taskId;
            document.getElementById(`global-file-input-${targetType}`).click();
        }

        ['A', 'B'].forEach(type => {
            document.getElementById(`global-file-input-${type}`).addEventListener('change', async function() {
                const taskId = currentUploadTaskId; if (!taskId || !this.files[0]) return;
                
                document.getElementById(`upload-status-${type}-${taskId}`).innerHTML = `<i class="fa-solid fa-spinner animate-spin text-cyan-400"></i>`;
                
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const bodyData = {}; bodyData[`resultImage${type}`] = e.target.result;
                    try {
                        const res = await fetch(`${API_BASE_URL}/api/admin/upload-result-dual/${taskId}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(bodyData)
                        });
                        if ((await res.json()).success) fetchAllTasks();
                    } catch (err) { alert("連線超時！"); fetchAllTasks(); }
                };
                reader.readAsDataURL(this.files[0]);
                this.value = "";
            });
        });

        // 🌟 4. 修改後的資料輪詢：智慧比對新 ID 並觸發通知
        async function fetchAllTasks() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/all-tasks`);
                const data = await res.json();
                if (data.success) {
                    let hasNewOrder = false;

                    data.tasks.forEach(t => { 
                        // 智慧判斷：如果快取中沒有此 ID 且不是網頁開機的第一次加載，視為「全新預約訂單」！
                        if (!localTasksCache[t.id]) {
                            if (Object.keys(localTasksCache).length > 0) {
                                hasNewOrder = true;
                            }
                            t.processStatus = '製作中';
                            t.remark = '';
                        } else {
                            t.processStatus = localTasksCache[t.id].processStatus;
                            t.remark = localTasksCache[t.id].remark;
                        }
                        localTasksCache[t.id] = t; 
                    });

                    // 重新渲染卡片
                    renderTasks(Object.values(localTasksCache).sort((a, b) => b.id.localeCompare(a.id)));
                    
                    // 如果有新預約，觸發聲光特效
                    if (hasNewOrder) {
                        triggerNewOrderAlert();
                    }
                }
            } catch (e) {}
        }

        function renderTasks(tasks) {
            const activeEl = document.activeElement;
            if (activeEl && (activeEl.tagName === 'TEXTAREA' || activeEl.tagName === 'SELECT')) {
                return;
            }

            const container = document.getElementById('tasks-container');
            if (tasks.length === 0) { 
                container.innerHTML = `<div class="text-center py-12 text-slate-500 border border-dashed border-slate-800 rounded-2xl">尚無排隊訂單</div>`; 
                return; 
            }

            container.innerHTML = tasks.map(task => {
                const currentStatus = task.processStatus || '製作中';
                const currentRemark = task.remark || '';

                const finalResultHtml = task.chosenDesign ? `
                    <span class="text-[10px] font-bold text-emerald-400 mb-1 text-center w-full block font-sans">🏆 客人已選: ${task.chosenDesign} 款</span>
                    <img src="${task.chosenDesign === 'A' ? task.resultImageA : task.resultImageB}" class="w-20 h-20 object-cover rounded-xl border-2 border-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.25)] mx-auto" />
                    <button onclick="downloadResultImage('${task.id}', '${task.chosenDesign}')" class="w-full mt-2 bg-emerald-900/60 hover:bg-emerald-800 text-emerald-400 font-bold py-1.5 px-2 rounded-lg text-[10px] transition-all flex items-center justify-center gap-1 border border-emerald-500/50">
                        <i class="fa-solid fa-download"></i> 下載雷雕圖
                    </button>
                ` : `
                    <span class="text-[10px] font-bold text-amber-400 animate-pulse text-center w-full block mb-1 font-sans"><i class="fa-solid fa-hourglass-half"></i> 等待選擇</span>
                    <div class="w-20 h-20 rounded-xl border-2 border-dashed border-slate-600 flex items-center justify-center text-slate-600 mx-auto">
                        <i class="fa-solid fa-image text-2xl"></i>
                    </div>
                `;

                return `
                <div class="cyber-card p-4 md:p-5 rounded-2xl flex flex-col md:flex-row gap-6 items-stretch relative overflow-hidden">
                    
                    <!-- 1. 號碼與原圖區 -->
                    <div class="flex flex-col items-center gap-2 w-full md:w-32 flex-shrink-0 md:border-r border-slate-700/50 md:pr-4">
                        <div class="text-center w-full">
                            <span class="text-[10px] font-mono tracking-widest text-cyan-400 block font-bold">QUEUE NO</span>
                            <span class="text-4xl font-black text-white font-mono glow-text">#${task.id}</span>
                            <div class="text-[9px] text-slate-500 font-mono mt-1">${task.createdAt || '--:--'}</div>
                        </div>
                        <div class="text-center relative w-full mt-1">
                            <img src="${task.sourceImage}" class="w-20 h-20 mx-auto object-cover rounded-xl border border-slate-700 bg-black shadow-inner" />
                            <button onclick="downloadSourceImage('${task.id}')" class="w-full mt-2 bg-slate-800 hover:bg-slate-700 text-cyan-400 font-bold py-1.5 px-2 rounded-lg text-[10px] transition-all flex items-center justify-center gap-1">
                                <i class="fa-solid fa-download"></i> 下載原照
                            </button>
                        </div>
                    </div>

                    <!-- 2. 上傳風格區 -->
                    <div class="flex flex-col gap-2 w-full md:w-40 flex-shrink-0 md:border-r border-slate-700/50 md:pr-4 justify-center">
                        <span class="text-[11px] font-bold text-slate-300 text-center mb-1"><i class="fa-solid fa-upload text-cyan-400 mr-1"></i> 上傳 AI 風格圖</span>
                        <div class="flex gap-3 justify-center">
                            <div class="text-center w-full">
                                <span class="text-[9px] block text-slate-400 mb-1 font-bold">A 款</span>
                                <button onclick="triggerDualUpload('${task.id}', 'A')" id="upload-status-A-${task.id}" class="w-full h-14 rounded-lg border border-dashed ${task.resultImageA ? 'border-emerald-500 bg-emerald-950/20' : 'border-cyan-500/40 bg-slate-900'} flex items-center justify-center text-[11px] cursor-pointer hover:bg-slate-800 transition-colors">
                                    ${task.resultImageA ? `<i class="fa-solid fa-check text-emerald-400 text-xl"></i>` : `<i class="fa-solid fa-plus text-cyan-400"></i>`}
                                </button>
                            </div>
                            <div class="text-center w-full">
                                <span class="text-[9px] block text-slate-400 mb-1 font-bold">B 款</span>
                                <button onclick="triggerDualUpload('${task.id}', 'B')" id="upload-status-B-${task.id}" class="w-full h-14 rounded-lg border border-dashed ${task.resultImageB ? 'border-emerald-500 bg-emerald-950/20' : 'border-cyan-500/40 bg-slate-900'} flex items-center justify-center text-[11px] cursor-pointer hover:bg-slate-800 transition-colors">
                                    ${task.resultImageB ? `<i class="fa-solid fa-check text-emerald-400 text-xl"></i>` : `<i class="fa-solid fa-plus text-cyan-400"></i>`}
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 3. 客人選擇結果區 -->
                    <div class="flex flex-col gap-1 w-full md:w-40 flex-shrink-0 md:border-r border-slate-700/50 md:pr-4 justify-center items-center">
                        ${finalResultHtml}
                    </div>

                    <!-- 4. 狀態控制與備註區 -->
                    <div class="flex-grow flex flex-col gap-3 min-w-[200px] justify-center">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 block mb-1">任務進度狀態</label>
                            <select onchange="updateTaskMeta('${task.id}', 'processStatus', this.value)" class="cyber-select w-full bg-slate-900 border border-slate-700 text-sm text-slate-200">
                                <option value="製作中" ${currentStatus === '製作中' ? 'selected' : ''}>⏳ 製作中</option>
                                <option value="已完成" ${currentStatus === '已完成' ? 'selected' : ''}>✅ 已完成</option>
                                <option value="已取消" ${currentStatus === '已取消' ? 'selected' : ''}>❌ 已取消</option>
                            </select>
                        </div>
                        <div class="flex-grow flex flex-col">
                            <label class="text-[10px] font-bold text-slate-400 block mb-1">任務備註事項</label>
                            <textarea onchange="updateTaskMeta('${task.id}', 'remark', this.value)" placeholder="點此輸入備註 (輸入完點擊旁邊即可自動儲存)..." class="cyber-textarea w-full flex-grow min-h-[60px] bg-slate-900 text-slate-200 p-2.5 rounded-lg border border-slate-700 text-xs resize-none transition-all leading-relaxed">${currentRemark}</textarea>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // 啟動定時輪詢
        fetchAllTasks();
        setInterval(fetchAllTasks, 3200);
    </script>
</body>
</html>
