<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 BEST AI AWARDS | 後台極簡控制台</title>
    <!-- 100% 還原您最喜愛、最漂亮的 Tailwind 科技霓虹黑客風格 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --ai-cyan: #00f2ff; --ai-pink: #ff00d0; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0b1329; background-image: radial-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 0); background-size: 24px 24px; }
        .cyber-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(0, 242, 255, 0.15); transition: all 0.3s ease; }
        .cyber-card:hover { border-color: var(--ai-cyan); box-shadow: 0 0 20px rgba(0, 242, 255, 0.15); }
        .glow-text { text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        .cyber-select {
            background-color: #0f172a; border: 1px solid #334155; color: #f1f5f9;
            font-weight: bold; padding: 0.35rem 0.5rem; border-radius: 0.5rem; outline: none;
        }
        .cyber-select:focus, .cyber-textarea:focus {
            border-color: var(--ai-cyan); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen p-4 md:p-8">

    <!-- 新預約頂部閃爍提示橫幅 -->
    <div id="new-order-banner" class="fixed top-4 left-1/2 transform -translate-x-1/2 -translate-y-10 z-50 bg-gradient-to-r from-cyan-500 to-blue-600 text-slate-950 font-black px-6 py-3.5 rounded-full shadow-[0_0_35px_rgba(0,242,255,0.6)] flex items-center gap-2.5 text-sm border-2 border-white/20 transition-all duration-500 opacity-0 pointer-events-none">
        <i class="fa-solid fa-bell animate-bounce text-lg"></i>
        <span>偵測到新預約！流水號已更新</span>
    </div>

    <!-- 自訂科技霓虹重製確認彈窗 (100% 免除 iframe 對瀏覽器 confirm 的阻擋，極致流暢) -->
    <div id="reset-confirm-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300">
        <div class="bg-slate-900 border-2 border-rose-500 rounded-2xl p-6 max-w-sm w-full mx-4 shadow-[0_0_35px_rgba(239,68,68,0.4)] text-center">
            <div class="w-16 h-16 rounded-full bg-rose-500/10 border-2 border-rose-500 flex items-center justify-center mx-auto mb-4 text-rose-400 text-2xl animate-pulse">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h3 class="text-xl font-black text-white tracking-wider mb-2">確定要重製排隊嗎？</h3>
            <p class="text-xs text-slate-400 leading-relaxed mb-6">此動作將會<span class="text-rose-400 font-bold">永久刪除雲端與本地所有的預約訂單</span>，並將下一位排隊號碼歸零為 <span class="text-cyan-400 font-bold">001</span>！本動作不可還原。</p>
            <div class="flex gap-4">
                <button onclick="closeResetModal()" class="flex-1 bg-slate-800 hover:bg-slate-750 text-slate-300 font-bold py-2.5 rounded-lg text-sm transition border border-slate-700">
                    取消
                </button>
                <button id="modal-confirm-reset-btn" onclick="executeResetAll()" class="flex-grow bg-rose-600 hover:bg-rose-500 text-white font-bold py-2.5 rounded-lg text-sm transition shadow-[0_0_15px_rgba(239,68,68,0.4)]">
                    確認重製
                </button>
            </div>
        </div>
    </div>

    <!-- 全局常駐雙圖實體檔案選擇器 -->
    <input type="file" id="global-file-input-A" class="hidden" accept="image/*" />
    <input type="file" id="global-file-input-B" class="hidden" accept="image/*" />

    <header class="max-w-7xl mx-auto mb-8 flex flex-col sm:flex-row justify-between items-center border-b border-cyan-500/20 pb-4 gap-4">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-cyan-400 animate-ping"></div>
            <h1 class="text-2xl font-black tracking-wider text-white">智慧創新大賞 <span class="text-cyan-400 font-mono text-lg">LITE CONTROL CORE</span></h1>
        </div>
        
        <!-- 右側按鈕控制區 -->
        <div class="flex flex-wrap items-center gap-3">
            <!-- 🔌 雲端出票機實時狀態檢測 -->
            <button id="printer-check-btn" onclick="checkPrinterStatus()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-4 py-2 rounded-lg text-sm transition flex items-center gap-2 border border-indigo-500/50 shadow-[0_0_15px_rgba(99,102,241,0.2)]">
                <i class="fa-solid fa-print"></i> <span id="printer-status-text">檢測出票機狀態</span>
            </button>

            <!-- Web Audio API 純內建防斷線音效提示 -->
            <button id="sound-toggle" onclick="toggleSound()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold px-4 py-2 rounded-lg text-sm flex items-center gap-2 border border-slate-700 transition-all">
                <i id="sound-icon" class="fa-solid fa-volume-xmark text-rose-500"></i> <span id="sound-text">啟用音效提示</span>
            </button>

            <!-- 🔄 重新整理數據 -->
            <button onclick="fetchAllTasks()" class="bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold px-4 py-2 rounded-lg text-sm transition flex items-center gap-2 shadow-[0_0_15px_rgba(0,242,255,0.3)]">
                <i class="fa-solid fa-arrows-rotate"></i> 重新整理數據
            </button>

            <!-- 🧹 🌟 新增：危險紅區重製按鈕 (含自訂霓虹確認彈窗) -->
            <button onclick="openResetModal()" class="bg-rose-950/40 hover:bg-rose-900/60 text-rose-400 font-bold px-4 py-2 rounded-lg text-sm transition flex items-center gap-2 border border-rose-500/40 shadow-[0_0_15px_rgba(244,63,94,0.15)]">
                <i class="fa-solid fa-trash-can"></i> 重製所有排隊
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="tasks-container" class="grid grid-cols-1 gap-6 transition-all duration-500"></div>
    </main>

    <script>
        const API_BASE_URL = "https://aicameraliveprint-back.onrender.com";
        let localTasksCache = {};
        let currentUploadTaskId = null;
        let soundEnabled = false;

        function playDingDong() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                
                const osc1 = ctx.createOscillator();
                const gain1 = ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(880, ctx.currentTime); 
                gain1.gain.setValueAtTime(0.2, ctx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
                osc1.connect(gain1);
                gain1.connect(ctx.destination);
                osc1.start();
                osc1.stop(ctx.currentTime + 0.8);

                const delay = 0.22;
                const osc2 = ctx.createOscillator();
                const gain2 = ctx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(698.46, ctx.currentTime + delay); 
                gain2.gain.setValueAtTime(0, ctx.currentTime);
                gain2.gain.setValueAtTime(0.2, ctx.currentTime + delay);
                gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 1.1);
                osc2.connect(gain2);
                gain2.connect(ctx.destination);
                osc2.start(ctx.currentTime + delay);
                osc2.stop(ctx.currentTime + delay + 1.1);
            } catch (e) {
                console.error("音效合成失敗:", e);
            }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const icon = document.getElementById('sound-icon');
            const text = document.getElementById('sound-text');
            const btn = document.getElementById('sound-toggle');
            
            if (soundEnabled) {
                icon.className = "fa-solid fa-volume-high text-cyan-400";
                text.innerText = "音效提示：已啟用";
                btn.className = "bg-cyan-950/40 hover:bg-cyan-950/60 text-cyan-400 font-bold px-4 py-2 rounded-lg text-sm flex items-center gap-2 border border-cyan-400/50 shadow-[0_0_15px_rgba(0,242,255,0.2)]";
                playDingDong();
            } else {
                icon.className = "fa-solid fa-volume-xmark text-rose-500";
                text.innerText = "音效提示：已停用";
                btn.className = "bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold px-4 py-2 rounded-lg text-sm flex items-center gap-2 border border-slate-700";
            }
        }

        // 🔌 實時向後端查詢飛鵝雲端印表機狀態
        async function checkPrinterStatus() {
            const btn = document.getElementById('printer-check-btn');
            const text = document.getElementById('printer-status-text');
            const icon = btn.querySelector('i');
            
            text.innerText = "正在聯絡飛鵝雲端...";
            btn.disabled = true;
            
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/printer-status`);
                const data = await res.json();
                if (data.success && data.data) {
                    const statusText = data.data.data.toLowerCase(); 
                    text.innerText = `狀態：${data.data.data}`;
                    
                    if (statusText.includes("在线") || statusText.includes("normal") || statusText.includes("online") || statusText.includes("ok")) {
                        btn.className = "bg-emerald-950/40 text-emerald-400 font-bold px-4 py-2 rounded-lg text-sm flex items-center gap-2 border border-emerald-400/50 shadow-[0_0_15px_rgba(16,185,129,0.25)]";
                        icon.className = "fa-solid fa-circle-check";
                    } else {
                        btn.className = "bg-rose-950/40 text-rose-400 font-bold px-4 py-2 rounded-lg text-sm flex items-center gap-2 border border-rose-400/50 shadow-[0_0_15px_rgba(244,63,94,0.25)]";
                        icon.className = "fa-solid fa-triangle-exclamation";
                    }
                } else {
                    text.innerText = `連線錯誤 (請檢查 API 金鑰)`;
                    btn.className = "bg-rose-950/40 text-rose-400 font-bold px-4 py-2 rounded-lg text-sm flex items-center gap-2 border border-rose-400/50";
                    icon.className = "fa-solid fa-circle-xmark";
                }
            } catch (err) {
                text.innerText = "無法聯絡 Render 後端";
                btn.className = "bg-rose-950/40 text-rose-400 font-bold px-4 py-2 rounded-lg text-sm flex items-center gap-2 border border-rose-400/50";
                icon.className = "fa-solid fa-circle-xmark";
            }
            
            setTimeout(() => {
                btn.disabled = false;
                text.innerText = "檢測出票機狀態";
                btn.className = "bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-4 py-2 rounded-lg text-sm transition flex items-center gap-2 border border-indigo-500/50 shadow-[0_0_15px_rgba(99,102,241,0.2)]";
                icon.className = "fa-solid fa-print";
            }, 4000);
        }

        // 🌟 智慧前端畫布壓縮引擎
        function compressAndResizeImage(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const max_size = 1024; 

                    if (width > height) {
                        if (width > max_size) {
                            height *= max_size / width;
                            width = max_size;
                        }
                    } else {
                        if (height > max_size) {
                            width *= max_size / height;
                            height = max_size;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.85);
                    callback(compressedBase64);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function triggerNewOrderAlert() {
            if (soundEnabled) {
                playDingDong();
            }
            const banner = document.getElementById('new-order-banner');
            if (banner) {
                banner.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-10');
                banner.classList.add('opacity-100', 'translate-y-0');

                const container = document.getElementById('tasks-container');
                if (container) {
                    container.classList.add('ring-4', 'ring-cyan-400/30', 'ring-offset-2', 'ring-offset-[#0b1329]');
                    setTimeout(() => {
                        container.classList.remove('ring-4', 'ring-cyan-400/30', 'ring-offset-2', 'ring-offset-[#0b1329]');
                    }, 1500);
                }

                setTimeout(() => {
                    banner.classList.remove('opacity-100', 'translate-y-0');
                    banner.classList.add('opacity-0', 'pointer-events-none', '-translate-y-10');
                }, 3500);
            }
        }

        // 🌟 控制重製彈窗顯示/隱藏
        function openResetModal() {
            const modal = document.getElementById('reset-confirm-modal');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modal.classList.add('opacity-100');
        }

        function closeResetModal() {
            const modal = document.getElementById('reset-confirm-modal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            modal.classList.remove('opacity-100');
        }

        // 🌟 執行重製
        async function executeResetAll() {
            const btn = document.getElementById('modal-confirm-reset-btn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> 正在重製...`;

            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/reset-all`, {
                    method: 'POST'
                });
                const data = await res.json();
                if (data.success) {
                    closeResetModal();
                    localTasksCache = {};
                    renderTasks([]);
                    showResetSuccessBanner();
                } else {
                    alert("重製失敗：" + (data.error || "未知錯誤"));
                }
            } catch (err) {
                console.error("重製請求失敗:", err);
                alert("無法連線至後端伺服器，請確認網路！");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        function showResetSuccessBanner() {
            const banner = document.getElementById('new-order-banner');
            const span = banner.querySelector('span');
            
            span.innerText = "🧹 所有排隊已重製清空，流水號回到 001！";
            banner.classList.remove('from-cyan-500', 'to-blue-600');
            banner.classList.add('from-rose-500', 'to-orange-500', 'shadow-[0_0_35px_rgba(244,63,94,0.6)]');
            
            banner.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-10');
            banner.classList.add('opacity-100', 'translate-y-0');

            setTimeout(() => {
                banner.classList.remove('opacity-100', 'translate-y-0');
                banner.classList.add('opacity-0', 'pointer-events-none', '-translate-y-10');
                
                setTimeout(() => {
                    span.innerText = "偵測到新預約！流水號已更新";
                    banner.classList.add('from-cyan-500', 'to-blue-600');
                    banner.classList.remove('from-rose-500', 'to-orange-500', 'shadow-[0_0_35px_rgba(244,63,94,0.6)]');
                }, 500);
            }, 4000);
        }

        async function updateTaskMeta(taskId, field, value) {
            const task = localTasksCache[taskId];
            if (task) {
                task[field] = value;
            }
        }

        // 🌟 核心增量優化：當需要下載原圖或風格圖時，如果本地快取尚未加載圖片，才單獨向伺服器發送一次請求，下載完成後完美同步回本地！
        async function fetchImagesOnDemand(taskId, callback) {
            const task = localTasksCache[taskId];
            if (!task) return;

            // 如果本地已經載過圖了，直接回呼
            if (task.sourceImage && (task.resultImageA || task.resultImageB)) {
                callback(task);
                return;
            }

            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/task-images/${taskId}`);
                const data = await res.json();
                if (data.success) {
                    task.sourceImage = data.sourceImage;
                    task.resultImageA = data.resultImageA;
                    task.resultImageB = data.resultImageB;
                    callback(task);
                }
            } catch (err) {
                console.error(`無法獲取任務 #${taskId} 的圖片資料:`, err);
            }
        }

        function downloadSourceImage(taskId) {
            fetchImagesOnDemand(taskId, (task) => {
                if (!task.sourceImage) {
                    alert("找不到該任務的原始客照！");
                    return;
                }
                const link = document.createElement('a');
                link.href = task.sourceImage;
                link.download = `雷雕客照_#${taskId}.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });
        }

        function downloadResultImage(taskId, choice) {
            fetchImagesOnDemand(taskId, (task) => {
                const base64Str = choice === 'A' ? task.resultImageA : task.resultImageB;
                if (!base64Str) {
                    alert("圖片資料尚未同步，請稍後再試！");
                    return;
                }
                const link = document.createElement('a');
                link.href = base64Str;
                link.download = `雷雕結果_#${taskId}_最終${choice}款.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });
        }

        function triggerDualUpload(taskId, targetType) {
            currentUploadTaskId = taskId;
            document.getElementById(`global-file-input-${targetType}`).click();
        }

        ['A', 'B'].forEach(type => {
            document.getElementById(`global-file-input-${type}`).addEventListener('change', async function() {
                const taskId = currentUploadTaskId; if (!taskId || !this.files[0]) return;
                
                document.getElementById(`upload-status-${type}-${taskId}`).innerHTML = `<i class="fa-solid fa-spinner animate-spin text-cyan-400"></i>`;
                
                compressAndResizeImage(this.files[0], async (compressedBase64) => {
                    const bodyData = {}; bodyData[`resultImage${type}`] = compressedBase64;
                    try {
                        const res = await fetch(`${API_BASE_URL}/api/admin/upload-result-dual/${taskId}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(bodyData)
                        });
                        if ((await res.json()).success) fetchAllTasks();
                    } catch (err) { alert("連線超時！"); fetchAllTasks(); }
                });
                this.value = "";
            });
        });

        // 重新補印：呼叫後端 API 驅動飛鵝雲端重新出票列印
        async function reprintTicket(taskId, btnId) {
            const btn = document.getElementById(btnId);
            const originalHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> 出票中...`;
            
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/reprint/${taskId}`, {
                    method: 'POST'
                });
                const data = await res.json();
                if (data.success) {
                    btn.innerHTML = `<i class="fa-solid fa-circle-check text-emerald-400"></i> 已出單`;
                    btn.className = "bg-emerald-950/40 border border-emerald-500/50 text-emerald-300 font-bold px-2 py-1.5 rounded-lg text-[10px] transition-all flex items-center justify-center gap-1";
                } else {
                    alert("補印失敗：" + (data.error || "請確認出票機 WiFi 與 Render 環境變數是否正確！"));
                    btn.innerHTML = originalHtml;
                }
            } catch (err) {
                console.error("補印連線錯誤:", err);
                alert("連線後端伺服器失敗，請檢查網路！");
                btn.innerHTML = originalHtml;
            } finally {
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fa-solid fa-print text-indigo-400"></i> 重新出票`;
                    btn.className = "bg-indigo-950/40 hover:bg-indigo-900 border border-indigo-500/50 text-indigo-300 font-bold px-2 py-1.5 rounded-lg text-[10px] transition-all flex items-center justify-center gap-1";
                }, 3000);
            }
        }

        // 🌟 增量優化：改為請求極輕量化的 all-tasks-lean API（完全剔除大圖，每次回傳僅 1KB）
        async function fetchAllTasks() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/all-tasks-lean`);
                const data = await res.json();
                if (data.success) {
                    let hasNewOrder = false;

                    data.tasks.forEach(t => { 
                        if (!localTasksCache[t.id]) {
                            if (Object.keys(localTasksCache).length > 0) {
                                hasNewOrder = true;
                            }
                            t.processStatus = '製作中';
                            t.remark = '';
                            
                            // 新訂單進來時，主動拉取一次該訂單的圖片（僅執行一次！）
                            fetchImagesOnDemand(t.id, () => {});
                        } else {
                            t.processStatus = localTasksCache[t.id].processStatus;
                            t.remark = localTasksCache[t.id].remark;
                            // 保持圖片緩存
                            t.sourceImage = localTasksCache[t.id].sourceImage;
                            t.resultImageA = localTasksCache[t.id].resultImageA;
                            t.resultImageB = localTasksCache[t.id].resultImageB;
                        }
                        localTasksCache[t.id] = t; 
                    });

                    renderTasks(Object.values(localTasksCache).sort((a, b) => b.id.localeCompare(a.id)));
                    
                    if (hasNewOrder) {
                        triggerNewOrderAlert();
                    }
                }
            } catch (e) {}
        }

        function renderTasks(tasks) {
            const activeEl = document.activeElement;
            if (activeEl && (activeEl.tagName === 'TEXTAREA' || activeEl.tagName === 'SELECT')) {
                return;
            }

            const container = document.getElementById('tasks-container');
            if (tasks.length === 0) { 
                container.innerHTML = `<div class="text-center py-12 text-slate-500 border border-dashed border-slate-800 rounded-2xl w-full">尚無排隊訂單</div>`; 
                return; 
            }

            container.innerHTML = tasks.map(task => {
                const currentStatus = task.processStatus || '製作中';
                const currentRemark = task.remark || '';

                const userChoiceHtml = task.chosenDesign 
                    ? `<span class="bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-2 py-1 rounded font-black text-xs"><i class="fa-solid fa-circle-check"></i> 已確認：[ 風格 ${task.chosenDesign} 款 ]</span>`
                    : `<span class="text-amber-400 font-bold animate-pulse text-xs"><i class="fa-solid fa-hourglass-start"></i> ⏳ 客人二選一中...</span>`;

                // 🌟 優化：從本地快取讀取已加載的設計圖
                const chosenImgSrc = task.chosenDesign === 'A' ? task.resultImageA : task.resultImageB;
                const finalResultHtml = task.chosenDesign ? (
                    chosenImgSrc ? `
                        <span class="text-[10px] font-bold text-emerald-400 mb-1 text-center w-full block font-sans">🏆 客人已選: ${task.chosenDesign} 款</span>
                        <img src="${chosenImgSrc}" class="w-24 h-24 object-cover rounded-xl border-2 border-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.25)] mx-auto" />
                        <button onclick="downloadResultImage('${task.id}', '${task.chosenDesign}')" class="w-full mt-2 bg-emerald-900/60 hover:bg-emerald-800 text-emerald-400 font-bold py-1.5 px-2 rounded-lg text-[10px] transition-all flex items-center justify-center gap-1 border border-emerald-500/50">
                            <i class="fa-solid fa-download"></i> 下載彩印圖
                        </button>
                    ` : `
                        <span class="text-[10px] font-bold text-emerald-400 mb-1 text-center w-full block font-sans">🏆 客人已選: ${task.chosenDesign} 款</span>
                        <div class="w-24 h-24 rounded-xl border-2 border-dashed border-emerald-500 flex flex-col items-center justify-center text-emerald-400 mx-auto bg-emerald-950/20">
                            <i class="fa-solid fa-circle-notch animate-spin text-xl mb-1"></i>
                            <span class="text-[9px]">同步中...</span>
                        </div>
                    `
                ) : `
                    <span class="text-[10px] font-bold text-amber-400 animate-pulse text-center w-full block mb-1 font-sans"><i class="fa-solid fa-hourglass-half"></i> 等待選擇</span>
                    <div class="w-24 h-24 rounded-xl border-2 border-dashed border-slate-600 flex items-center justify-center text-slate-600 mx-auto">
                        <i class="fa-solid fa-image text-2xl"></i>
                    </div>
                `;

                // 從本地快取中讀取客照，若尚未異步加載完畢，顯示轉圈動畫，絕不破圖
                const sourceImgHtml = task.sourceImage ? 
                    `<img src="${task.sourceImage}" class="w-20 h-20 mx-auto object-cover rounded-xl border border-slate-700 bg-black shadow-inner" />` :
                    `<div class="w-20 h-20 mx-auto rounded-xl border-2 border-dashed border-slate-700 flex flex-col items-center justify-center text-slate-500 text-[10px] bg-slate-900/20">
                        <i class="fa-solid fa-circle-notch animate-spin text-lg mb-1"></i>載入中
                     </div>`;

                return `
                <div class="cyber-card p-4 md:p-5 rounded-2xl flex flex-col md:flex-row gap-6 items-stretch relative overflow-hidden">
                    
                    <!-- 1. 號碼與原圖區 -->
                    <div class="flex flex-col items-center gap-2 w-full md:w-32 flex-shrink-0 md:border-r border-slate-700/50 md:pr-4">
                        <div class="text-center w-full">
                            <span class="text-[10px] font-mono tracking-widest text-cyan-400 block font-bold">QUEUE NO</span>
                            <span class="text-4xl font-black text-white font-mono glow-text">#${task.id}</span>
                            <div class="text-[9px] text-slate-500 font-mono mt-1">${task.createdAt || '--:--'}</div>
                        </div>
                        <div class="text-center relative w-full mt-1">
                            ${sourceImgHtml}
                            <button onclick="downloadSourceImage('${task.id}')" class="btn-mini">
                                <i class="fa-solid fa-download"></i> 下載原照
                            </button>
                        </div>
                    </div>

                    <!-- 2. 上傳風格區 -->
                    <div class="flex flex-col gap-2 w-full md:w-40 flex-shrink-0 md:border-r border-slate-700/50 md:pr-4 justify-center">
                        <span class="text-[11px] font-bold text-slate-300 text-center mb-1"><i class="fa-solid fa-upload text-cyan-400 mr-1"></i> 上傳 AI 風格圖</span>
                        <div class="flex gap-3 justify-center">
                            <div class="text-center w-full">
                                <span class="text-[9px] block text-slate-400 mb-1 font-bold">A 款</span>
                                <button onclick="triggerDualUpload('${task.id}', 'A')" id="upload-status-A-${task.id}" class="w-full h-14 rounded-lg border border-dashed ${task.resultImageA ? 'border-emerald-500 bg-emerald-950/20' : 'border-cyan-500/40 bg-slate-900'} flex items-center justify-center text-[11px] cursor-pointer hover:bg-slate-800 transition-colors">
                                    ${task.resultImageA ? `<i class="fa-solid fa-check text-emerald-400 text-xl"></i>` : `<i class="fa-solid fa-plus text-cyan-400"></i>`}
                                </button>
                            </div>
                            <div class="text-center w-full">
                                <span class="text-[9px] block text-slate-400 mb-1 font-bold">B 款</span>
                                <button onclick="triggerDualUpload('${task.id}', 'B')" id="upload-status-B-${task.id}" class="w-full h-14 rounded-lg border border-dashed ${task.resultImageB ? 'border-emerald-500 bg-emerald-950/20' : 'border-cyan-500/40 bg-slate-900'} flex items-center justify-center text-[11px] cursor-pointer hover:bg-slate-800 transition-colors">
                                    ${task.resultImageB ? `<i class="fa-solid fa-check text-emerald-400 text-xl"></i>` : `<i class="fa-solid fa-plus text-cyan-400"></i>`}
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 3. 客人選擇結果區 -->
                    <div class="flex flex-col gap-1 w-full md:w-40 flex-shrink-0 md:border-r border-slate-700/50 md:pr-4 justify-center items-center">
                        ${finalResultHtml}
                    </div>

                    <!-- 4. 狀態控制、備註與重新補印區 -->
                    <div class="flex-grow flex flex-col gap-3 min-w-[200px] justify-center">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 block mb-1">任務進度狀態</label>
                            <select onchange="updateTaskMeta('${task.id}', 'processStatus', this.value)" class="cyber-select w-full bg-slate-900 border border-slate-700 text-sm text-slate-200">
                                <option value="製作中" ${currentStatus === '製作中' ? 'selected' : ''}>⏳ 製作中</option>
                                <option value="已完成" ${currentStatus === '已完成' ? 'selected' : ''}>✅ 已完成</option>
                                <option value="已取消" ${currentStatus === '已取消' ? 'selected' : ''}>❌ 已取消</option>
                            </select>
                        </div>
                        <div class="flex-grow flex flex-col">
                            <label class="text-[10px] font-bold text-slate-400 block mb-1">任務備註事項</label>
                            <textarea onchange="updateTaskMeta('${task.id}', 'remark', this.value)" placeholder="點此輸入備註 (輸入完點擊旁邊即可自動儲存)..." class="cyber-textarea w-full flex-grow min-h-[60px] bg-slate-900 text-slate-200 p-2.5 rounded-lg border border-slate-700 text-xs resize-none transition-all leading-relaxed">${currentRemark}</textarea>
                        </div>
                        
                        <!-- 重新出票按鈕與狀態欄整合 -->
                        <div class="mt-2 flex items-center justify-between border-t border-slate-800 pt-2.5 gap-2">
                            <button id="reprint-btn-${task.id}" onclick="reprintTicket('${task.id}', 'reprint-btn-${task.id}')" class="bg-indigo-950/40 hover:bg-indigo-900 border border-indigo-500/50 text-indigo-300 font-bold px-2 py-1.5 rounded-lg text-[10px] transition-all flex items-center justify-center gap-1">
                                <i class="fa-solid fa-print text-indigo-400"></i> 重新出票
                            </button>
                            <div class="text-xs text-right">${userChoiceHtml}</div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        fetchAllTasks();
        setInterval(fetchAllTasks, 3200);
    </script>
</body>
</html>
