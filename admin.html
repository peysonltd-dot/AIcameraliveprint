<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 BEST AI AWARDS | 後台智慧控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0b1329; background-image: radial-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 0); background-size: 24px 24px; }
        .cyber-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(0, 242, 255, 0.15); transition: all 0.3s ease; }
        .cyber-card:hover { border-color: #00f2ff; box-shadow: 0 0 20px rgba(0, 242, 255, 0.15); }
        .upload-zone.dragover { border-color: #ff00d0 !important; background: rgba(255, 0, 208, 0.05) !important; }
    </style>
</head>
<body class="text-slate-100 min-h-screen p-4 md:p-8">

    <div id="new-order-banner" class="fixed top-4 left-1/2 transform -translate-x-1/2 -translate-y-10 z-50 bg-gradient-to-r from-cyan-500 to-blue-600 text-slate-950 font-black px-6 py-3.5 rounded-full shadow-[0_0_35px_rgba(0,242,255,0.6)] flex items-center gap-2.5 text-sm transition-all duration-500 opacity-0 pointer-events-none">
        <i class="fa-solid fa-bell animate-bounce text-lg"></i><span>偵測到新預約！流水號已更新</span>
    </div>

    <input type="file" id="global-file-input-A" class="hidden" accept="image/*" />
    <input type="file" id="global-file-input-B" class="hidden" accept="image/*" />

    <header class="max-w-7xl mx-auto mb-8 flex flex-col sm:flex-row justify-between items-center border-b border-cyan-500/20 pb-4 gap-4">
        <h1 class="text-2xl font-black text-white">智慧創新大賞 <span class="text-cyan-400 font-mono text-lg">LITE CONTROL CORE</span></h1>
        <div class="flex flex-wrap items-center gap-3">
            <button id="printer-check-btn" onclick="checkPrinterStatus()" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg text-sm transition flex items-center gap-2 border border-indigo-500/50"><i class="fa-solid fa-print"></i> <span>檢測出票機狀態</span></button>
            <button id="sound-toggle" onclick="toggleSound()" class="bg-slate-800 px-4 py-2 rounded-lg text-sm flex items-center gap-2 border border-slate-700 text-rose-500"><i id="sound-icon" class="fa-solid fa-volume-xmark"></i> <span id="sound-text">啟用音效提示</span></button>
            <button onclick="fetchAllTasks()" class="bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold px-4 py-2 rounded-lg text-sm flex items-center gap-2 shadow-[0_0_15px_rgba(0,242,255,0.3)]"><i class="fa-solid fa-arrows-rotate"></i> 重新整理数据</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto"><div id="tasks-container" class="grid grid-cols-1 gap-6"></div></main>

    <script>
        const API_BASE_URL = "https://aicameraliveprint-back.onrender.com";
        let localTasksCache = {}; let currentUploadTaskId = null; let soundEnabled = false;

        function toggleSound() {
            soundEnabled = !soundEnabled; const icon = document.getElementById('sound-icon'); const text = document.getElementById('sound-text');
            if (soundEnabled) { icon.className = "fa-solid fa-volume-high text-cyan-400"; text.innerText = "音效提示：已啟用"; }
            else { icon.className = "fa-solid fa-volume-xmark text-rose-500"; text.innerText = "音效提示：已停用"; }
        }

        async function checkPrinterStatus() {
            const text = document.getElementById('printer-check-btn').querySelector('span'); text.innerText = "連線中...";
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/printer-status`); const data = await res.json();
                text.innerText = data.success ? `狀態：${data.data.data}` : "連線異常";
            } catch { text.innerText = "連線失敗"; }
        }

        function compressImage(file, callback) {
            const reader = new FileReader(); reader.onload = function(e) {
                const img = new Image(); img.onload = function() {
                    const canvas = document.createElement('canvas'); canvas.width = 1024; canvas.height = 1024;
                    canvas.getContext('2d').drawImage(img, 0, 0, 1024, 1024); callback(canvas.toDataURL('image/jpeg', 0.85));
                }; img.src = e.target.result;
            }; reader.readAsDataURL(file);
        }

        async function handleImageFileInject(file, taskId, type) {
            document.getElementById(`upload-status-${type}-${taskId}`).innerHTML = `<i class="fa-solid fa-spinner animate-spin text-cyan-400"></i>`;
            compressImage(file, async (base64) => {
                const payload = {}; payload[`resultImage${type}`] = base64;
                try {
                    await fetch(`${API_BASE_URL}/api/admin/upload-result-dual/${taskId}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    localTasksCache[taskId][`resultImage${type}`] = base64; fetchAllTasks();
                } catch { alert("上傳失敗"); fetchAllTasks(); }
            });
        }

        function triggerDualUpload(taskId, targetType) { currentUploadTaskId = taskId; document.getElementById(`global-file-input-${targetType}`).click(); }
        ['A', 'B'].forEach(type => {
            document.getElementById(`global-file-input-${type}`).addEventListener('change', function() {
                if (currentUploadTaskId && this.files[0]) handleImageFileInject(this.files[0], currentUploadTaskId, type); this.value = "";
            });
        });

        async function fetchSourceImageIncrementally(taskId) {
            const res = await fetch(`${API_BASE_URL}/api/admin/task-source-image/${taskId}`).then(r => r.json());
            if (res.success && res.sourceImage) { localTasksCache[taskId].sourceImage = res.sourceImage; renderTasks(Object.values(localTasksCache).sort((a,b)=>b.id.localeCompare(a.id))); }
        }

        async function fetchResultImageIncrementally(taskId) {
            const res = await fetch(`${API_BASE_URL}/api/admin/task-result-images/${taskId}`).then(r => r.json());
            if (res.success) { if (res.resultImageA) localTasksCache[taskId].resultImageA = res.resultImageA; if (res.resultImageB) localTasksCache[taskId].resultImageB = res.resultImageB; renderTasks(Object.values(localTasksCache).sort((a,b)=>b.id.localeCompare(a.id))); }
        }

        async function fetchAllTasks() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/all-tasks?lightweight=true`).then(r => r.json());
                if (res.success) {
                    res.tasks.forEach(t => {
                        if (!localTasksCache[t.id]) localTasksCache[t.id] = t;
                        else { if (localTasksCache[t.id].sourceImage) t.sourceImage = localTasksCache[t.id].sourceImage; if (localTasksCache[t.id].resultImageA) t.resultImageA = localTasksCache[t.id].resultImageA; if (localTasksCache[t.id].resultImageB) t.resultImageB = localTasksCache[t.id].resultImageB; }
                        localTasksCache[t.id] = t;
                        if (t.hasSourceImage && !localTasksCache[t.id].sourceImage) fetchSourceImageIncrementally(t.id);
                        if ((t.hasResultImageA || t.hasResultImageB) && (!localTasksCache[t.id].resultImageA || !localTasksCache[t.id].resultImageB)) fetchResultImageIncrementally(t.id);
                    });
                    renderTasks(Object.values(localTasksCache).sort((a, b) => b.id.localeCompare(a.id)));
                }
            } catch (e) {}
        }

        function renderTasks(tasks) {
            const container = document.getElementById('tasks-container');
            if (tasks.length === 0) { container.innerHTML = `<div class="text-center py-12 text-slate-500 border border-dashed border-slate-800 rounded-2xl">尚無排隊訂單</div>`; return; }
            container.innerHTML = tasks.map(task => `
                <div class="cyber-card p-4 rounded-2xl flex flex-col md:flex-row gap-6 items-center">
                    <div class="text-center md:w-32">
                        <span class="text-4xl font-black font-mono">#${task.id}</span>
                        <div class="text-[10px] text-slate-500 mt-1">${task.createdAt || '--:--'}</div>
                    </div>
                    <div class="w-24 h-24 bg-black rounded-xl overflow-hidden flex items-center justify-center">
                        ${task.sourceImage ? `<img src="${task.sourceImage}" class="w-full h-full object-cover"/>` : `<i class="fa-solid fa-spinner animate-spin text-slate-600"></i>`}
                    </div>
                    <div class="flex gap-4">
                        <div><span class="text-xs block text-slate-400 mb-1 text-center">風格 A</span>
                            <button onclick="triggerDualUpload('${task.id}', 'A')" id="upload-status-A-${task.id}" onpaste="handleClipboardPaste(event, '${task.id}', 'A')" class="upload-zone w-16 h-16 rounded-xl border border-dashed border-cyan-500/30 flex items-center justify-center">${task.resultImageA ? `🟢` : `➕`}</button>
                        </div>
                        <div><span class="text-xs block text-slate-400 mb-1 text-center">風格 B</span>
                            <button onclick="triggerDualUpload('${task.id}', 'B')" id="upload-status-B-${task.id}" onpaste="handleClipboardPaste(event, '${task.id}', 'B')" class="upload-zone w-16 h-16 rounded-xl border border-dashed border-cyan-500/30 flex items-center justify-center">${task.resultImageB ? `🟢` : `➕`}</button>
                        </div>
                    </div>
                    <div class="text-xs text-amber-400 font-bold ml-auto">${task.chosenDesign ? `✅ 已選：風格 ${task.chosenDesign}` : `⏳ 客人抉擇中...`}</div>
                </div>
            `).join('');
        }

        function handleClipboardPaste(e, id, type) { const items = (e.clipboardData || window.clipboardData).items; for (let i=0; i<items.length; i++) { if (items[i].type.indexOf("image")!==-1) { handleImageFileInject(items[i].getAsFile(), id, type); break; } } }
        fetchAllTasks(); setInterval(fetchAllTasks, 3200);
    </script>
</body>
</html>
