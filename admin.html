<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 BEST AI AWARDS | 後台管理控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ai-cyan: #00f2ff;
            --ai-pink: #ff00d0;
            --ai-dark: #020617;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0b1329;
            background-image: radial-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
        .cyber-panel {
            background: rgba(15, 23, 42, 0.65);
            border: 1px solid rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(12px);
        }
        .cyber-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(0, 242, 255, 0.15);
            transition: all 0.3s ease;
        }
        .cyber-card:hover {
            border-color: var(--ai-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
        }
        .glow-text {
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen p-4 md:p-8">

    <!-- 頂部導覽列 -->
    <header class="max-w-7xl mx-auto mb-8 flex flex-col sm:flex-row justify-between items-center border-b border-cyan-500/20 pb-4 gap-4">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-cyan-400 animate-ping"></div>
            <h1 class="text-2xl font-black tracking-wider text-white">
                智慧創新大賞 <span class="text-cyan-400 font-mono font-normal text-lg">ADMIN PANEL</span>
            </h1>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-xs bg-slate-800 px-3 py-1.5 rounded-md text-slate-400 font-mono border border-slate-700">SERVER: ONLINE</span>
            <button onclick="fetchAllTasks()" class="bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold px-4 py-2 rounded-lg text-sm transition flex items-center gap-2 shadow-[0_0_15px_rgba(0,242,255,0.3)]">
                <i class="fa-solid fa-arrows-rotate"></i> 整理重新整理
            </button>
        </div>
    </header>

    <!-- 主容器 -->
    <main class="max-w-7xl mx-auto">
        
        <!-- 任務列表狀態欄 -->
        <div class="mb-6 flex gap-4 text-xs font-bold tracking-wider">
            <span class="text-cyan-400"><i class="fa-solid fa-list-check mr-1"></i> 全部的排隊任務</span>
        </div>

        <!-- 卡片容器 -->
        <div id="tasks-container" class="grid grid-cols-1 gap-6">
            <!-- 動態資料會由 JavaScript 渲染至此 -->
            <div class="text-center py-12 text-slate-400 border border-dashed border-slate-700 rounded-2xl">
                <i class="fa-solid fa-circle-notch animate-spin text-3xl text-cyan-400 mb-3"></i>
                <p>正在連線至 Render 後端獲取排隊號碼...</p>
            </div>
        </div>
    </main>

    <script>
        const API_BASE_URL = "https://aicameraliveprint-back.onrender.com";

        // 🌟 核心翻譯對照字典：將 AI 吐出來的英文無縫轉換成現場中文標籤
        const translationDict = {
            // 性別
            "man": "男生 👨", "woman": "女生 👩", "boy": "小男孩 👦", "girl": "小女孩 👧",
            // 髮型
            "messy bun": "慵懶包包頭/低髮髻 🍡",
            "ponytail": "高/低綁馬尾 🐎",
            "princess": "半開公主頭 👑",
            "braids": "雙側編辮子 👧",
            "loose hair": "自然披肩散髮 👩‍🦰",
            // 特徵與配件
            "wearing glasses": "有戴眼鏡 👓", "no glasses": "未戴眼鏡 ❌",
            "wearing necklace": "有戴項鍊 ✨", "no necklace": "無項鍊 ❌",
            "wearing earrings": "有戴耳環 💎", "no earrings": "無耳環 ❌",
            "smiling": "開朗微笑 😊", "neutral": "高冷平靜 😐"
        };

        // 智慧翻譯安全轉換函式
        function translate(word) {
            if (!word) return "未辨識";
            const cleanWord = word.trim().toLowerCase();
            return translationDict[cleanWord] || word;
        }

        // 從提示詞中逆向提取核心關鍵字的防禦函式
        function extractFeature(prompt, featureType) {
            if (!prompt) return "未辨識";
            const p = prompt.toLowerCase();
            
            if (featureType === 'glasses') {
                return p.includes('wearing glasses') ? 'wearing glasses' : 'no glasses';
            }
            if (featureType === 'necklace') {
                return p.includes('wearing necklace') ? 'wearing necklace' : 'no necklace';
            }
            if (featureType === 'earrings') {
                return p.includes('wearing earrings') ? 'wearing earrings' : 'no earrings';
            }
            if (featureType === 'style') {
                if (p.includes('messy bun')) return 'messy bun';
                if (p.includes('ponytail')) return 'ponytail';
                if (p.includes('princess')) return 'princess';
                if (p.includes('braids')) return 'braids';
                if (p.includes('loose hair')) return 'loose hair';
            }
            if (featureType === 'gender') {
                if (p.includes('of a woman')) return 'woman';
                if (p.includes('of a man')) return 'man';
                if (p.includes('of a girl')) return 'girl';
                if (p.includes('of a boy')) return 'boy';
            }
            return "偵測中";
        }

        // 獲取所有排隊資料
        async function fetchAllTasks() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/all-tasks`);
                const data = await res.json();
                if (data.success) {
                    renderTasks(data.tasks);
                }
            } catch (err) {
                console.error("無法連線至 Render 後端:", err);
            }
        }

        // 核心一鍵複製功能（純英文防干擾）
        function copyToClipboard(text, btnId) {
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById(btnId);
                const originalHtml = btn.innerHTML;
                btn.innerHTML = `<i class="fa-solid fa-check mr-1"></i> 已複製成功！`;
                btn.className = "bg-green-500 text-slate-950 font-bold px-4 py-2 rounded-xl text-sm transition flex items-center gap-1 shadow-[0_0_15px_rgba(34,197,94,0.4)]";
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    btn.className = "w-full bg-cyan-400 hover:bg-cyan-300 text-slate-950 font-black py-2.5 rounded-xl text-sm tracking-wider transition flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(0,242,255,0.2)]";
                }, 1500);
            });
        }

        // 渲染畫面邏輯（黃金中英對照版 UI）
        function renderTasks(tasks) {
            const container = document.getElementById('tasks-container');
            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-slate-500 border border-dashed border-slate-800 rounded-2xl">
                        <i class="fa-solid fa-inbox text-4xl mb-2"></i>
                        <p>目前尚無任何拍照排隊任務</p>
                    </div>`;
                return;
            }

            container.innerHTML = tasks.map(task => {
                // 從英文提示詞中，將特徵精確拆解出來提供中文翻譯顯示
                const genderRaw = extractFeature(task.suggestedPrompt, 'gender');
                const styleRaw = extractFeature(task.suggestedPrompt, 'style');
                const glassesRaw = extractFeature(task.suggestedPrompt, 'glasses');
                const necklaceRaw = extractFeature(task.suggestedPrompt, 'necklace');
                const earringsRaw = extractFeature(task.suggestedPrompt, 'earrings');

                return `
                <div class="cyber-card p-5 md:p-6 rounded-2xl flex flex-col lg:flex-row gap-6 items-start relative overflow-hidden">
                    
                    <!-- 左側欄：號碼牌與雙照片對照 -->
                    <div class="flex flex-col items-center gap-3 w-full lg:w-auto flex-shrink-0">
                        <div class="text-center">
                            <span class="text-[10px] font-mono tracking-widest text-cyan-400 block font-bold">QUEUE NO</span>
                            <span class="text-4xl font-black text-white font-mono glow-text">#${task.id}</span>
                        </div>
                        <div class="flex lg:flex-col gap-3 mt-1">
                            <div class="text-center">
                                <p class="text-[9px] text-slate-400 mb-1 font-bold">📷 現場原圖</p>
                                <img src="${task.sourceImage}" class="w-28 h-28 object-cover rounded-xl border border-slate-700 bg-black shadow-inner" />
                            </div>
                            <div class="text-center">
                                <p class="text-[9px] text-emerald-400 mb-1 font-bold">🎨 雷雕結果圖</p>
                                ${task.resultImage ? 
                                    `<img src="${task.resultImage}" class="w-28 h-28 object-cover rounded-xl border border-emerald-500/30 bg-black" />` : 
                                    `<div class="w-28 h-28 rounded-xl border border-dashed border-slate-700 flex flex-col items-center justify-center text-slate-500 text-[10px] bg-slate-900/50">
                                        <i class="fa-solid fa-spinner animate-spin text-lg text-cyan-500 mb-1"></i>正在等候上傳
                                     </div>`
                                }
                            </div>
                        </div>
                    </div>

                    <!-- 右側欄：核心中英優化對照面版 -->
                    <div class="flex-grow w-full grid grid-cols-1 md:grid-cols-12 gap-5">
                        
                        <!-- 1. Leonardo 專用純英文欄位 (佔據左半邊 7 格) -->
                        <div class="md:col-span-7 flex flex-col justify-between h-full min-h-[180px]">
                            <div>
                                <label class="text-[11px] font-bold text-slate-300 tracking-wider flex items-center gap-1.5 mb-1.5">
                                    <i class="fa-solid fa-code text-cyan-400"></i> Leonardo 專用純英文咒語 (複製此欄)
                                </label>
                                <textarea readonly class="w-full h-24 bg-slate-950/90 text-slate-300 p-3 rounded-xl border border-slate-800 text-xs font-mono resize-none focus:outline-none select-all focus:border-cyan-500/50">${task.suggestedPrompt}</textarea>
                            </div>
                            <div class="mt-3">
                                <button id="btn-${task.id}" onclick="copyToClipboard('${task.suggestedPrompt.replace(/'/g, "\\'")}', 'btn-${task.id}')" class="w-full bg-cyan-400 hover:bg-cyan-300 text-slate-950 font-black py-2.5 rounded-xl text-sm tracking-wider transition flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(0,242,255,0.2)]">
                                    <i class="fa-solid fa-copy"></i> 一鍵複製 Leonardo 專用咒語
                                </button>
                            </div>
                        </div>

                        <!-- 🌟 2. 核心大升級：工作人員專用中文特徵檢查欄 (佔據右半邊 5 格) -->
                        <div class="md:col-span-5 border-t md:border-t-0 md:border-l border-slate-800 pt-4 md:pt-0 md:pl-5 flex flex-col justify-between">
                            <div>
                                <label class="text-[11px] font-bold text-cyan-400 tracking-wider flex items-center gap-1.5 mb-3">
                                    <i class="fa-solid fa-magnifying-glass-face"></i> AI 視覺特徵中文對照 (方便快速核對)
                                </label>
                                
                                <div class="flex flex-wrap gap-2.5">
                                    <!-- 性別標籤 -->
                                    <span class="px-3 py-1.5 rounded-lg text-xs font-bold bg-slate-900 border border-slate-700 text-slate-200">
                                        身分：<span class="text-cyan-400">${translate(genderRaw)}</span>
                                    </span>
                                    <!-- 髮型標籤 -->
                                    <span class="px-3 py-1.5 rounded-lg text-xs font-bold bg-slate-900 border border-slate-700 text-slate-200">
                                        髮型：<span class="text-yellow-400">${translate(styleRaw)}</span>
                                    </span>
                                    <!-- 眼鏡標籤 -->
                                    <span class="px-3 py-1.5 rounded-lg text-xs font-bold ${glassesRaw === 'wearing glasses' ? 'bg-cyan-950/60 border-cyan-500/40 text-cyan-200' : 'bg-slate-900 border-slate-700 text-slate-400'}">
                                        眼鏡：<span class="${glassesRaw === 'wearing glasses' ? 'text-cyan-400 font-extrabold' : ''}">${translate(glassesRaw)}</span>
                                    </span>
                                    <!-- 項鍊標籤 -->
                                    <span class="px-3 py-1.5 rounded-lg text-xs font-bold ${necklaceRaw === 'wearing necklace' ? 'bg-pink-950/40 border-pink-500/30 text-pink-200' : 'bg-slate-900 border-slate-700 text-slate-400'}">
                                        項鍊：<span>${translate(necklaceRaw)}</span>
                                    </span>
                                    <!-- 耳環標籤 -->
                                    <span class="px-3 py-1.5 rounded-lg text-xs font-bold ${earringsRaw === 'wearing earrings' ? 'bg-purple-950/40 border-purple-500/30 text-purple-200' : 'bg-slate-900 border-slate-700 text-slate-400'}">
                                        耳環：<span>${translate(earringsRaw)}</span>
                                    </span>
                                </div>
                            </div>

                            <!-- 狀態管理按鈕區 -->
                            <div class="mt-4 pt-3 border-t border-slate-800/60 flex items-center justify-between text-xs text-slate-400 font-mono">
                                <div>時間: ${task.createdAt || '--:--'}</div>
                                <div class="flex gap-2">
                                    <span class="px-2 py-1 rounded bg-amber-500/10 text-amber-400 border border-amber-500/20 font-sans font-bold">
                                        ${task.status === 'completed' ? '✅ 已完成' : '⏳ 排隊中'}
                                    </span>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
                `;
            }).join('');
        }

        // 頁面加載後自動執行輪詢，每 3.5 秒自動整理一次，確保現場人員看到最新動態
        fetchAllTasks();
        setInterval(fetchAllTasks, 3500);
    </script>
</body>
</html>
