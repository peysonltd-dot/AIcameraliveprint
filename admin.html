<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 BEST AI AWARDS | 後台控制台</title>
    <!-- 保留 FontAwesome 作為輔助，但內建 CSS 已做好完全防禦 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* 🌟 100% 零外接依賴 - 現場斷網也絕對不跑版之純 CSS 架構 */
        :root {
            --ai-cyan: #00f2ff;
            --ai-pink: #ff00d0;
            --bg-color: #0b1329;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(0, 242, 255, 0.15);
            --text-color: #f1f5f9;
            --emerald: #10b981;
            --emerald-bg: rgba(16, 185, 129, 0.1);
            --indigo: #6366f1;
            --slate-400: #94a3b8;
            --slate-500: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 0);
            background-size: 24px 24px;
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* Header 導航區 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            padding-bottom: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-title-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background-color: var(--ai-cyan);
            border-radius: 50%;
            animation: ping 1.5s infinite;
        }

        @keyframes ping {
            0% { transform: scale(0.8); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(0.8); opacity: 1; }
        }

        h1 {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1px;
            color: #ffffff;
        }

        h1 span {
            color: var(--ai-cyan);
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            margin-left: 8px;
            font-weight: bold;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* 💡 精美霓虹按鈕樣式 */
        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid transparent;
            color: #ffffff;
        }

        .btn-indigo {
            background-color: var(--indigo);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }
        .btn-indigo:hover {
            background-color: #4f46e5;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        .btn-emerald {
            background-color: #065f46;
            border-color: var(--emerald);
            color: var(--emerald);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }

        .btn-rose {
            background-color: #991b1b;
            border-color: #ef4444;
            color: #fca5a5;
        }

        .btn-slate {
            background-color: #1e293b;
            color: #cbd5e1;
            border-color: #334155;
        }
        .btn-slate:hover {
            background-color: #334155;
        }

        .btn-cyan {
            background-color: rgba(0, 242, 255, 0.1);
            color: var(--ai-cyan);
            border-color: var(--ai-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }
        .btn-cyan:hover {
            background-color: var(--ai-cyan);
            color: #020617;
            box-shadow: 0 0 25px var(--ai-cyan);
        }

        /* 任務卡片網格佈局 */
        .tasks-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        .cyber-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: row;
            gap: 24px;
            transition: all 0.3s ease;
        }

        .cyber-card:hover {
            border-color: var(--ai-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
        }

        /* 響應式四欄式寬度控制 */
        .col-1 {
            width: 140px;
            flex-shrink: 0;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding-right: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .col-2 {
            width: 190px;
            flex-shrink: 0;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding-right: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .col-3 {
            width: 190px;
            flex-shrink: 0;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding-right: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .col-4 {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            justify-content: center;
        }

        /* 第一欄：號碼與原照 */
        .queue-label {
            font-size: 10px;
            color: var(--ai-cyan);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .queue-no {
            font-size: 38px;
            font-weight: 900;
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
            margin: 2px 0;
        }

        .timestamp {
            font-size: 10px;
            color: var(--slate-500);
            font-family: monospace;
        }

        .thumbnail {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid #334155;
            margin-top: 6px;
            background-color: #000;
        }

        .btn-mini {
            width: 100%;
            padding: 6px 12px;
            font-size: 11px;
            border-radius: 6px;
            background-color: #1e293b;
            color: var(--ai-cyan);
            border: 1px solid rgba(0, 242, 255, 0.2);
            cursor: pointer;
            margin-top: 8px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn-mini:hover {
            background-color: rgba(0, 242, 255, 0.1);
        }

        /* 第二欄：上傳區 */
        .col-title {
            font-size: 12px;
            font-weight: bold;
            color: #cbd5e1;
            text-align: center;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .style-upload-group {
            display: flex;
            gap: 12px;
        }

        .style-box {
            flex: 1;
            text-align: center;
        }

        .style-label {
            font-size: 10px;
            color: var(--slate-400);
            margin-bottom: 6px;
            display: block;
            font-weight: bold;
        }

        .dashed-upload-btn {
            width: 100%;
            height: 56px;
            border-radius: 8px;
            border: 1.5px dashed rgba(0, 242, 255, 0.4);
            background-color: #0f172a;
            color: var(--ai-cyan);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .dashed-upload-btn.uploaded {
            border-color: var(--emerald);
            background-color: rgba(16, 185, 129, 0.05);
            color: var(--emerald);
        }
        .dashed-upload-btn:hover {
            background-color: #1e293b;
        }

        /* 下拉式選單與備註區 */
        .input-label {
            font-size: 10px;
            font-weight: bold;
            color: var(--slate-400);
            display: block;
            margin-bottom: 4px;
        }

        .cyber-select {
            width: 100%;
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #cbd5e1;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            outline: none;
            cursor: pointer;
        }
        .cyber-select:focus {
            border-color: var(--ai-cyan);
        }

        .cyber-textarea {
            width: 100%;
            height: 60px;
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #cbd5e1;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            resize: none;
            outline: none;
            line-height: 1.5;
        }
        .cyber-textarea:focus {
            border-color: var(--ai-cyan);
        }

        /* 卡片底部操作 */
        .card-footer-action {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 12px;
            margin-top: 8px;
        }

        .btn-reprint {
            padding: 6px 12px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 6px;
            background-color: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #a5b4fc;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .btn-reprint:hover {
            background-color: rgba(99, 102, 241, 0.2);
            border-color: var(--indigo);
        }

        /* 頂部通知橫幅 */
        .banner-alert {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translate(-50%, -50px);
            z-index: 100;
            background: linear-gradient(to right, #06b6d4, #3b82f6);
            color: #020617;
            font-weight: 900;
            padding: 14px 24px;
            border-radius: 50px;
            box-shadow: 0 0 35px rgba(0, 242, 255, 0.6);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            transition: all 0.5s ease;
            opacity: 0;
            pointer-events: none;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .banner-alert.show {
            transform: translate(-50%, 0);
            opacity: 1;
        }

        /* RWD 手機版自動重排 */
        @media (max-width: 900px) {
            .cyber-card {
                flex-direction: column;
                gap: 16px;
            }
            .col-1, .col-2, .col-3 {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                padding-right: 0;
                padding-bottom: 16px;
                align-items: flex-start;
                text-align: left;
            }
            .thumbnail {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 頂部新預約提示 -->
        <div id="new-order-banner" class="banner-alert">
            <span>🔔 偵測到新預約！流水號已更新</span>
        </div>

        <!-- 隱藏的實體檔案上傳節點 -->
        <input type="file" id="global-file-input-A" class="hidden" style="display:none;" accept="image/*" />
        <input type="file" id="global-file-input-B" class="hidden" style="display:none;" accept="image/*" />

        <header>
            <div class="header-title-group">
                <div class="status-dot"></div>
                <h1>智慧創新大賞 <span>LITE CONTROL CORE</span></h1>
            </div>
            
            <div class="btn-group">
                <button id="printer-check-btn" onclick="checkPrinterStatus()" class="btn btn-indigo">
                    🔌 <span id="printer-status-text">檢測出票機狀態</span>
                </button>

                <button id="sound-toggle" onclick="toggleSound()" class="btn btn-slate">
                    🔇 <span id="sound-text">啟用音效提示</span>
                </button>
                
                <button onclick="fetchAllTasks()" class="btn btn-cyan">
                    🔄 重新整理數據
                </button>
            </div>
        </header>

        <main id="tasks-container" class="tasks-grid">
            <!-- 動態資料將在此處渲染 -->
        </main>
    </div>

    <script>
        const API_BASE_URL = "https://aicameraliveprint-back.onrender.com";
        let localTasksCache = {};
        let currentUploadTaskId = null;
        let soundEnabled = false;

        // Web Audio API 本地音效合成器 (100% 斷網也響得出來的叮咚聲)
        function playDingDong() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                
                const osc1 = ctx.createOscillator();
                const gain1 = ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(880, ctx.currentTime); 
                gain1.gain.setValueAtTime(0.2, ctx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
                osc1.connect(gain1);
                gain1.connect(ctx.destination);
                osc1.start();
                osc1.stop(ctx.currentTime + 0.8);

                const delay = 0.22;
                const osc2 = ctx.createOscillator();
                const gain2 = ctx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(698.46, ctx.currentTime + delay); 
                gain2.gain.setValueAtTime(0, ctx.currentTime);
                gain2.gain.setValueAtTime(0.2, ctx.currentTime + delay);
                gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 1.1);
                osc2.connect(gain2);
                gain2.connect(ctx.destination);
                osc2.start(ctx.currentTime + delay);
                osc2.stop(ctx.currentTime + delay + 1.1);
            } catch (e) {
                console.error("音效合成失敗:", e);
            }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const text = document.getElementById('sound-text');
            const btn = document.getElementById('sound-toggle');
            
            if (soundEnabled) {
                text.innerText = "音效提示：已啟用";
                btn.className = "btn btn-cyan";
                playDingDong();
            } else {
                text.innerText = "音效提示：已停用";
                btn.className = "btn btn-slate";
            }
        }

        // 🔌 查詢飛鵝雲端印表機狀態
        async function checkPrinterStatus() {
            const btn = document.getElementById('printer-check-btn');
            const text = document.getElementById('printer-status-text');
            
            text.innerText = "正在聯絡飛鵝雲端...";
            btn.disabled = true;
            
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/printer-status`);
                const data = await res.json();
                if (data.success && data.data) {
                    const statusText = data.data.data; 
                    text.innerText = `狀態：${statusText}`;
                    
                    if (statusText.includes("在线")) {
                        btn.className = "btn btn-emerald";
                    } else {
                        btn.className = "btn btn-rose";
                    }
                } else {
                    text.innerText = `連線錯誤 (請檢查 API 金鑰)`;
                    btn.className = "btn btn-rose";
                }
            } catch (err) {
                text.innerText = "無法聯絡 Render 後端";
                btn.className = "btn btn-rose";
            }
            
            setTimeout(() => {
                btn.disabled = false;
                text.innerText = "檢測出票機狀態";
                btn.className = "btn btn-indigo";
            }, 4000);
        }

        function triggerNewOrderAlert() {
            if (soundEnabled) {
                playDingDong();
            }
            const banner = document.getElementById('new-order-banner');
            if (banner) {
                banner.classList.add('show');
                setTimeout(() => {
                    banner.classList.remove('show');
                }, 3500);
            }
        }

        async function updateTaskMeta(taskId, field, value) {
            const task = localTasksCache[taskId];
            if (task) {
                task[field] = value;
            }
        }

        function downloadSourceImage(taskId) {
            const task = localTasksCache[taskId];
            if (!task || !task.sourceImage) {
                alert("找不到該任務的原始客照！");
                return;
            }
            const link = document.createElement('a');
            link.href = task.sourceImage;
            link.download = `雷雕客照_#${taskId}.jpg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function downloadResultImage(taskId, choice) {
            const task = localTasksCache[taskId];
            if (!task) return;
            const base64Str = choice === 'A' ? task.resultImageA : task.resultImageB;
            if (!base64Str) {
                alert("圖片資料尚未同步，請稍後再試！");
                return;
            }
            const link = document.createElement('a');
            link.href = base64Str;
            link.download = `雷雕結果_#${taskId}_最終${choice}款.jpg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function triggerDualUpload(taskId, targetType) {
            currentUploadTaskId = taskId;
            document.getElementById(`global-file-input-${targetType}`).click();
        }

        ['A', 'B'].forEach(type => {
            document.getElementById(`global-file-input-${type}`).addEventListener('change', async function() {
                const taskId = currentUploadTaskId; if (!taskId || !this.files[0]) return;
                
                document.getElementById(`upload-status-${type}-${taskId}`).innerHTML = `⏳`;
                
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const bodyData = {}; bodyData[`resultImage${type}`] = e.target.result;
                    try {
                        const res = await fetch(`${API_BASE_URL}/api/admin/upload-result-dual/${taskId}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(bodyData)
                        });
                        if ((await res.json()).success) fetchAllTasks();
                    } catch (err) { alert("連線超時！"); fetchAllTasks(); }
                };
                reader.readAsDataURL(this.files[0]);
                this.value = "";
            });
        });

        async function reprintTicket(taskId, btnId) {
            const btn = document.getElementById(btnId);
            const originalHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `⏳ 出票中...`;
            
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/reprint/${taskId}`, {
                    method: 'POST'
                });
                const data = await res.json();
                if (data.success) {
                    btn.innerHTML = `✅ 已出單`;
                    btn.style.backgroundColor = "rgba(16, 185, 129, 0.15)";
                    btn.style.borderColor = "var(--emerald)";
                    btn.style.color = "var(--emerald)";
                } else {
                    alert("補印失敗：" + (data.error || "請確認出票機 WiFi 與 Render 環境變數是否正確！"));
                    btn.innerHTML = originalHtml;
                }
            } catch (err) {
                console.error("補印連線錯誤:", err);
                alert("連線後端伺服器失敗，請檢查網路！");
                btn.innerHTML = originalHtml;
            } finally {
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = `🖨️ 重新出票`;
                    btn.style.backgroundColor = "rgba(99, 102, 241, 0.1)";
                    btn.style.borderColor = "rgba(99, 102, 241, 0.3)";
                    btn.style.color = "#a5b4fc";
                }, 3000);
            }
        }

        async function fetchAllTasks() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/all-tasks`);
                const data = await res.json();
                if (data.success) {
                    let hasNewOrder = false;

                    data.tasks.forEach(t => { 
                        if (!localTasksCache[t.id]) {
                            if (Object.keys(localTasksCache).length > 0) {
                                hasNewOrder = true;
                            }
                            t.processStatus = '製作中';
                            t.remark = '';
                        } else {
                            t.processStatus = localTasksCache[t.id].processStatus;
                            t.remark = localTasksCache[t.id].remark;
                        }
                        localTasksCache[t.id] = t; 
                    });

                    renderTasks(Object.values(localTasksCache).sort((a, b) => b.id.localeCompare(a.id)));
                    
                    if (hasNewOrder) {
                        triggerNewOrderAlert();
                    }
                }
            } catch (e) {}
        }

        function renderTasks(tasks) {
            const activeEl = document.activeElement;
            if (activeEl && (activeEl.tagName === 'TEXTAREA' || activeEl.tagName === 'SELECT')) {
                return;
            }

            const container = document.getElementById('tasks-container');
            if (tasks.length === 0) { 
                container.innerHTML = `<div style="text-align:center; padding: 48px; color: var(--slate-500); border: 2px dashed #1e293b; border-radius: 16px;">尚無排隊訂單</div>`; 
                return; 
            }

            container.innerHTML = tasks.map(task => {
                const currentStatus = task.processStatus || '製作中';
                const currentRemark = task.remark || '';

                const userChoiceHtml = task.chosenDesign 
                    ? `<span style="background-color: var(--emerald-bg); color: var(--emerald); border: 1px solid rgba(16, 185, 129, 0.3); padding: 4px 8px; border-radius: 4px; font-weight: 900; font-size: 12px;">✅ 已確認：[ 風格 ${task.chosenDesign} 款 ]</span>`
                    : `<span style="color: #fbbf24; font-weight: bold; font-size: 12px;">⏳ 客人二選一中...</span>`;

                const finalResultHtml = task.chosenDesign ? `
                    <span style="font-size: 10px; font-weight: bold; color: var(--emerald); margin-bottom: 4px; text-align: center; width: 100%; display: block;">🏆 客人已選: ${task.chosenDesign} 款</span>
                    <img src="${task.chosenDesign === 'A' ? task.resultImageA : task.resultImageB}" class="thumbnail" style="margin-top: 0; width: 100px; height: 100px;" />
                    <button onclick="downloadResultImage('${task.id}', '${task.chosenDesign}')" class="btn-mini">
                        📥 下載雷雕圖
                    </button>
                ` : `
                    <span style="font-size: 10px; font-weight: bold; color: #fbbf24; text-align: center; width: 100%; display: block;">⏳ 等待選擇</span>
                    <div style="width: 80px; height: 80px; border-radius: 12px; border: 2px dashed #334155; display: flex; align-items: center; justify-content: center; color: #334155; font-size: 24px; margin: 0 auto;">
                        🖼️
                    </div>
                `;

                return `
                <div class="cyber-card">
                    
                    <!-- 1. 號碼與原圖區 -->
                    <div class="col-1">
                        <span class="queue-label">QUEUE NO</span>
                        <span class="queue-no">#${task.id}</span>
                        <div class="timestamp">${task.createdAt || '--:--'}</div>
                        <img src="${task.sourceImage}" class="thumbnail" />
                        <button onclick="downloadSourceImage('${task.id}')" class="btn-mini">
                            📥 下載原照
                        </button>
                    </div>

                    <!-- 2. 上傳風格區 -->
                    <div class="col-2">
                        <span class="col-title">🎨 上傳 AI 風格圖</span>
                        <div class="style-upload-group">
                            <div class="style-box">
                                <span class="style-label">A 款</span>
                                <button onclick="triggerDualUpload('${task.id}', 'A')" id="upload-status-A-${task.id}" class="dashed-upload-btn ${task.resultImageA ? 'uploaded' : ''}">
                                    ${task.resultImageA ? `✅` : `＋`}
                                </button>
                            </div>
                            <div class="style-box">
                                <span class="style-label">B 款</span>
                                <button onclick="triggerDualUpload('${task.id}', 'B')" id="upload-status-B-${task.id}" class="dashed-upload-btn ${task.resultImageB ? 'uploaded' : ''}">
                                    ${task.resultImageB ? `✅` : `＋`}
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 3. 客人選擇結果區 -->
                    <div class="col-3">
                        ${finalResultHtml}
                    </div>

                    <!-- 4. 狀態控制與備註區 -->
                    <div class="col-4">
                        <div>
                            <span class="input-label">任務進度狀態</span>
                            <select onchange="updateTaskMeta('${task.id}', 'processStatus', this.value)" class="cyber-select">
                                <option value="製作中" ${currentStatus === '製作中' ? 'selected' : ''}>⏳ 製作中</option>
                                <option value="已完成" ${currentStatus === '已完成' ? 'selected' : ''}>✅ 已完成</option>
                                <option value="已取消" ${currentStatus === '已取消' ? 'selected' : ''}>❌ 已取消</option>
                            </select>
                        </div>
                        <div>
                            <span class="input-label">任務備註事項</span>
                            <textarea onchange="updateTaskMeta('${task.id}', 'remark', this.value)" placeholder="點此輸入備註 (輸入完點擊旁邊即可自動儲存)..." class="cyber-textarea">${currentRemark}</textarea>
                        </div>
                        
                        <!-- 重新出票按鈕與狀態欄整合 -->
                        <div class="card-footer-action">
                            <button id="reprint-btn-${task.id}" onclick="reprintTicket('${task.id}', 'reprint-btn-${task.id}')" class="btn-reprint">
                                🖨️ 重新出票
                            </button>
                            <div>${userChoiceHtml}</div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        fetchAllTasks();
        setInterval(fetchAllTasks, 3200);
    </script>
</body>
</html>
