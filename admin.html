<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;500;900&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0b0f19;
            color: #f8fafc;
        }
        .tech-title {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #00f2ff, #ff00d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen bg-slate-950">
    <div id="root" class="max-w-7xl mx-auto"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 預設官方後端網址
        const DEFAULT_API_URL = "https://aicameraliveprint-back.onrender.com";

        const AdminPanel = () => {
            const [allTasks, setAllTasks] = useState([]);
            const [remarks, setRemarks] = useState({}); // 暫存修改中的備註
            const [copiedId, setCopiedId] = useState(null); // 複製提示狀態
            const [loadingId, setLoadingId] = useState(null);
            
            // 讀取快取網址，若無則使用預設值
            const [apiUrl, setApiUrl] = useState(() => {
                return localStorage.getItem('admin_api_url') || DEFAULT_API_URL;
            });
            const [apiStatus, setApiStatus] = useState('checking'); // 'checking', 'online', 'offline'
            const [connectionError, setConnectionError] = useState("");
            const [showSettings, setShowSettings] = useState(false);
            
            // 核心升級：向下相容模式狀態
            const [legacyModeActive, setLegacyModeActive] = useState(false);

            // 偵測工作人員是否誤填了前台 GitHub 網址
            const isGithubUrl = apiUrl.toLowerCase().includes("github.io");

            // 每 2.5 秒自動刷新一次完整名單
            useEffect(() => {
                let isMounted = true;
                const fetchAllTasks = async () => {
                    try {
                        let res = await fetch(`${apiUrl}/api/admin/all-tasks`);
                        let isLegacy = false;

                        // 核心防禦：如果伺服器回傳了 HTML 404 頁面，或者不支援 JSON
                        const contentType = res.headers.get('content-type') || '';
                        if (!res.ok || contentType.includes('text/html') || !contentType.includes('application/json')) {
                            console.warn("⚠️ 偵測到後端尚未更新。自動啟動向下相容模式，連線回 /api/admin/tasks 接口...");
                            
                            // 嘗試連線舊接口
                            res = await fetch(`${apiUrl}/api/admin/tasks`);
                            isLegacy = true;
                        }

                        if (!res.ok) throw new Error(`HTTP 錯誤! 狀態碼: ${res.status}`);
                        const data = await res.json();
                        
                        if (data.success && isMounted) {
                            // 補齊舊版本可能缺少的欄位
                            const tasksWithStatus = (data.tasks || []).map(t => ({
                                ...t,
                                status: t.status || 'pending',
                                suggestedPrompt: t.suggestedPrompt || `Quirky minimalist hand-drawn doodle portrait, naive art, chibi kawaii aesthetic...` // 向下相容
                            }));

                            setAllTasks(tasksWithStatus);
                            setApiStatus('online');
                            setConnectionError("");
                            setLegacyModeActive(isLegacy);
                        }
                    } catch (err) {
                        if (isMounted) {
                            setApiStatus('offline');
                            setConnectionError(err.message || "Network Error");
                            console.error("無法連線至後端伺服器:", err);
                        }
                    }
                };
                
                fetchAllTasks();
                const interval = setInterval(fetchAllTasks, 2.5 * 1000);
                return () => {
                    isMounted = false;
                    clearInterval(interval);
                };
            }, [apiUrl]);

            // 進行中與已處理歷史紀錄分流
            const pendingTasks = allTasks.filter(t => t.status === 'pending');
            // 已處理包含：已完成 (completed) 與已取消 (cancelled)
            const completedTasks = allTasks.filter(t => t.status === 'completed' || t.status === 'cancelled');

            // 計算右上角看板數據
            const totalTickets = allTasks.length;
            const completedCount = allTasks.filter(t => t.status === 'completed').length;
            const latestTicketId = allTasks.length > 0 
                ? allTasks[allTasks.length - 1].id 
                : "000";

            // 手動更新狀態 (製作中, 已完成, 已取消) 並同步至後端
            const handleStatusChange = async (taskId, newStatus) => {
                try {
                    const res = await fetch(`${apiUrl}/api/admin/update-status/${taskId}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: newStatus })
                    });
                    const data = await res.json();
                    if (data.success) {
                        setAllTasks(prev => prev.map(t => t.id === taskId ? { ...t, status: newStatus } : t));
                    }
                } catch (err) {
                    console.error("無法同步進度狀態至伺服器:", err);
                    setAllTasks(prev => prev.map(t => t.id === taskId ? { ...t, status: newStatus } : t));
                }
            };

            // 🌟 核心升級：一鍵複製 Leonardo.ai 專屬智慧咒語，並提供複製成功特效
            const handleCopyPrompt = (taskId, promptText) => {
                const textarea = document.createElement("textarea");
                textarea.value = promptText;
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand("copy");
                    setCopiedId(taskId);
                    setTimeout(() => setCopiedId(null), 2000); // 2 秒後隱藏提示
                } catch (err) {
                    alert("複製失敗，請手動複製！");
                }
                document.body.removeChild(textarea);
            };

            // 處理更換 API 網址
            const handleSaveApiUrl = (newUrl) => {
                const cleanedUrl = newUrl.trim().replace(/\/$/, ""); 
                localStorage.setItem('admin_api_url', cleanedUrl);
                setApiUrl(cleanedUrl);
                setApiStatus('checking');
                setShowSettings(false);
            };

            // 一鍵清除瀏覽器快取殘留，重置回預設網址
            const handleResetToDefault = () => {
                localStorage.removeItem('admin_api_url');
                setApiUrl(DEFAULT_API_URL);
                setApiStatus('checking');
                setShowSettings(false);
                alert("已成功清除暫存快取！系統已重置回預設後端連線網址！");
            };

            // 處理工作人員上傳生成好的雷雕圖
            const handleUploadResult = (e, taskId) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onloadend = async () => {
                    setLoadingId(taskId);
                    try {
                        const res = await fetch(`${apiUrl}/api/admin/upload-result/${taskId}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ resultImage: reader.result })
                        });
                        const data = await res.json();
                        if (data.success) {
                            const updated = allTasks.map(t => t.id === taskId 
                                ? { ...t, status: 'completed', resultImage: reader.result } 
                                : t
                            );
                            setAllTasks(updated);
                        }
                    } catch (err) {
                        alert("上傳失敗，請檢查網路連線！");
                    }
                    setLoadingId(null);
                };
                reader.readAsDataURL(file);
            };

            // 處理保存/修改備註
            const handleSaveRemark = async (taskId) => {
                const currentRemark = remarks[taskId] !== undefined 
                    ? remarks[taskId] 
                    : (allTasks.find(t => t.id === taskId)?.remark || '');

                try {
                    const res = await fetch(`${apiUrl}/api/admin/save-remark/${taskId}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ remark: currentRemark })
                    });
                    const data = await res.json();
                    if (data.success) {
                        setAllTasks(prev => prev.map(t => t.id === taskId ? { ...t, remark: currentRemark } : t));
                        alert(`號碼 #${taskId} 備註儲存成功！`);
                    }
                } catch (err) {
                    alert("備註儲存失敗，請重試");
                }
            };

            // 處理備註文字變更
            const handleRemarkChange = (taskId, value) => {
                setRemarks(prev => ({ ...prev, [taskId]: value }));
            };

            return (
                <div className="flex flex-col gap-8">
                    
                    {/* Header: 只包含「控制台」、連線狀態 與 右側動態儀表板 */}
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 bg-slate-900/60 p-6 rounded-3xl border border-slate-800/80 backdrop-blur">
                        <div className="flex flex-col gap-2">
                            <div className="flex items-center gap-3">
                                <i className="fa-solid fa-bolt text-cyan-400"></i>
                                <span className="tech-title text-3xl font-black tracking-wider">控制台</span>
                                
                                {/* 狀態指示燈 */}
                                {apiStatus === 'online' && (
                                    <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 animate-pulse">
                                        <span className="w-1.5 h-1.5 mr-1.5 bg-emerald-400 rounded-full"></span>已連線
                                    </span>
                                )}
                                {apiStatus === 'checking' && (
                                    <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-amber-500/10 text-amber-400 border border-amber-500/30">
                                        <span className="w-1.5 h-1.5 mr-1.5 bg-amber-400 rounded-full animate-ping"></span>正在連線/喚醒中
                                    </span>
                                )}
                                {apiStatus === 'offline' && (
                                    <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-rose-500/10 text-rose-400 border border-rose-500/30">
                                        <span className="w-1.5 h-1.5 mr-1.5 bg-rose-400 rounded-full"></span>連線中斷
                                    </span>
                                )}
                            </div>
                            
                            {/* 設定與強制重設按鈕 */}
                            <div className="flex items-center gap-2 flex-wrap">
                                <span className="text-xs text-slate-500 font-mono">連線網址: {apiUrl}</span>
                                <button 
                                    onClick={() => setShowSettings(!showSettings)} 
                                    className="text-xs text-slate-400 hover:text-cyan-400 transition bg-slate-800 px-2 py-0.5 rounded-md border border-slate-700"
                                >
                                    <i className="fa-solid fa-gear mr-1"></i>手動修改網址
                                </button>
                                <button 
                                    onClick={handleResetToDefault}
                                    className="text-xs text-rose-400 hover:text-rose-300 transition bg-rose-950/40 px-2 py-0.5 rounded-md border border-rose-900/50"
                                >
                                    <i className="fa-solid fa-trash-can mr-1"></i>清除快取並重設網址
                                </button>
                            </div>
                        </div>

                        {/* 右上角進度儀表板 (Dashboard) */}
                        <div className="flex gap-4 sm:gap-6 items-center bg-black/40 p-4 rounded-2xl border border-cyan-500/30 shadow-[0_0_15px_rgba(0,242,255,0.1)]">
                            <div className="text-center px-2">
                                <p className="text-[10px] text-cyan-400 font-mono tracking-widest font-bold">LATEST ID</p>
                                <p className="text-3xl font-black font-mono text-white mt-1">#{latestTicketId}</p>
                            </div>
                            <div className="h-10 w-px bg-slate-800"></div>
                            <div className="text-center px-2">
                                <p className="text-[10px] text-pink-500 font-mono tracking-widest font-bold font-black">PROGRESS</p>
                                <p className="text-3xl font-black font-mono text-white mt-1">
                                    {completedCount} <span className="text-lg text-slate-500">/ {totalTickets}</span>
                                </p>
                            </div>
                            <div className="hidden sm:block h-10 w-px bg-slate-800"></div>
                            <div className="hidden sm:block w-24">
                                <div className="text-[10px] text-slate-400 font-mono text-right mb-1">
                                    {totalTickets > 0 ? Math.round((completedCount/totalTickets)*100) : 0}%
                                </div>
                                <div className="w-full bg-slate-800 rounded-full h-1.5 overflow-hidden">
                                    <div 
                                        className="bg-gradient-to-r from-cyan-400 to-pink-500 h-full transition-all duration-500"
                                        style={{ width: `${totalTickets > 0 ? (completedCount/totalTickets)*100 : 0}%` }}
                                    ></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 智慧向下相容提示 */}
                    {legacyModeActive && (
                        <div className="bg-amber-500/10 border border-amber-500/30 rounded-2xl p-5 text-amber-300 text-sm flex flex-col gap-2">
                            <div className="flex items-center gap-2 font-bold text-amber-400 text-base">
                                <i className="fa-solid fa-triangle-exclamation"></i>
                                相容模式已啟動（成功取得排隊單！）
                            </div>
                            <div className="text-xs text-amber-300/80 leading-relaxed">
                                <p>系統偵測到您目前部署在 Render 的後端代碼為<b>舊版本</b>。我們已自動啟動相容機制為您載入排隊單，因此<b>目前功能一切正常且可以照常收單與下載</b>！</p>
                                <p className="mt-1">💡 <i>提示：若要啟用「已完成區塊分流」與「備註功能」，請記得在有空時將最新的 <code>server.js</code> 部署至 Render 平台。</i></p>
                            </div>
                        </div>
                    )}

                    {/* 智慧網址防呆系統 */}
                    {isGithubUrl && (
                        <div className="bg-amber-500/10 border-2 border-amber-500/40 rounded-2xl p-6 text-amber-300 text-sm flex flex-col gap-3 shadow-[0_0_20px_rgba(245,158,11,0.15)]">
                            <div className="flex items-center gap-2 font-bold text-amber-400 text-base">
                                <i className="fa-solid fa-triangle-exclamation text-xl"></i>
                                ⚠️ 偵測到網址錯誤設定！
                            </div>
                            <div className="text-xs text-amber-200/90 leading-relaxed space-y-2">
                                <p>您目前輸入的是 <strong>GitHub Pages 前台靜態網址</strong>，這會導致控制台無法抓取資料。</p>
                                <p>後台必須連線到您的 <strong>Render 後端伺服器</strong> 才能正常運作。</p>
                            </div>
                            <div className="flex gap-3 mt-1">
                                <button 
                                    onClick={handleResetToDefault}
                                    className="bg-amber-500 hover:bg-amber-400 text-black px-4 py-2 rounded-xl text-xs font-bold transition"
                                >
                                    一鍵修正：恢復 Render 預設網址
                                </button>
                            </div>
                        </div>
                    )}

                    {/* 彈出式 API 網址設定面板 */}
                    {showSettings && (
                        <div className="bg-slate-900 p-5 rounded-3xl border-2 border-cyan-500/40 flex flex-col md:flex-row gap-4 items-end animate-fadeIn">
                            <div className="flex-grow w-full">
                                <label className="block text-xs font-bold text-cyan-400 mb-1.5 tracking-wider"><i className="fa-solid fa-network-wired mr-1"></i>後端伺服器 API 連線網址 (API BASE URL)</label>
                                <input 
                                    type="text" 
                                    defaultValue={apiUrl}
                                    id="api-url-input"
                                    placeholder="例如: https://aicameraliveprint-back.onrender.com"
                                    className="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-cyan-500 font-mono"
                                />
                            </div>
                            <div className="flex gap-2 w-full md:w-auto">
                                <button 
                                    onClick={() => {
                                        const val = document.getElementById('api-url-input').value;
                                        handleSaveApiUrl(val);
                                    }}
                                    className="bg-cyan-500 hover:bg-cyan-400 text-black px-6 py-2.5 rounded-xl text-sm font-bold transition w-full md:w-auto"
                                >
                                    儲存並重連
                                </button>
                                <button 
                                    onClick={() => setShowSettings(false)}
                                    className="bg-slate-800 hover:bg-slate-750 text-white px-4 py-2.5 rounded-xl text-sm font-bold transition w-full md:w-auto"
                                >
                                    取消
                                </button>
                            </div>
                        </div>
                    )}

                    {/* 故障排查提示 */}
                    {apiStatus === 'offline' && !isGithubUrl && (
                        <div className="bg-rose-500/10 border border-rose-500/30 rounded-2xl p-5 text-rose-300 text-sm flex flex-col gap-2">
                            <div className="flex items-center gap-2 font-bold text-rose-400 text-base">
                                <i className="fa-solid fa-circle-exclamation text-lg"></i>
                                無法連線至後端伺服器 (錯誤原因: {connectionError || "連線逾時"})
                            </div>
                            <div className="text-xs text-rose-300/80 leading-relaxed space-y-1.5 mt-1">
                                <p>1. <b>如果您剛剛重新部署或重開機：</b> 伺服器正在啟動，請靜待 30 ~ 50 秒，系統會自動在背景重複嘗試連線，連上後會立刻顯示排隊單。</p>
                                <p>2. <b>瀏覽器快取了舊網址：</b> 請點選上方紅色的 <strong className="text-rose-400">「清除快取並重設網址」</strong> 按鈕，這會徹底強制清除瀏覽器的舊紀錄並重連預設伺服器！</p>
                                <p>3. <b>檢查網址是否拼錯：</b> 點選「手動修改網址」，檢查您的後端網址（例如 <code>-back</code> 或 <code>-backend</code> 拼寫是否正確）。</p>
                            </div>
                        </div>
                    )}

                    {/* 區塊一：進行中排隊名單 */}
                    <div className="bg-slate-900/40 p-6 rounded-3xl border border-slate-800/60">
                        <h2 className="text-xl font-bold mb-6 flex items-center gap-2 text-cyan-400">
                            <span className="w-2.5 h-2.5 bg-cyan-400 rounded-full animate-ping"></span>
                            進行中排隊名單 ({pendingTasks.length} 人在排隊)
                        </h2>

                        {pendingTasks.length === 0 ? (
                            <div className="text-center py-16 text-slate-500 border-2 border-dashed border-slate-800/60 rounded-2xl bg-black/20">
                                <i className="fa-solid fa-circle-check text-4xl text-cyan-500/40 mb-3"></i>
                                <p className="text-lg">目前無人排隊，前台靜待體驗中...</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {pendingTasks.map(task => (
                                    <div key={task.id} className="bg-slate-900 rounded-2xl overflow-hidden border border-slate-800 shadow-xl hover:border-cyan-500/50 transition duration-300">
                                        <div className="bg-gradient-to-r from-cyan-950 to-slate-900 text-white font-bold text-lg px-4 py-3 flex justify-between items-center border-b border-slate-800">
                                            <span className="text-cyan-400 font-mono">ID: #{task.id}</span>
                                            <span className="text-xs text-slate-400 font-mono font-normal"><i className="fa-regular fa-clock mr-1"></i>{task.createdAt}</span>
                                        </div>
                                        <div className="p-4 flex flex-col gap-4">
                                            <div className="relative group">
                                                <img src={task.sourceImage} className="w-full h-52 object-cover rounded-xl border border-slate-800" alt="客人原圖" />
                                                <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center transition rounded-xl">
                                                    <a href={task.sourceImage} download={`task_${task.id}.jpg`} className="bg-cyan-500 hover:bg-cyan-400 text-black px-4 py-2 rounded-lg font-bold text-sm">
                                                        <i className="fa-solid fa-magnifying-glass mr-1.5"></i>放大原圖
                                                    </a>
                                                </div>
                                            </div>
                                            
                                            {/* 🌟 智慧出征！自動為 Leonardo.ai 生成的特徵咒語展示與複製區 */}
                                            <div className="bg-slate-950 p-3.5 rounded-xl border border-cyan-500/30 flex flex-col gap-2">
                                                <div className="flex items-center justify-between">
                                                    <span className="text-xs text-cyan-400 font-bold tracking-wider flex items-center gap-1">
                                                        <i className="fa-solid fa-wand-magic-sparkles animate-pulse"></i>
                                                        Llama AI 推薦生圖咒語
                                                    </span>
                                                    {copiedId === task.id ? (
                                                        <span className="text-[10px] text-emerald-400 font-bold"><i className="fa-solid fa-check mr-0.5"></i>已複製</span>
                                                    ) : (
                                                        <span className="text-[10px] text-slate-500">專為豆豆眼客製</span>
                                                    )}
                                                </div>
                                                <p className="text-[11px] text-slate-300 font-mono break-words leading-relaxed select-all line-clamp-3 bg-black/40 p-2 rounded border border-slate-800">
                                                    {task.suggestedPrompt}
                                                </p>
                                                <button 
                                                    onClick={() => handleCopyPrompt(task.id, task.suggestedPrompt)}
                                                    className="w-full bg-cyan-950/80 hover:bg-cyan-900 border border-cyan-500/50 text-cyan-300 py-1.5 rounded-lg text-xs font-bold transition flex items-center justify-center gap-1"
                                                >
                                                    <i className="fa-regular fa-copy"></i>
                                                    一鍵複製 Leonardo 專用咒語
                                                </button>
                                            </div>

                                            {/* 狀態與進度選擇器 */}
                                            <div className="flex items-center justify-between bg-black/30 p-2 rounded-xl border border-slate-800">
                                                <span className="text-xs text-slate-400 font-bold">進度管理:</span>
                                                <select 
                                                    value={task.status} 
                                                    onChange={(e) => handleStatusChange(task.id, e.target.value)}
                                                    className="bg-slate-950 border border-slate-800 text-xs rounded-lg px-2.5 py-1.5 text-white focus:outline-none focus:border-cyan-500 font-semibold cursor-pointer"
                                                >
                                                    <option value="pending" className="text-cyan-400 bg-slate-900 font-bold">⏳ 製作中</option>
                                                    <option value="completed" className="text-emerald-400 bg-slate-900 font-bold">✅ 已完成</option>
                                                    <option value="cancelled" className="text-rose-400 bg-slate-900 font-bold">❌ 已取消</option>
                                                </select>
                                            </div>

                                            {/* 備註輸入區 */}
                                            <div className="flex gap-2">
                                                <input 
                                                    type="text" 
                                                    placeholder="新增此排隊備註 (例如：背景加愛心)..."
                                                    value={remarks[task.id] !== undefined ? remarks[task.id] : (task.remark || '')}
                                                    onChange={(e) => handleRemarkChange(task.id, e.target.value)}
                                                    className="flex-grow bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-cyan-500"
                                                />
                                                <button 
                                                    onClick={() => handleSaveRemark(task.id)}
                                                    className="bg-slate-800 hover:bg-slate-700 text-cyan-400 px-3 py-2 rounded-xl text-sm transition font-bold"
                                                >
                                                    儲存
                                                </button>
                                            </div>

                                            {/* 操作：下載 與 上傳 */}
                                            <div className="flex flex-col gap-2">
                                                <a 
                                                    href={task.sourceImage} 
                                                    download={`task_${task.id}.jpg`} 
                                                    className="w-full bg-slate-800 hover:bg-slate-750 text-white font-bold py-3 px-4 rounded-xl text-center text-sm transition flex items-center justify-center gap-2 border border-slate-700/50"
                                                >
                                                    <i className="fa-solid fa-download text-cyan-400"></i>
                                                    1. 下載照片
                                                </a>

                                                <label className={`w-full text-center font-bold py-3 px-4 rounded-xl cursor-pointer text-sm transition flex items-center justify-center gap-2 ${loadingId === task.id ? 'bg-slate-700 text-slate-400 cursor-not-allowed' : 'bg-cyan-500 hover:bg-cyan-400 text-black'}`}>
                                                    <i className="fa-solid fa-upload"></i>
                                                    {loadingId === task.id ? '雷雕圖上傳中...' : '2. 上傳完成雷雕圖'}
                                                    <input 
                                                        type="file" 
                                                        accept="image/*" 
                                                        className="hidden" 
                                                        onChange={(e) => handleUploadResult(e, task.id)}
                                                        disabled={loadingId === task.id}
                                                    />
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* 區塊二：已完成與已取消歷史紀錄 */}
                    <div className="bg-slate-900/40 p-6 rounded-3xl border border-slate-800/60">
                        <h2 className="text-xl font-bold mb-6 flex items-center gap-2 text-pink-500">
                            <i className="fa-solid fa-circle-check"></i>
                            已處理歷史紀錄 ({completedTasks.length} 筆已處理)
                        </h2>

                        {completedTasks.length === 0 ? (
                            <div className="text-center py-12 text-slate-600 border-2 border-dashed border-slate-800 rounded-2xl">
                                <p className="text-sm">尚無處理記錄，等待第一位體驗者誕生！</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {completedTasks.map(task => (
                                    <div key={task.id} className="bg-slate-900/50 rounded-2xl overflow-hidden border border-slate-800/85 shadow hover:border-pink-500/30 transition duration-300">
                                        <div className="bg-slate-900 text-white font-bold text-sm px-4 py-3 flex justify-between items-center border-b border-slate-800/80">
                                            <span className={task.status === 'cancelled' ? "text-rose-500 font-mono" : "text-pink-500 font-mono"}>ID: #{task.id}</span>
                                            
                                            {/* 頂部狀態徽章 */}
                                            {task.status === 'cancelled' ? (
                                                <span className="bg-rose-500/10 text-rose-500 text-[10px] px-2.5 py-0.5 rounded-full font-bold">
                                                    <i className="fa-solid fa-ban mr-1"></i>已取消離線
                                                </span>
                                            ) : (
                                                <span className="bg-emerald-500/10 text-emerald-400 text-[10px] px-2.5 py-0.5 rounded-full font-bold">
                                                    <i className="fa-solid fa-circle-check mr-1"></i>已完成
                                                </span>
                                            )}
                                        </div>
                                        <div className="p-4 flex flex-col gap-4">
                                            
                                            {/* 原圖 vs 風格化雷雕圖 完美並列呈現 */}
                                            <div className="grid grid-cols-2 gap-2">
                                                <div>
                                                    <p className="text-[10px] text-slate-500 mb-1">原始拍照照片</p>
                                                    <img src={task.sourceImage} className="w-full h-28 object-cover rounded-lg border border-slate-850" alt="原圖" />
                                                </div>
                                                <div>
                                                    <p className="text-[10px] text-pink-500 mb-1">風格化雷雕圖</p>
                                                    {task.status === 'cancelled' ? (
                                                        <div className="w-full h-28 flex flex-col items-center justify-center rounded-lg bg-rose-950/20 border border-rose-900/30 text-rose-400">
                                                            <i className="fa-solid fa-ban text-lg mb-1"></i>
                                                            <span className="text-[10px] font-bold">訂單已取消</span>
                                                        </div>
                                                    ) : task.resultImage ? (
                                                        <img src={task.resultImage} className="w-full h-28 object-cover rounded-lg border border-pink-500/20" alt="完成圖" />
                                                    ) : (
                                                        <div className="w-full h-28 flex flex-col items-center justify-center rounded-lg bg-slate-950 border border-slate-800 text-slate-500">
                                                            <i className="fa-solid fa-image text-lg mb-1 animate-pulse"></i>
                                                            <span className="text-[10px]">待上傳風格圖</span>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>

                                            {/* 行動端與平板操作：隨時可以在已處理歷史中切換進度 */}
                                            <div className="flex items-center justify-between bg-black/20 p-2 rounded-xl border border-slate-800">
                                                <span className="text-xs text-slate-400 font-bold">變更狀態:</span>
                                                <select 
                                                    value={task.status} 
                                                    onChange={(e) => handleStatusChange(task.id, e.target.value)}
                                                    className="bg-slate-950 border border-slate-800 text-xs rounded-lg px-2 py-1 text-white focus:outline-none focus:border-cyan-500 font-semibold cursor-pointer"
                                                >
                                                    <option value="pending" className="text-cyan-400 bg-slate-900">⏳ 製作中</option>
                                                    <option value="completed" className="text-emerald-400 bg-slate-900">✅ 已完成</option>
                                                    <option value="cancelled" className="text-rose-400 bg-slate-900">❌ 已取消</option>
                                                </select>
                                            </div>

                                            {/* 已完成備註編輯 */}
                                            <div className="flex gap-2 bg-black/20 p-2.5 rounded-xl border border-slate-800">
                                                <input 
                                                    type="text" 
                                                    placeholder="修改備註或紀錄..."
                                                    value={remarks[task.id] !== undefined ? remarks[task.id] : (task.remark || '')}
                                                    onChange={(e) => handleRemarkChange(task.id, e.target.value)}
                                                    className="flex-grow bg-transparent text-xs text-slate-300 focus:outline-none"
                                                />
                                                <button 
                                                    onClick={() => handleSaveRemark(task.id)}
                                                    className="text-pink-500 hover:text-pink-400 text-xs font-bold px-2"
                                                >
                                                    更新備註
                                                </button>
                                            </div>

                                            {/* 重新上傳覆蓋按鈕 */}
                                            {task.status !== 'cancelled' && (
                                                <label className="w-full text-center font-bold py-2 px-3 rounded-lg cursor-pointer text-xs bg-slate-800 hover:bg-slate-750 text-slate-400 transition flex items-center justify-center gap-1.5">
                                                    <i className="fa-solid fa-arrows-rotate text-pink-500"></i>
                                                    重新上傳風格圖
                                                    <input 
                                                        type="file" 
                                                        accept="image/*" 
                                                        className="hidden" 
                                                        onChange={(e) => handleUploadResult(e, task.id)}
                                                    />
                                                </label>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Footer */}
                    <div className="w-full flex justify-end items-center opacity-40 py-4">
                        <p className="text-xs font-mono tracking-wider text-cyan-400 font-bold">2026 AI INNOVATION CONTROL PANEL v2.6</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminPanel />); 
    </script>
</body>
</html>
