<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 BEST AI AWARDS | 後台智慧連線控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ai-cyan: #00f2ff;
            --ai-pink: #ff00d0;
            --ai-dark: #020617;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0b1329;
            background-image: radial-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
        .cyber-panel {
            background: rgba(15, 23, 42, 0.65);
            border: 1px solid rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(12px);
        }
        .cyber-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(0, 242, 255, 0.15);
            transition: all 0.3s ease;
        }
        .cyber-card:hover {
            border-color: var(--ai-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
        }
        .glow-text {
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }
        .cyber-select {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #f1f5f9;
            font-weight: bold;
            font-size: 0.72rem;
            padding: 0.35rem 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
            width: 130px;
            text-align: left;
        }
        .cyber-select:focus {
            border-color: var(--ai-cyan);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen p-4 md:p-8">

    <input type="file" id="global-file-input" class="hidden" accept="image/*" />

    <header class="max-w-7xl mx-auto mb-8 flex flex-col sm:flex-row justify-between items-center border-b border-cyan-500/20 pb-4 gap-4">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-cyan-400 animate-ping"></div>
            <h1 class="text-2xl font-black tracking-wider text-white">
                智慧創新大賞 <span class="text-cyan-400 font-mono font-normal text-lg">HYBRID CORE</span>
            </h1>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-xs bg-slate-800 px-3 py-1.5 rounded-md text-slate-400 font-mono border border-slate-700">LIVE SYNC ENABLED</span>
            <button onclick="fetchAllTasks()" class="bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold px-4 py-2 rounded-lg text-sm transition flex items-center gap-2 shadow-[0_0_15px_rgba(0,242,255,0.3)]">
                <i class="fa-solid fa-arrows-rotate"></i> 重新整理數據
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div class="mb-6 flex gap-4 text-xs font-bold tracking-wider">
            <span class="text-cyan-400"><i class="fa-solid fa-sliders mr-1"></i> 即時連動控制面板（支援手動多維特徵微調與結果圖上傳）</span>
        </div>

        <div id="tasks-container" class="grid grid-cols-1 gap-6">
            <div class="text-center py-12 text-slate-400 border border-dashed border-slate-700 rounded-2xl">
                <i class="fa-solid fa-circle-notch animate-spin text-3xl text-cyan-400 mb-3"></i>
                <p>正在同步 Render 後端隊列資訊...</p>
            </div>
        </div>
    </main>

    <script>
        const API_BASE_URL = "https://aicameraliveprint-back.onrender.com";
        
        let localTasksCache = {};
        let currentTargetTaskId = null; // 當前正在上傳的號碼牌 ID

        // 多維度特徵資料庫與字典定義
        const femaleStyles = [
            { value: "high ponytail", label: "高馬尾 🐎" },
            { value: "low ponytail", label: "低馬尾 🐴" },
            { value: "long curly hair", label: "長捲髮 👩‍🦱" },
            { value: "long straight hair", label: "長直髮 👩‍🦰" },
            { value: "princess style", label: "公主頭 👑" },
            { value: "messy bun", label: "包包頭 🍡" },
            { value: "short bob hair", label: "短髮 👩" }
        ];

        const maleStyles = [
            { value: "short curly hair", label: "短捲髮 🌀" },
            { value: "bangs hair style", label: "帥氣瀏海 👦" },
            { value: "slicked-back hair style", label: "經典油頭 🎩" },
            { value: "crew cut", label: "俐落吋頭 💈" },
            { value: "korean comma hair style", label: "韓系逗號頭 🇰🇷" },
            { value: "3mm buzz cut", label: "3分頭 🦲" },
            { value: "5mm buzz cut", label: "5分頭 🥚" },
            { value: "undercut style", label: "側邊漸層 (Undercut) ⚡" },
            { value: "messy textured hair style", label: "日系蓬鬆亂髮 🍃" }
        ];

        // 智慧特徵正向解讀器
        function extractFeature(prompt, featureType) {
            if (!prompt) return "";
            const p = prompt.toLowerCase();
            
            if (featureType === 'gender') {
                if (p.includes('of a woman') || p.includes('woman')) return 'woman';
                if (p.includes('of a man') || p.includes('man')) return 'man';
                if (p.includes('of a girl') || p.includes('girl')) return 'girl';
                if (p.includes('of a boy') || p.includes('boy')) return 'boy';
                return 'woman';
            }
            if (featureType === 'style') {
                const allStyles = [...femaleStyles, ...maleStyles];
                for (const s of allStyles) {
                    if (p.includes(s.value)) return s.value;
                }
                return 'long straight hair';
            }
            if (featureType === 'bangs') {
                if (p.includes('wispy bangs')) return 'wispy bangs';
                if (p.includes('side-swept bangs')) return 'side-swept bangs';
                if (p.includes('blunt bangs')) return 'blunt bangs';
                if (p.includes('center-parted')) return 'center-parted';
                if (p.includes('side-parted')) return 'side-parted';
                return 'no bangs';
            }
            if (featureType === 'hairColor') {
                if (p.includes('dark brown hair')) return 'dark brown';
                if (p.includes('chestnut brown hair')) return 'chestnut brown';
                if (p.includes('blonde hair')) return 'blonde';
                if (p.includes('dyed pink hair')) return 'dyed pink';
                if (p.includes('dyed purple hair')) return 'dyed purple';
                if (p.includes('silver grey hair')) return 'silver grey';
                return 'black';
            }
            if (featureType === 'clothingColor') {
                if (p.includes('solid white')) return 'white';
                if (p.includes('solid red')) return 'red';
                if (p.includes('solid blue')) return 'blue';
                if (p.includes('solid green')) return 'green';
                if (p.includes('solid yellow')) return 'yellow';
                if (p.includes('solid pink')) return 'pink';
                if (p.includes('solid grey')) return 'grey';
                return 'black';
            }
            if (featureType === 'glasses') {
                return p.includes('wearing glasses') ? 'wearing glasses' : 'no glasses';
            }
            if (featureType === 'necklace') {
                return p.includes('wearing necklace') ? 'wearing necklace' : 'no necklace';
            }
            if (featureType === 'earrings') {
                return p.includes('wearing earrings') ? 'wearing earrings' : 'no earrings';
            }
        }

        function getStyleOptions(gender, currentStyle) {
            const isFemale = (gender === 'woman' || gender === 'girl');
            const styles = isFemale ? femaleStyles : maleStyles;
            return styles.map(s => `
                <option value="${s.value}" ${currentStyle === s.value ? 'selected' : ''}>${s.label}</option>
            `).join('');
        }

        function onGenderChange(taskId) {
            const gender = document.getElementById(`select-gender-${taskId}`).value;
            const styleSelect = document.getElementById(`select-style-${taskId}`);
            
            const isFemale = (gender === 'woman' || gender === 'girl');
            const targetStyles = isFemale ? femaleStyles : maleStyles;
            const currentStyle = styleSelect.value;
            
            const styleExists = targetStyles.some(s => s.value === currentStyle);
            const newStyleDefault = styleExists ? currentStyle : targetStyles[0].value;

            styleSelect.innerHTML = getStyleOptions(gender, newStyleDefault);
            updateLivePrompt(taskId);
        }

        function updateLivePrompt(taskId) {
            const task = localTasksCache[taskId];
            if (!task) return;

            const gender = document.getElementById(`select-gender-${taskId}`).value;
            const style = document.getElementById(`select-style-${taskId}`).value;
            const bangs = document.getElementById(`select-bangs-${taskId}`).value;
            const hairColor = document.getElementById(`select-hair-color-${taskId}`).value;
            const clothingColor = document.getElementById(`select-clothing-color-${taskId}`).value;
            const glasses = document.getElementById(`select-glasses-${taskId}`).value;
            const necklace = document.getElementById(`select-necklace-${taskId}`).value;
            const earrings = document.getElementById(`select-earrings-${taskId}`).value;

            const glassesText = glasses === 'wearing glasses' ? 'wearing glasses' : 'no glasses';
            const necklaceText = necklace === 'wearing necklace' ? 'wearing necklace' : 'no necklace';
            const earringsText = earrings === 'wearing earrings' ? 'wearing earrings' : 'no earrings';

            let bangsText = "no bangs";
            if (bangs === 'wispy bangs' || bangs === 'blunt bangs' || bangs === 'side-swept bangs') {
                bangsText = `${bangs}`;
            } else if (bangs === 'center-parted' || bangs === 'side-parted') {
                bangsText = `no bangs with a ${bangs}`;
            }

            const updatedPrompt = `Quirky minimalist hand-drawn doodle portrait of a ${gender} with long straight ${hairColor} hair styled in a ${style} with ${bangsText}, showing a smiling. The person is ${glassesText}, ${necklaceText}, and ${earringsText}. Wearing a plain unpatterned solid ${clothingColor} t-shirt, absolutely no logos, no graphics, no text on shirt. Naive art, chibi kawaii aesthetic. Extreme chibi proportions, huge oversized head, tiny small body, narrow sloping shoulders. Extremely simplified facial features, simple vertical black dot eyes, tiny line nose, soft blurred pink blush on cheeks. Smooth clean bare neck, absolutely no neck lines. Clean solid color hair, no white dots, no shading. Drawn with a monoline marker brush. Flat soft colors. Solid pure white background.`;

            document.getElementById(`textarea-${taskId}`).value = updatedPrompt;
            task.suggestedPrompt = updatedPrompt;
        }

        // 🌟 改良型常駐觸發器：點擊按鈕直接喚醒最外層的常駐選擇器，完美避開所有刷新 Bug
        function triggerUploadFlow(taskId, e) {
            if(e) e.stopPropagation();
            currentTargetTaskId = taskId;
            document.getElementById('global-file-input').click();
        }

        // 初始化常駐檔案選擇器的接聽事件 (寫在外層，永不重繪)
        document.getElementById('global-file-input').addEventListener('change', async function() {
            const taskId = currentTargetTaskId;
            if (!taskId) return;

            const file = this.files[0];
            if (!file) return;

            // 改變對應卡片的按鈕狀態為上傳中
            const statusContainer = document.getElementById(`upload-status-${taskId}`);
            if (statusContainer) {
                statusContainer.innerHTML = `
                    <i class="fa-solid fa-spinner animate-spin text-2xl text-cyan-400 mb-1.5"></i>
                    <span>上傳中...</span>
                `;
            }

            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64Data = e.target.result;
                try {
                    console.log(`正在上傳號碼牌 #${taskId} 的結果圖至 Render...`);
                    const res = await fetch(`${API_BASE_URL}/api/admin/upload-result/${taskId}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ resultImage: base64Data })
                    });
                    const data = await res.json();
                    if (data.success) {
                        console.log(`✅ 號碼 #${taskId} 上傳成功！`);
                        fetchAllTasks(); // 成功後整理數據
                    } else {
                        alert("上傳失敗：" + (data.error || "未知錯誤"));
                        fetchAllTasks();
                    }
                } catch (err) {
                    console.error("上傳發生斷線錯誤:", err);
                    alert("連線 Render 後端超時！請檢查電腦網路是否已切換為手機熱點開通連線！");
                    fetchAllTasks();
                }
            };
            reader.readAsDataURL(file);
            this.value = ""; // 清空，允許重複選同張圖
        });

        // 獲取後端即時資料
        async function fetchAllTasks() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/all-tasks`);
                const data = await res.json();
                if (data.success) {
                    data.tasks.forEach(t => {
                        if (!localTasksCache[t.id]) {
                            localTasksCache[t.id] = t;
                        }
                    });
                    renderTasks(data.tasks);
                }
            } catch (err) {
                console.error("與後端中斷連線:", err);
            }
        }

        function copyToClipboard(taskId, btnId) {
            const text = document.getElementById(`textarea-${taskId}`).value;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById(btnId);
                const originalHtml = btn.innerHTML;
                btn.innerHTML = `<i class="fa-solid fa-circle-check mr-1"></i> 已完美複製！`;
                btn.className = "bg-emerald-500 text-slate-950 font-black px-4 py-2 rounded-xl text-sm transition flex items-center gap-1 shadow-[0_0_15px_rgba(16,185,129,0.4)]";
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    btn.className = "w-full bg-cyan-400 hover:bg-cyan-300 text-slate-950 font-black py-2.5 rounded-xl text-sm tracking-wider transition flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(0,242,255,0.2)]";
                }, 1200);
            });
        }

        // 渲染 UI
        function renderTasks(tasks) {
            const container = document.getElementById('tasks-container');
            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-slate-500 border border-dashed border-slate-800 rounded-2xl">
                        <i class="fa-solid fa-box-open text-4xl mb-2"></i>
                        <p>展場目前尚無排隊流水號</p>
                    </div>`;
                return;
            }

            const currentSelections = {};
            tasks.forEach(t => {
                const gEl = document.getElementById(`select-gender-${t.id}`);
                if (gEl) {
                    currentSelections[t.id] = {
                        gender: gEl.value,
                        style: document.getElementById(`select-style-${t.id}`).value,
                        bangs: document.getElementById(`select-bangs-${t.id}`).value,
                        hairColor: document.getElementById(`select-hair-color-${t.id}`).value,
                        clothingColor: document.getElementById(`select-clothing-color-${t.id}`).value,
                        glasses: document.getElementById(`select-glasses-${t.id}`).value,
                        necklace: document.getElementById(`select-necklace-${t.id}`).value,
                        earrings: document.getElementById(`select-earrings-${t.id}`).value,
                        textareaVal: document.getElementById(`textarea-${t.id}`).value
                    };
                }
            });

            container.innerHTML = tasks.map(task => {
                const currentGender = currentSelections[task.id]?.gender || extractFeature(task.suggestedPrompt, 'gender');
                const currentStyle = currentSelections[task.id]?.style || extractFeature(task.suggestedPrompt, 'style');
                const currentBangs = currentSelections[task.id]?.bangs || extractFeature(task.suggestedPrompt, 'bangs');
                const currentHairColor = currentSelections[task.id]?.hairColor || extractFeature(task.suggestedPrompt, 'hairColor');
                const currentClothingColor = currentSelections[task.id]?.clothingColor || extractFeature(task.suggestedPrompt, 'clothingColor');
                const currentGlasses = currentSelections[task.id]?.glasses || extractFeature(task.suggestedPrompt, 'glasses');
                const currentNecklace = currentSelections[task.id]?.necklace || extractFeature(task.suggestedPrompt, 'necklace');
                const currentEarrings = currentSelections[task.id]?.earrings || extractFeature(task.suggestedPrompt, 'earrings');
                const textValue = currentSelections[task.id]?.textareaVal || task.suggestedPrompt;

                return `
                <div class="cyber-card p-5 md:p-6 rounded-2xl flex flex-col lg:flex-row gap-6 items-start relative overflow-hidden">
                    
                    <div class="flex flex-col items-center gap-3 w-full lg:w-auto flex-shrink-0">
                        <div class="text-center">
                            <span class="text-[10px] font-mono tracking-widest text-cyan-400 block font-bold">QUEUE NO</span>
                            <span class="text-4xl font-black text-white font-mono glow-text">#${task.id}</span>
                        </div>
                        <div class="flex lg:flex-col gap-3 mt-1">
                            <div class="text-center">
                                <p class="text-[9px] text-slate-400 mb-1 font-bold">📷 現場原圖</p>
                                <img src="${task.sourceImage}" class="w-28 h-28 object-cover rounded-xl border border-slate-700 bg-black shadow-inner" />
                            </div>
                            
                            <div class="text-center relative">
                                <p class="text-[9px] text-emerald-400 mb-1 font-bold">🎨 雷雕結果圖</p>
                                ${task.resultImage ? 
                                    `<div class="relative group cursor-pointer w-28 h-28">
                                        <img src="${task.resultImage}" class="w-full h-full object-cover rounded-xl border border-emerald-500/30 bg-black shadow-md" />
                                        <button onclick="triggerUploadFlow('${task.id}', event)" class="absolute inset-0 bg-black/75 opacity-0 group-hover:opacity-100 flex flex-col items-center justify-center rounded-xl text-[10px] text-cyan-400 font-bold transition-opacity duration-200">
                                            <i class="fa-solid fa-cloud-arrow-up text-lg mb-1"></i>重新上傳
                                        </button>
                                     </div>` : 
                                    `<button onclick="triggerUploadFlow('${task.id}', event)" id="upload-status-${task.id}" class="w-28 h-28 rounded-xl border border-dashed border-cyan-500/40 hover:border-cyan-400 flex flex-col items-center justify-center text-cyan-400/80 hover:text-cyan-400 text-[10px] bg-cyan-950/20 hover:bg-cyan-950/40 transition-all duration-200 cursor-pointer">
                                        <i class="fa-solid fa-cloud-arrow-up text-2xl mb-1.5 text-cyan-400 animate-bounce"></i>
                                        <span>上傳結果圖</span>
                                     </button>`
                                }
                            </div>
                        </div>
                    </div>

                    <div class="flex-grow w-full grid grid-cols-1 md:grid-cols-12 gap-5">
                        
                        <div class="md:col-span-6 flex flex-col justify-between h-full min-h-[180px]">
                            <div>
                                <label class="text-[11px] font-bold text-slate-300 tracking-wider flex items-center gap-1.5 mb-1.5">
                                    <i class="fa-solid fa-code text-cyan-400"></i> Leonardo 專用純英文咒語 (連動中)
                                </label>
                                <textarea id="textarea-${task.id}" readonly class="w-full h-[180px] bg-slate-950/90 text-slate-400 p-3 rounded-xl border border-slate-800 text-xs font-mono resize-none focus:outline-none select-all focus:border-cyan-500/50">${textValue}</textarea>
                            </div>
                            <div class="mt-3">
                                <button id="btn-${task.id}" onclick="copyToClipboard('${task.id}', 'btn-${task.id}')" class="w-full bg-cyan-400 hover:bg-cyan-300 text-slate-950 font-black py-2.5 rounded-xl text-sm tracking-wider transition flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(0,242,255,0.2)]">
                                    <i class="fa-solid fa-bolt"></i> 一鍵複製 Leonardo 專用咒語
                                </button>
                            </div>
                        </div>

                        <div class="md:col-span-6 border-t md:border-t-0 md:border-l border-slate-800 pt-4 md:pt-0 md:pl-5 flex flex-col justify-between">
                            <div>
                                <label class="text-[11px] font-bold text-cyan-400 tracking-wider flex items-center gap-1.5 mb-3">
                                    <i class="fa-solid fa-sliders text-cyan-400"></i> 現場特徵修正選單 (變更後自動更新左側)
                                </label>
                                
                                <div class="grid grid-cols-2 gap-2">
                                    
                                    <div class="flex flex-col gap-1 bg-slate-900/50 p-2 rounded-lg border border-slate-800/60">
                                        <span class="text-[10px] font-bold text-slate-400">身分性別</span>
                                        <select id="select-gender-${task.id}" onchange="onGenderChange('${task.id}')" class="cyber-select w-full">
                                            <option value="woman" ${currentGender === 'woman' ? 'selected' : ''}>女性 👩</option>
                                            <option value="man" ${currentGender === 'man' ? 'selected' : ''}>男性 👨</option>
                                            <option value="girl" ${currentGender === 'girl' ? 'selected' : ''}>女孩 👧</option>
                                            <option value="boy" ${currentGender === 'boy' ? 'selected' : ''}>男孩 👦</option>
                                        </select>
                                    </div>

                                    <div class="flex flex-col gap-1 bg-slate-900/50 p-2 rounded-lg border border-slate-800/60">
                                        <span class="text-[10px] font-bold text-yellow-400">髮型款式</span>
                                        <select id="select-style-${task.id}" onchange="updateLivePrompt('${task.id}')" class="cyber-select w-full text-yellow-400">
                                            ${getStyleOptions(currentGender, currentStyle)}
                                        </select>
                                    </div>

                                    <div class="flex flex-col gap-1 bg-slate-900/50 p-2 rounded-lg border border-slate-800/60">
                                        <span class="text-[10px] font-bold text-slate-400">瀏海/分線</span>
                                        <select id="select-bangs-${task.id}" onchange="updateLivePrompt('${task.id}')" class="cyber-select w-full text-emerald-400">
                                            <option value="no bangs" ${currentBangs === 'no bangs' ? 'selected' : ''}>無瀏海 ❌</option>
                                            <option value="wispy bangs" ${currentBangs === 'wispy bangs' ? 'selected' : ''}>空氣瀏海 🌬️</option>
                                            <option value="side-swept bangs" ${currentBangs === 'side-swept bangs' ? 'selected' : ''}>斜瀏海 🍃</option>
                                            <option value="blunt bangs" ${currentBangs === 'blunt bangs' ? 'selected' : ''}>標準瀏海 💇</option>
                                            <option value="center-parted" ${currentBangs === 'center-parted' ? 'selected' : ''}>中分 ↔️</option>
                                            <option value="side-parted" ${currentBangs === 'side-parted' ? 'selected' : ''}>旁分 ↗️</option>
                                        </select>
                                    </div>

                                    <div class="flex flex-col gap-1 bg-slate-900/50 p-2 rounded-lg border border-slate-800/60">
                                        <span class="text-[10px] font-bold text-slate-400">頭髮顏色</span>
                                        <select id="select-hair-color-${task.id}" onchange="updateLivePrompt('${task.id}')" class="cyber-select w-full">
                                            <option value="black" ${currentHairColor === 'black' ? 'selected' : ''}>經典黑色 🖤</option>
                                            <option value="dark brown" ${currentHairColor === 'dark brown' ? 'selected' : ''}>深棕色 🤎</option>
                                            <option value="chestnut brown" ${currentHairColor === 'chestnut brown' ? 'selected' : ''}>栗子色 🌰</option>
                                            <option value="blonde" ${currentHairColor === 'blonde' ? 'selected' : ''}>璀璨金色 💛</option>
                                            <option value="dyed pink" ${currentHairColor === 'dyed pink' ? 'selected' : ''}>漸層粉紅 💗</option>
                                            <option value="dyed purple" ${currentHairColor === 'dyed purple' ? 'selected' : ''}>潮流深紫 💜</option>
                                            <option value="silver grey" ${currentHairColor === 'silver grey' ? 'selected' : ''}>銀河灰色 🩶</option>
                                        </select>
                                    </div>

                                    <div class="flex flex-col gap-1 bg-slate-900/50 p-2 rounded-lg border border-slate-800/60">
                                        <span class="text-[10px] font-bold text-slate-400">衣服顏色</span>
                                        <select id="select-clothing-color-${task.id}" onchange="updateLivePrompt('${task.id}')" class="cyber-select w-full">
                                            <option value="black" ${currentClothingColor === 'black' ? 'selected' : ''}>極致黑 🖤</option>
                                            <option value="white" ${currentClothingColor === 'white' ? 'selected' : ''}>純潔白 🤍</option>
                                            <option value="red" ${currentClothingColor === 'red' ? 'selected' : ''}>熱情紅 ❤️</option>
                                            <option value="blue" ${currentClothingColor === 'blue' ? 'selected' : ''}>科技藍 💙</option>
                                            <option value="green" ${currentClothingColor === 'green' ? 'selected' : ''}>森林綠 💚</option>
                                            <option value="yellow" ${currentClothingColor === 'yellow' ? 'selected' : ''}>活力黃 💛</option>
                                            <option value="pink" ${currentClothingColor === 'pink' ? 'selected' : ''}>甜美粉 🩷</option>
                                            <option value="grey" ${currentClothingColor === 'grey' ? 'selected' : ''}>簡約灰 🩶</option>
                                        </select>
                                    </div>

                                    <div class="flex flex-col gap-1 bg-slate-900/50 p-2 rounded-lg border border-slate-800/60">
                                        <span class="text-[10px] font-bold text-slate-400">配戴眼鏡</span>
                                        <select id="select-glasses-${task.id}" onchange="updateLivePrompt('${task.id}')" class="cyber-select w-full ${currentGlasses === 'wearing glasses' ? 'text-cyan-400 font-extrabold' : 'text-slate-400'}">
                                            <option value="wearing glasses" ${currentGlasses === 'wearing glasses' ? 'selected' : ''}>有戴眼鏡 👓</option>
                                            <option value="no glasses" ${currentGlasses === 'no glasses' ? 'selected' : ''}>未戴眼鏡 ❌</option>
                                        </select>
                                    </div>

                                    <div class="flex flex-col gap-1 bg-slate-900/50 p-2 rounded-lg border border-slate-800/60">
                                        <span class="text-[10px] font-bold text-slate-400">項鍊飾品</span>
                                        <select id="select-necklace-${task.id}" onchange="updateLivePrompt('${task.id}')" class="cyber-select w-full text-slate-400">
                                            <option value="no necklace" ${currentNecklace === 'no necklace' ? 'selected' : ''}>無項鍊 ❌</option>
                                            <option value="wearing necklace" ${currentNecklace === 'wearing necklace' ? 'selected' : ''}>有戴項鍊 ✨</option>
                                        </select>
                                    </div>

                                    <div class="flex flex-col gap-1 bg-slate-900/50 p-2 rounded-lg border border-slate-800/60">
                                        <span class="text-[10px] font-bold text-slate-400">耳環飾品</span>
                                        <select id="select-earrings-${task.id}" onchange="updateLivePrompt('${task.id}')" class="cyber-select w-full text-slate-400">
                                            <option value="no earrings" ${currentEarrings === 'no earrings' ? 'selected' : ''}>無耳環 ❌</option>
                                            <option value="wearing earrings" ${currentEarrings === 'wearing earrings' ? 'selected' : ''}>有戴耳環 💎</option>
                                        </select>
                                    </div>

                                </div>
                            </div>

                            <div class="mt-4 pt-2 border-t border-slate-800/60 flex items-center justify-between text-[10px] text-slate-500 font-mono">
                                <div>時間: ${task.createdAt || '--:--'}</div>
                                <span class="text-cyan-500/80 font-sans font-bold">
                                    ${task.status === 'completed' ? '✅ 已上傳結果' : '⏳ 排隊中'}
                                </span>
                            </div>
                        </div>

                    </div>
                </div>
                `;
            }).join('');
            
            // 重新同步恢復值
            tasks.forEach(t => {
                if (currentSelections[t.id]) {
                    document.getElementById(`select-gender-${t.id}`).value = currentSelections[t.id].gender;
                    document.getElementById(`select-style-${t.id}`).innerHTML = getStyleOptions(currentSelections[t.id].gender, currentSelections[t.id].style);
                    
                    document.getElementById(`select-style-${t.id}`).value = currentSelections[t.id].style;
                    document.getElementById(`select-bangs-${t.id}`).value = currentSelections[t.id].bangs;
                    document.getElementById(`select-hair-color-${t.id}`).value = currentSelections[t.id].hairColor;
                    document.getElementById(`select-clothing-color-${t.id}`).value = currentSelections[t.id].clothingColor;
                    document.getElementById(`select-glasses-${t.id}`).value = currentSelections[t.id].glasses;
                    document.getElementById(`select-necklace-${t.id}`).value = currentSelections[t.id].necklace;
                    document.getElementById(`select-earrings-${t.id}`).value = currentSelections[t.id].earrings;
                    document.getElementById(`textarea-${t.id}`).value = currentSelections[t.id].textareaVal;
                }
            });
        }

        fetchAllTasks();
        setInterval(fetchAllTasks, 3500);
    </script>
</body>
</html>
