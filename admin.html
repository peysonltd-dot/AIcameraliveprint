<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 BEST AI AWARDS | 後台智慧連線控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ai-cyan: #00f2ff;
            --ai-pink: #ff00d0;
            --ai-dark: #020617;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0b1329;
            background-image: radial-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
        .cyber-panel {
            background: rgba(15, 23, 42, 0.65);
            border: 1px solid rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(12px);
        }
        .cyber-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(0, 242, 255, 0.15);
            transition: all 0.3s ease;
        }
        .cyber-card:hover {
            border-color: var(--ai-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
        }
        .glow-text {
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }
        /* 科技感下拉選單核心樣式 */
        .cyber-select {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #f1f5f9;
            font-weight: bold;
            font-size: 0.75rem;
            padding: 0.4rem 0.6rem;
            border-radius: 0.5rem;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }
        .cyber-select:focus {
            border-color: var(--ai-cyan);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen p-4 md:p-8">

    <!-- 頂部導覽列 -->
    <header class="max-w-7xl mx-auto mb-8 flex flex-col sm:flex-row justify-between items-center border-b border-cyan-500/20 pb-4 gap-4">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-cyan-400 animate-ping"></div>
            <h1 class="text-2xl font-black tracking-wider text-white">
                智慧創新大賞 <span class="text-cyan-400 font-mono font-normal text-lg">HYBRID CORE</span>
            </h1>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-xs bg-slate-800 px-3 py-1.5 rounded-md text-slate-400 font-mono border border-slate-700">LIVE SYNC ENABLED</span>
            <button onclick="fetchAllTasks()" class="bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold px-4 py-2 rounded-lg text-sm transition flex items-center gap-2 shadow-[0_0_15px_rgba(0,242,255,0.3)]">
                <i class="fa-solid fa-arrows-rotate"></i> 重新整理數據
            </button>
        </div>
    </header>

    <!-- 主容器 -->
    <main class="max-w-7xl mx-auto">
        <div class="mb-6 flex gap-4 text-xs font-bold tracking-wider">
            <span class="text-cyan-400"><i class="fa-solid fa-sliders mr-1"></i> 即時連動控制面板（支援手動微調與結果圖上傳）</span>
        </div>

        <div id="tasks-container" class="grid grid-cols-1 gap-6">
            <div class="text-center py-12 text-slate-400 border border-dashed border-slate-700 rounded-2xl">
                <i class="fa-solid fa-circle-notch animate-spin text-3xl text-cyan-400 mb-3"></i>
                <p>正在同步 Render 後端隊列資訊...</p>
            </div>
        </div>
    </main>

    <script>
        const API_BASE_URL = "https://aicameraliveprint-back.onrender.com";
        
        // 全局儲存任務狀態，用於手動連動重組
        let localTasksCache = {};

        // 智慧特徵正向解讀器 (從後端發回的原始咒語中提煉特徵)
        function extractFeature(prompt, featureType) {
            if (!prompt) return "";
            const p = prompt.toLowerCase();
            
            if (featureType === 'gender') {
                if (p.includes('of a woman') || p.includes('woman')) return 'woman';
                if (p.includes('of a man') || p.includes('man')) return 'man';
                if (p.includes('of a girl') || p.includes('girl')) return 'girl';
                if (p.includes('of a boy') || p.includes('boy')) return 'boy';
                return 'woman';
            }
            if (featureType === 'style') {
                if (p.includes('messy bun')) return 'messy bun';
                if (p.includes('ponytail')) return 'ponytail';
                if (p.includes('princess')) return 'princess';
                if (p.includes('braids')) return 'braids';
                return 'loose hair';
            }
            if (featureType === 'glasses') {
                return p.includes('wearing glasses') ? 'wearing glasses' : 'no glasses';
            }
            if (featureType === 'necklace') {
                return p.includes('wearing necklace') ? 'wearing necklace' : 'no necklace';
            }
            if (featureType === 'earrings') {
                return p.includes('wearing earrings') ? 'wearing earrings' : 'no earrings';
            }
        }

        // 🌟 核心引擎：當工作人員拉動選單，0.01秒無感重組最純淨的英文 Leonardo 提示詞
        function updateLivePrompt(taskId) {
            const task = localTasksCache[taskId];
            if (!task) return;

            // 讀取當前選單的值
            const gender = document.getElementById(`select-gender-${taskId}`).value;
            const style = document.getElementById(`select-style-${taskId}`).value;
            const glasses = document.getElementById(`select-glasses-${taskId}`).value;
            const necklace = document.getElementById(`select-necklace-${taskId}`).value;
            const earrings = document.getElementById(`select-earrings-${taskId}`).value;

            // 依選單重新配對純英文語意（100% 過濾掉任何中文括弧）
            const glassesText = glasses === 'wearing glasses' ? 'wearing glasses' : 'no glasses';
            const necklaceText = necklace === 'wearing necklace' ? 'wearing necklace' : 'no necklace';
            const earringsText = earrings === 'wearing earrings' ? 'wearing earrings' : 'no earrings';

            // 完美公式重組
            const updatedPrompt = `Quirky minimalist hand-drawn doodle portrait of a ${gender} with long straight black hair styled in a ${style} with a center-parted and wispy bangs, showing a smiling. The person is ${glassesText}, ${necklaceText}, and ${earringsText}. Wearing a plain unpatterned solid black t-shirt, absolutely no logos, no graphics, no text on shirt. Naive art, chibi kawaii aesthetic. Extreme chibi proportions, huge oversized head, tiny small body, narrow sloping shoulders. Extremely simplified facial features, simple vertical black dot eyes, tiny line nose, soft blurred pink blush on cheeks. Smooth clean bare neck, absolutely no neck lines. Clean solid color hair, no white dots, no shading. Drawn with a monoline marker brush. Flat soft colors. Solid pure white background.`;

            // 即時反應到前端 TextArea
            document.getElementById(`textarea-${taskId}`).value = updatedPrompt;
            
            // 更新快取
            task.suggestedPrompt = updatedPrompt;
        }

        // 🌟 新增功能：將生成完成的雷雕結果圖非同步上傳回 Render
        async function uploadResultImage(taskId) {
            const fileInput = document.getElementById(`file-input-${taskId}`);
            const file = fileInput.files[0];
            if (!file) return;

            // 改變按鈕狀態為上傳中
            const statusContainer = document.getElementById(`upload-status-${taskId}`);
            if (statusContainer) {
                statusContainer.innerHTML = `
                    <i class="fa-solid fa-spinner animate-spin text-2xl text-cyan-400 mb-1.5"></i>
                    <span>正在上傳...</span>
                `;
            }

            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64Data = e.target.result;
                try {
                    const res = await fetch(`${API_BASE_URL}/api/admin/upload-result/${taskId}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ resultImage: base64Data })
                    });
                    const data = await res.json();
                    if (data.success) {
                        console.log(`✅ 號碼 #${taskId} 上傳結果圖成功！`);
                        // 重新獲取資料重新整理畫面
                        fetchAllTasks();
                    } else {
                        alert("上傳失敗：" + (data.error || "未知錯誤"));
                        fetchAllTasks();
                    }
                } catch (err) {
                    console.error("上傳過程出錯:", err);
                    alert("連線到 Render 伺服器超時，請重試！");
                    fetchAllTasks();
                }
            };
            reader.readAsDataURL(file);
        }

        // 獲取後端即時資料
        async function fetchAllTasks() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/all-tasks`);
                const data = await res.json();
                if (data.success) {
                    // 將資料存入快取
                    data.tasks.forEach(t => {
                        if (!localTasksCache[t.id]) {
                            localTasksCache[t.id] = t;
                        }
                    });
                    renderTasks(data.tasks);
                }
            } catch (err) {
                console.error("與後端中斷連線:", err);
            }
        }

        // 複製功能
        function copyToClipboard(taskId, btnId) {
            const text = document.getElementById(`textarea-${taskId}`).value;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById(btnId);
                const originalHtml = btn.innerHTML;
                btn.innerHTML = `<i class="fa-solid fa-circle-check mr-1"></i> 已完美複製！`;
                btn.className = "bg-emerald-500 text-slate-950 font-black px-4 py-2 rounded-xl text-sm transition flex items-center gap-1 shadow-[0_0_15px_rgba(16,185,129,0.4)]";
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    btn.className = "w-full bg-cyan-400 hover:bg-cyan-300 text-slate-950 font-black py-2.5 rounded-xl text-sm tracking-wider transition flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(0,242,255,0.2)]";
                }, 1200);
            });
        }

        // 渲染 UI (智慧選單與上傳對照版)
        function renderTasks(tasks) {
            const container = document.getElementById('tasks-container');
            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-slate-500 border border-dashed border-slate-800 rounded-2xl">
                        <i class="fa-solid fa-box-open text-4xl mb-2"></i>
                        <p>展場目前尚無排隊流水號</p>
                    </div>`;
                return;
            }

            // 保存工作人員正在操作的選單狀態，防止自動重新整理時被重置
            const currentSelections = {};
            tasks.forEach(t => {
                const gEl = document.getElementById(`select-gender-${t.id}`);
                if (gEl) {
                    currentSelections[t.id] = {
                        gender: gEl.value,
                        style: document.getElementById(`select-style-${t.id}`).value,
                        glasses: document.getElementById(`select-glasses-${t.id}`).value,
                        necklace: document.getElementById(`select-necklace-${t.id}`).value,
                        earrings: document.getElementById(`select-earrings-${t.id}`).value,
                        textareaVal: document.getElementById(`textarea-${t.id}`).value
                    };
                }
            });

            container.innerHTML = tasks.map(task => {
                // 初次加載時，解讀 AI 原始狀態
                const currentGender = currentSelections[task.id]?.gender || extractFeature(task.suggestedPrompt, 'gender');
                const currentStyle = currentSelections[task.id]?.style || extractFeature(task.suggestedPrompt, 'style');
                const currentGlasses = currentSelections[task.id]?.glasses || extractFeature(task.suggestedPrompt, 'glasses');
                const currentNecklace = currentSelections[task.id]?.necklace || extractFeature(task.suggestedPrompt, 'necklace');
                const currentEarrings = currentSelections[task.id]?.earrings || extractFeature(task.suggestedPrompt, 'earrings');
                const textValue = currentSelections[task.id]?.textareaVal || task.suggestedPrompt;

                return `
                <div class="cyber-card p-5 md:p-6 rounded-2xl flex flex-col lg:flex-row gap-6 items-start relative overflow-hidden">
                    
                    <!-- 號碼與原圖/結果上傳對照區 -->
                    <div class="flex flex-col items-center gap-3 w-full lg:w-auto flex-shrink-0">
                        <div class="text-center">
                            <span class="text-[10px] font-mono tracking-widest text-cyan-400 block font-bold">QUEUE NO</span>
                            <span class="text-4xl font-black text-white font-mono glow-text">#${task.id}</span>
                        </div>
                        <div class="flex lg:flex-col gap-3 mt-1">
                            <div class="text-center">
                                <p class="text-[9px] text-slate-400 mb-1 font-bold">📷 現場原圖</p>
                                <img src="${task.sourceImage}" class="w-28 h-28 object-cover rounded-xl border border-slate-700 bg-black shadow-inner" />
                            </div>
                            
                            <!-- 雷雕結果圖上傳與預覽欄 (🌟 已完美補回！) -->
                            <div class="text-center relative">
                                <p class="text-[9px] text-emerald-400 mb-1 font-bold">🎨 雷雕結果圖</p>
                                ${task.resultImage ? 
                                    `<div class="relative group cursor-pointer w-28 h-28">
                                        <img src="${task.resultImage}" class="w-full h-full object-cover rounded-xl border border-emerald-500/30 bg-black shadow-md" />
                                        <button onclick="document.getElementById('file-input-${task.id}').click()" class="absolute inset-0 bg-black/75 opacity-0 group-hover:opacity-100 flex flex-col items-center justify-center rounded-xl text-[10px] text-cyan-400 font-bold transition-opacity duration-200">
                                            <i class="fa-solid fa-cloud-arrow-up text-lg mb-1"></i>重新上傳
                                        </button>
                                     </div>` : 
                                    `<button onclick="document.getElementById('file-input-${task.id}').click()" id="upload-status-${task.id}" class="w-28 h-28 rounded-xl border border-dashed border-cyan-500/40 hover:border-cyan-400 flex flex-col items-center justify-center text-cyan-400/80 hover:text-cyan-400 text-[10px] bg-cyan-950/20 hover:bg-cyan-950/40 transition-all duration-200 cursor-pointer">
                                        <i class="fa-solid fa-cloud-arrow-up text-2xl mb-1.5 text-cyan-400 animate-bounce"></i>
                                        <span>上傳結果圖</span>
                                     </button>`
                                }
                                <!-- 隱藏的實體檔案選擇器 -->
                                <input type="file" id="file-input-${task.id}" class="hidden" onchange="uploadResultImage('${task.id}')" accept="image/*" />
                            </div>
                        </div>
                    </div>

                    <!-- 核心操作控制台 -->
                    <div class="flex-grow w-full grid grid-cols-1 md:grid-cols-12 gap-5">
                        
                        <!-- 左側：純英文框位 (支援即時重組) -->
                        <div class="md:col-span-7 flex flex-col justify-between h-full min-h-[180px]">
                            <div>
                                <label class="text-[11px] font-bold text-slate-300 tracking-wider flex items-center gap-1.5 mb-1.5">
                                    <i class="fa-solid fa-code text-cyan-400"></i> Leonardo 專用純英文咒語 (連動中)
                                </label>
                                <textarea id="textarea-${task.id}" readonly class="w-full h-24 bg-slate-950/90 text-slate-400 p-3 rounded-xl border border-slate-800 text-xs font-mono resize-none focus:outline-none select-all focus:border-cyan-500/50">${textValue}</textarea>
                            </div>
                            <div class="mt-3">
                                <button id="btn-${task.id}" onclick="copyToClipboard('${task.id}', 'btn-${task.id}')" class="w-full bg-cyan-400 hover:bg-cyan-300 text-slate-950 font-black py-2.5 rounded-xl text-sm tracking-wider transition flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(0,242,255,0.2)]">
                                    <i class="fa-solid fa-bolt"></i> 一鍵複製 Leonardo 專用咒語
                                </button>
                            </div>
                        </div>

                        <!-- 右側：大進化下拉選單微調控制面板 (完美中英連動) -->
                        <div class="md:col-span-5 border-t md:border-t-0 md:border-l border-slate-800 pt-4 md:pt-0 md:pl-5 flex flex-col justify-between">
                            <div>
                                <label class="text-[11px] font-bold text-cyan-400 tracking-wider flex items-center gap-1.5 mb-3">
                                    <i class="fa-solid fa-sliders text-cyan-400"></i> 現場特徵修正選單 (變更後自動更新左側)
                                </label>
                                
                                <div class="grid grid-cols-1 gap-2.5">
                                    
                                    <!-- 1. 性別選單 -->
                                    <div class="flex items-center justify-between bg-slate-900/50 p-1.5 rounded-lg border border-slate-800/60">
                                        <span class="text-xs font-bold text-slate-300 pl-1">身分性別</span>
                                        <select id="select-gender-${task.id}" onchange="updateLivePrompt('${task.id}')" class="cyber-select">
                                            <option value="woman" ${currentGender === 'woman' ? 'selected' : ''}>女性 (Woman) 👩</option>
                                            <option value="man" ${currentGender === 'man' ? 'selected' : ''}>男性 (Man) 👨</option>
                                            <option value="girl" ${currentGender === 'girl' ? 'selected' : ''}>女孩 (Girl) 👧</option>
                                            <option value="boy" ${currentGender === 'boy' ? 'selected' : ''}>男孩 (Boy) 👦</option>
                                        </select>
                                    </div>

                                    <!-- 2. 髮型選單 -->
                                    <div class="flex items-center justify-between bg-slate-900/50 p-1.5 rounded-lg border border-slate-800/60">
                                        <span class="text-xs font-bold text-slate-300 pl-1">綁法髮型</span>
                                        <select id="select-style-${task.id}" onchange="updateLivePrompt('${task.id}')" class="cyber-select text-yellow-400">
                                            <option value="messy bun" ${currentStyle === 'messy bun' ? 'selected' : ''}>慵懶包包頭/低髮髻 🍡</option>
                                            <option value="ponytail" ${currentStyle === 'ponytail' ? 'selected' : ''}>高/低綁馬尾 🐎</option>
                                            <option value="princess" ${currentStyle === 'princess' ? 'selected' : ''}>半開公主頭 👑</option>
                                            <option value="braids" ${currentStyle === 'braids' ? 'selected' : ''}>雙側編辮子 👧</option>
                                            <option value="loose hair" ${currentStyle === 'loose hair' ? 'selected' : ''}>自然披肩散髮 👩‍🦰</option>
                                        </select>
                                    </div>

                                    <!-- 3. 眼鏡選單 -->
                                    <div class="flex items-center justify-between bg-slate-900/50 p-1.5 rounded-lg border border-slate-800/60">
                                        <span class="text-xs font-bold text-slate-300 pl-1">配戴眼鏡</span>
                                        <select id="select-glasses-${task.id}" onchange="updateLivePrompt('${task.id}')" class="cyber-select ${currentGlasses === 'wearing glasses' ? 'text-cyan-400 font-extrabold' : 'text-slate-400'}">
                                            <option value="wearing glasses" ${currentGlasses === 'wearing glasses' ? 'selected' : ''}>有戴眼鏡 (Glasses) 👓</option>
                                            <option value="no glasses" ${currentGlasses === 'no glasses' ? 'selected' : ''}>未戴眼鏡 (None) ❌</option>
                                        </select>
                                    </div>

                                    <!-- 4. 項鍊選單 -->
                                    <div class="flex items-center justify-between bg-slate-900/50 p-1.5 rounded-lg border border-slate-800/60">
                                        <span class="text-xs font-bold text-slate-300 pl-1">項鍊飾品</span>
                                        <select id="select-necklace-${task.id}" onchange="updateLivePrompt('${task.id}')" class="cyber-select text-slate-400">
                                            <option value="no necklace" ${currentNecklace === 'no necklace' ? 'selected' : ''}>無項鍊 (None) ❌</option>
                                            <option value="wearing necklace" ${currentNecklace === 'wearing necklace' ? 'selected' : ''}>有戴項鍊 (Necklace) ✨</option>
                                        </select>
                                    </div>

                                    <!-- 5. 耳環選單 -->
                                    <div class="flex items-center justify-between bg-slate-900/50 p-1.5 rounded-lg border border-slate-800/60">
                                        <span class="text-xs font-bold text-slate-300 pl-1">耳環飾品</span>
                                        <select id="select-earrings-${task.id}" onchange="updateLivePrompt('${task.id}')" class="cyber-select text-slate-400">
                                            <option value="no earrings" ${currentEarrings === 'no earrings' ? 'selected' : ''}>無耳環 (None) ❌</option>
                                            <option value="wearing earrings" ${currentEarrings === 'wearing earrings' ? 'selected' : ''}>有戴耳環 (Earrings) 💎</option>
                                        </select>
                                    </div>

                                </div>
                            </div>

                            <!-- 時間與狀態管理 -->
                            <div class="mt-4 pt-2 border-t border-slate-800/60 flex items-center justify-between text-[10px] text-slate-500 font-mono">
                                <div>時間: ${task.createdAt || '--:--'}</div>
                                <span class="text-cyan-500/80 font-sans font-bold">
                                    ${task.status === 'completed' ? '✅ 已產出' : '⏳ 隊列中'}
                                </span>
                            </div>
                        </div>

                    </div>
                </div>
                `;
            }).join('');
            
            // 重新同步恢復工作人員剛才選擇的值
            tasks.forEach(t => {
                if (currentSelections[t.id]) {
                    document.getElementById(`select-gender-${t.id}`).value = currentSelections[t.id].gender;
                    document.getElementById(`select-style-${t.id}`).value = currentSelections[t.id].style;
                    document.getElementById(`select-glasses-${t.id}`).value = currentSelections[t.id].glasses;
                    document.getElementById(`select-necklace-${t.id}`).value = currentSelections[t.id].necklace;
                    document.getElementById(`select-earrings-${t.id}`).value = currentSelections[t.id].earrings;
                    document.getElementById(`textarea-${t.id}`).value = currentSelections[t.id].textareaVal;
                }
            });
        }

        // 每 3.5 秒無感輪詢，且完美鎖定目前工作人員正在操作的選單
        fetchAllTasks();
        setInterval(fetchAllTasks, 3500);
    </script>
</body>
</html>
