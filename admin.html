<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 BEST AI AWARDS | 後台智慧雙重控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --ai-cyan: #00f2ff; --ai-pink: #ff00d0; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0b1329; background-image: radial-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 0); background-size: 24px 24px; }
        .cyber-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(0, 242, 255, 0.15); transition: all 0.3s ease; }
        .cyber-card:hover { border-color: var(--ai-cyan); box-shadow: 0 0 20px rgba(0, 242, 255, 0.15); }
        .glow-text { text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        .cyber-select {
            background-color: #0f172a; border: 1px solid #334155; color: #f1f5f9;
            font-weight: bold; font-size: 0.72rem; padding: 0.35rem 0.5rem; border-radius: 0.5rem; outline: none; width: 130px;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen p-4 md:p-8">

    <!-- 全局常駐雙圖實體檔案選擇器，徹底避開因 React 重繪刷新被洗掉的 Bug -->
    <input type="file" id="global-file-input-A" class="hidden" accept="image/*" />
    <input type="file" id="global-file-input-B" class="hidden" accept="image/*" />

    <header class="max-w-7xl mx-auto mb-8 flex flex-col sm:flex-row justify-between items-center border-b border-cyan-500/20 pb-4 gap-4">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-cyan-400 animate-ping"></div>
            <h1 class="text-2xl font-black tracking-wider text-white">智慧創新大賞 <span class="text-cyan-400 font-mono text-lg">DUAL CONTROL CORE</span></h1>
        </div>
        <button onclick="fetchAllTasks()" class="bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold px-4 py-2 rounded-lg text-sm flex items-center gap-2 shadow-[0_0_15px_rgba(0,242,255,0.3)]">
            <i class="fa-solid fa-arrows-rotate"></i> 重新整理數據
        </button>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="tasks-container" class="grid grid-cols-1 gap-6"></div>
    </main>

    <script>
        const API_BASE_URL = "https://aicameraliveprint-back.onrender.com";
        let localTasksCache = {};
        let currentUploadTaskId = null;

        const femaleStyles = [
            { value: "high ponytail", label: "高馬尾 🐎" }, { value: "low ponytail", label: "低馬尾 🐴" },
            { value: "long curly hair", label: "長捲髮 👩‍🦱" }, { value: "long straight hair", label: "長直髮 👩‍🦰" },
            { value: "princess style", label: "公主頭 👑" }, { value: "messy bun", label: "包包頭 🍡" }, { value: "short bob hair", label: "短髮 👩" }
        ];
        const maleStyles = [
            { value: "short curly hair", label: "短捲髮 🌀" }, { value: "bangs hair style", label: "帥氣瀏海 👦" },
            { value: "slicked-back hair style", label: "經典油頭 🎩" }, { value: "crew cut", label: "俐落吋頭 💈" },
            { value: "korean comma hair style", label: "韓系逗號頭 🇰🇷" }, { value: "3mm buzz cut", label: "3分頭 🦲" },
            { value: "5mm buzz cut", label: "5分頭 🥚" }, { value: "undercut style", label: "側邊漸層 (Undercut) ⚡" }, { value: "messy textured hair style", label: "日系蓬鬆亂髮 🍃" }
        ];

        function extractFeature(prompt, featureType) {
            if (!prompt) return ""; const p = prompt.toLowerCase();
            if (featureType === 'gender') {
                if (p.includes('woman')) return 'woman'; if (p.includes('man')) return 'man';
                if (p.includes('girl')) return 'girl'; return 'boy';
            }
            if (featureType === 'style') {
                for (const s of [...femaleStyles, ...maleStyles]) { if (p.includes(s.value)) return s.value; }
                return 'long straight hair';
            }
            if (featureType === 'bangs') {
                if (p.includes('wispy')) return 'wispy bangs'; if (p.includes('side-swept')) return 'side-swept bangs';
                if (p.includes('blunt')) return 'blunt bangs'; if (p.includes('center')) return 'center-parted';
                if (p.includes('side-parted')) return 'side-parted'; return 'no bangs';
            }
            if (featureType === 'hairColor') {
                if (p.includes('dark brown')) return 'dark brown'; if (p.includes('chestnut')) return 'chestnut brown';
                if (p.includes('blonde')) return 'blonde'; if (p.includes('pink')) return 'dyed pink';
                if (p.includes('purple')) return 'dyed purple'; if (p.includes('silver')) return 'silver grey'; return 'black';
            }
            if (featureType === 'clothingColor') {
                if (p.includes('white')) return 'white'; if (p.includes('red')) return 'red';
                if (p.includes('blue')) return 'blue'; if (p.includes('green')) return 'green';
                if (p.includes('yellow')) return 'yellow'; if (p.includes('pink')) return 'pink';
                if (p.includes('grey')) return 'grey'; return 'black';
            }
            if (featureType === 'glasses') return p.includes('wearing glasses') ? 'wearing glasses' : 'no glasses';
            if (featureType === 'necklace') return p.includes('wearing necklace') ? 'wearing necklace' : 'no necklace';
            if (featureType === 'earrings') return p.includes('wearing earrings') ? 'wearing earrings' : 'no earrings';
        }

        function getStyleOptions(gender, currentStyle) {
            const styles = (gender === 'woman' || gender === 'girl') ? femaleStyles : maleStyles;
            return styles.map(s => `<option value="${s.value}" ${currentStyle === s.value ? 'selected' : ''}>${s.label}</option>`).join('');
        }

        function onGenderChange(taskId) {
            const gender = document.getElementById(`select-gender-${taskId}`).value;
            const styleSelect = document.getElementById(`select-style-${taskId}`);
            const styles = (gender === 'woman' || gender === 'girl') ? femaleStyles : maleStyles;
            styleSelect.innerHTML = getStyleOptions(gender, styles[0].value);
            updateLivePrompt(taskId);
        }

        function updateLivePrompt(taskId) {
            const task = localTasksCache[taskId]; if (!task) return;
            const gender = document.getElementById(`select-gender-${taskId}`).value;
            const style = document.getElementById(`select-style-${taskId}`).value;
            const bangs = document.getElementById(`select-bangs-${taskId}`).value;
            const hairColor = document.getElementById(`select-hair-color-${taskId}`).value;
            const clothingColor = document.getElementById(`select-clothing-color-${taskId}`).value;
            const glasses = document.getElementById(`select-glasses-${taskId}`).value;
            const necklace = document.getElementById(`select-necklace-${taskId}`).value;
            const earrings = document.getElementById(`select-earrings-${taskId}`).value;

            const glassesText = glasses === 'wearing glasses' ? 'wearing glasses' : 'no glasses';
            const necklaceText = necklace === 'wearing necklace' ? 'wearing necklace' : 'no necklace';
            const earringsText = earrings === 'wearing earrings' ? 'wearing earrings' : 'no earrings';
            let bangsText = bangs.includes('parted') ? `no bangs with a ${bangs}` : bangs;

            const updatedPrompt = `Quirky minimalist hand-drawn doodle portrait of a ${gender} with long straight ${hairColor} hair styled in a ${style} with ${bangsText}, showing a smiling. The person is ${glassesText}, ${necklaceText}, and ${earringsText}. Wearing a plain unpatterned solid ${clothingColor} t-shirt, absolutely no logos, no graphics, no text on shirt. Naive art, chibi kawaii aesthetic. Extreme chibi proportions, huge oversized head, tiny small body, narrow sloping shoulders. Extremely simplified facial features, simple vertical black dot eyes, tiny line nose, soft blurred pink blush on cheeks. Smooth clean bare neck, absolutely no neck lines. Clean solid color hair, no white dots, no shading. Drawn with a monoline marker brush. Flat soft colors. Solid pure white background.`;

            document.getElementById(`textarea-${taskId}`).value = updatedPrompt;
            task.suggestedPrompt = updatedPrompt;
        }

        function downloadSourceImage(taskId, base64Str) {
            const link = document.createElement('a');
            link.href = base64Str;
            link.download = `雷雕客照_#${taskId}.jpg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function triggerDualUpload(taskId, targetType) {
            currentUploadTaskId = taskId;
            document.getElementById(`global-file-input-${targetType}`).click();
        }

        ['A', 'B'].forEach(type => {
            document.getElementById(`global-file-input-${type}`).addEventListener('change', async function() {
                const taskId = currentUploadTaskId; if (!taskId || !this.files[0]) return;
                
                document.getElementById(`upload-status-${type}-${taskId}`).innerHTML = `<i class="fa-solid fa-spinner animate-spin text-cyan-400"></i>`;
                
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const bodyData = {}; bodyData[`resultImage${type}`] = e.target.result;
                    try {
                        const res = await fetch(`${API_BASE_URL}/api/admin/upload-result-dual/${taskId}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(bodyData)
                        });
                        if ((await res.json()).success) fetchAllTasks();
                    } catch (err) { alert("連線超時！"); fetchAllTasks(); }
                };
                reader.readAsDataURL(this.files[0]);
                this.value = "";
            });
        });

        async function fetchAllTasks() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/all-tasks`);
                const data = await res.json();
                if (data.success) {
                    data.tasks.forEach(t => { localTasksCache[t.id] = t; });
                    renderTasks(data.tasks);
                }
            } catch (e) {}
        }

        function copyToClipboard(taskId, btnId) {
            navigator.clipboard.writeText(document.getElementById(`textarea-${taskId}`).value).then(() => {
                const btn = document.getElementById(btnId);
                btn.innerHTML = `<i class="fa-solid fa-circle-check"></i> 已複製`;
                setTimeout(() => { btn.innerHTML = `<i class="fa-solid fa-bolt"></i> 一鍵複製 Leonardo 專用咒語`; }, 1200);
            });
        }

        function renderTasks(tasks) {
            const container = document.getElementById('tasks-container');
            if (tasks.length === 0) { container.innerHTML = `<div class="text-center py-12 text-slate-500 border border-dashed border-slate-800 rounded-2xl">尚無流水號</div>`; return; }

            const currentSelections = {};
            tasks.forEach(t => {
                if (document.getElementById(`select-gender-${t.id}`)) {
                    currentSelections[t.id] = {
                        gender: document.getElementById(`select-gender-${t.id}`).value,
                        style: document.getElementById(`select-style-${t.id}`).value,
                        bangs: document.getElementById(`select-bangs-${t.id}`).value,
                        hairColor: document.getElementById(`select-hair-color-${t.id}`).value,
                        clothingColor: document.getElementById(`select-clothing-color-${t.id}`).value,
                        glasses: document.getElementById(`select-glasses-${t.id}`).value,
                        necklace: document.getElementById(`select-necklace-${t.id}`).value,
                        earrings: document.getElementById(`select-earrings-${t.id}`).value,
                        textareaVal: document.getElementById(`textarea-${t.id}`).value
                    };
                }
            });

            container.innerHTML = tasks.map(task => {
                const cG = currentSelections[task.id]?.gender || extractFeature(task.suggestedPrompt, 'gender');
                const cS = currentSelections[task.id]?.style || extractFeature(task.suggestedPrompt, 'style');
                const cB = currentSelections[task.id]?.bangs || extractFeature(task.suggestedPrompt, 'bangs');
                const cH = currentSelections[task.id]?.hairColor || extractFeature(task.suggestedPrompt, 'hairColor');
                const cC = currentSelections[task.id]?.clothingColor || extractFeature(task.suggestedPrompt, 'clothingColor');
                const cGl = currentSelections[task.id]?.glasses || extractFeature(task.suggestedPrompt, 'glasses');
                const cN = currentSelections[task.id]?.necklace || extractFeature(task.suggestedPrompt, 'necklace');
                const cE = currentSelections[task.id]?.earrings || extractFeature(task.suggestedPrompt, 'earrings');
                const textValue = currentSelections[task.id]?.textareaVal || task.suggestedPrompt;

                let userChoiceHtml = `<span class="text-amber-400 font-bold animate-pulse"><i class="fa-solid fa-hourglass-start"></i> ⏳ 客人正在二選一中...</span>`;
                if (task.chosenDesign) {
                    userChoiceHtml = `<span class="bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-2 py-1 rounded font-black text-xs"><i class="fa-solid fa-circle-check"></i> 🎯 已選擇風格：[ ${task.chosenDesign} 款 ]</span>`;
                }

                return `
                <div class="cyber-card p-5 md:p-6 rounded-2xl flex flex-col lg:flex-row gap-5 items-start relative overflow-hidden">
                    
                    <div class="flex flex-col items-center gap-3 w-full lg:w-auto flex-shrink-0">
                        <div class="text-center">
                            <span class="text-[10px] font-mono tracking-widest text-cyan-400 block font-bold">QUEUE NO</span>
                            <span class="text-4xl font-black text-white font-mono glow-text">#${task.id}</span>
                        </div>
                        <div class="flex flex-col gap-2.5">
                            <div class="text-center relative group">
                                <img src="${task.sourceImage}" class="w-24 h-24 object-cover rounded-xl border border-slate-700 bg-black shadow-inner" />
                                <button onclick="downloadSourceImage('${task.id}', '${task.sourceImage}')" class="w-full mt-1.5 bg-slate-800 hover:bg-slate-750 text-cyan-400 font-bold py-1 px-2 rounded text-[10px] transition-all flex items-center justify-center gap-1">
                                    <i class="fa-solid fa-download"></i> 💾 下載原圖
                                </button>
                            </div>
                            
                            <div class="flex gap-2 border-t border-slate-800 pt-2.5">
                                <div class="text-center">
                                    <span class="text-[9px] block text-slate-400 mb-1">風格 A 圖</span>
                                    <button onclick="triggerDualUpload('${task.id}', 'A')" id="upload-status-A-${task.id}" class="w-12 h-12 rounded-lg border border-dashed ${task.resultImageA ? 'border-emerald-500 bg-emerald-950/20' : 'border-cyan-500/40 bg-slate-900'} flex items-center justify-center text-[10px] cursor-pointer">
                                        ${task.resultImageA ? `<i class="fa-solid fa-check text-emerald-400 text-lg"></i>` : `<i class="fa-solid fa-plus text-cyan-400"></i>`}
                                    </button>
                                </div>
                                <div class="text-center">
                                    <span class="text-[9px] block text-slate-400 mb-1">風格 B 圖</span>
                                    <button onclick="triggerDualUpload('${task.id}', 'B')" id="upload-status-B-${task.id}" class="w-12 h-12 rounded-lg border border-dashed ${task.resultImageB ? 'border-emerald-500 bg-emerald-950/20' : 'border-cyan-500/40 bg-slate-900'} flex items-center justify-center text-[10px] cursor-pointer">
                                        ${task.resultImageB ? `<i class="fa-solid fa-check text-emerald-400 text-lg"></i>` : `<i class="fa-solid fa-plus text-cyan-400"></i>`}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="flex-grow w-full grid grid-cols-1 md:grid-cols-12 gap-5">
                        <div class="md:col-span-6 flex flex-col justify-between h-full min-h-[180px]">
                            <div>
                                <label class="text-[11px] font-bold text-slate-300 flex items-center gap-1.5 mb-1.5"><i class="fa-solid fa-code text-cyan-400"></i> Leonardo 專用英文咒語</label>
                                <textarea id="textarea-${task.id}" readonly class="w-full h-28 bg-slate-950 text-slate-400 p-3 rounded-xl border border-slate-800 text-xs font-mono resize-none focus:outline-none select-all">${textValue}</textarea>
                            </div>
                            <button id="btn-${task.id}" onclick="copyToClipboard('${task.id}', 'btn-${task.id}')" class="w-full mt-2 bg-cyan-400 hover:bg-cyan-300 text-slate-950 font-black py-2 rounded-xl text-xs tracking-wider transition flex items-center justify-center gap-1.5"><i class="fa-solid fa-bolt"></i> 一鍵複製 Leonardo 專用咒語</button>
                        </div>

                        <div class="md:col-span-6 border-t md:border-t-0 md:border-l border-slate-800 pt-3 md:pt-0 md:pl-4 flex flex-col justify-between">
                            <div>
                                <label class="text-[11px] font-bold text-cyan-400 flex items-center gap-1.5 mb-2.5"><i class="fa-solid fa-sliders"></i> 特徵修正選單</label>
                                <div class="grid grid-cols-2 gap-2">
                                    <div class="flex flex-col gap-0.5 bg-slate-900/50 p-1.5 rounded border border-slate-800/60"><span class="text-[9px] text-slate-400">身分性別</span><select id="select-gender-${task.id}" onchange="onGenderChange('${task.id}')" class="cyber-select w-full"><option value="woman" ${cG === 'woman' ? 'selected' : ''}>女性 👩</option><option value="man" ${cG === 'man' ? 'selected' : ''}>男性 👨</option><option value="girl" ${cG === 'girl' ? 'selected' : ''}>女孩 👧</option><option value="boy" ${cG === 'boy' ? 'selected' : ''}>男孩 👦</option></select></div>
                                    <div class="flex flex-col gap-0.5 bg-slate-900/50 p-1.5 rounded border border-slate-800/60"><span class="text-[9px] text-yellow-400">髮型款式</span><select id="select-style-${task.id}" onchange="updateLivePrompt('${task.id}')" class="cyber-select w-full text-yellow-400">${getStyleOptions(cG, cS)}</select></div>
                                    <div class="flex flex-col gap-0.5 bg-slate-900/50 p-1.5 rounded border border-slate-800/60"><span class="text-[9px] text-slate-400">瀏海/分線</span><select id="select-bangs-${task.id}" onchange="updateLivePrompt('${task.id}')" class="cyber-select w-full text-emerald-400"><option value="no bangs" ${cB === 'no bangs' ? 'selected' : ''}>無瀏海 ❌</option><option value="wispy bangs" ${cB === 'wispy bangs' ? 'selected' : ''}>空氣瀏海 🌬️</option><option value="side-swept bangs" ${cB === 'side-swept bangs' ? 'selected' : ''}>斜瀏海 🍃</option><option value="blunt bangs" ${cB === 'blunt bangs' ? 'selected' : ''}>標準瀏海 💇</option><option value="center-parted" ${cB === 'center-parted' ? 'selected' : ''}>中分 ↔️</option><option value="side-parted" ${cB === 'side-parted' ? 'selected' : ''}>旁分 ↗️</option></select></div>
                                    <div class="flex flex-col gap-0.5 bg-slate-900/50 p-1.5 rounded border border-slate-800/60"><span class="text-[9px] text-slate-400">頭髮顏色</span><select id="select-hair-color-${task.id}" onchange="updateLivePrompt('${task.id}')" class="cyber-select w-full"><option value="black" ${cH === 'black' ? 'selected' : ''}>黑色 🖤</option><option value="dark brown" ${cH === 'dark brown' ? 'selected' : ''}>深棕 🤎</option><option value="chestnut brown" ${cH === 'chestnut brown' ? 'selected' : ''}>栗子 🌰</option><option value="blonde" ${cH === 'blonde' ? 'selected' : ''}>金色 💛</option><option value="dyed pink" ${cH === 'dyed pink' ? 'selected' : ''}>粉紅 💗</option><option value="dyed purple" ${cH === 'dyed purple' ? 'selected' : ''}>潮流紫 💜</option><option value="silver grey" ${cH === 'silver grey' ? 'selected' : ''}>銀灰 🩶</option></select></div>
                                    <div class="flex flex-col gap-0.5 bg-slate-900/50 p-1.5 rounded border border-slate-800/60"><span class="text-[9px] text-slate-400">衣服顏色</span><select id="select-clothing-color-${task.id}" onchange="updateLivePrompt('${task.id}')" class="cyber-select w-full"><option value="black" ${cC === 'black' ? 'selected' : ''}>黑色 🖤</option><option value="white" ${cC === 'white' ? 'selected' : ''}>白色 🤍</option><option value="red" ${cC === 'red' ? 'selected' : ''}>紅色 ❤️</option><option value="blue" ${cC === 'blue' ? 'selected' : ''}>藍色 💙</option><option value="green" ${cC === 'green' ? 'selected' : ''}>綠色 💚</option><option value="yellow" ${cC === 'yellow' ? 'selected' : ''}>黃色 💛</option><option value="pink" ${cC === 'pink' ? 'selected' : ''}>粉色 🩷</option><option value="grey" ${cC === 'grey' ? 'selected' : ''}>灰色 🩶</option></select></div>
                                    <div class="flex flex-col gap-0.5 bg-slate-900/50 p-1.5 rounded border border-slate-800/60"><span class="text-[9px] text-slate-400">配戴眼鏡</span><select id="select-glasses-${task.id}" onchange="updateLivePrompt('${task.id}')" class="cyber-select w-full"><option value="wearing glasses" ${cGl === 'wearing glasses' ? 'selected' : ''}>有眼鏡 👓</option><option value="no glasses" ${cGl === 'no glasses' ? 'selected' : ''}>無眼鏡 ❌</option></select></div>
                                </div>
                            </div>
                            
                            <div class="mt-4 pt-2 border-t border-slate-800 flex items-center justify-between">
                                <div class="text-[9px] text-slate-500 font-mono">時間: ${task.createdAt || '--:--'}</div>
                                <div class="text-xs">${userChoiceHtml}</div>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');

            tasks.forEach(t => {
                if (currentSelections[t.id]) {
                    document.getElementById(`select-gender-${t.id}`).value = currentSelections[t.id].gender;
                    document.getElementById(`select-style-${t.id}`).innerHTML = getStyleOptions(currentSelections[t.id].gender, currentSelections[t.id].style);
                    document.getElementById(`select-style-${t.id}`).value = currentSelections[t.id].style;
                    document.getElementById(`select-bangs-${t.id}`).value = currentSelections[t.id].bangs;
                    document.getElementById(`select-hair-color-${t.id}`).value = currentSelections[t.id].hairColor;
                    document.getElementById(`select-clothing-color-${t.id}`).value = currentSelections[t.id].clothingColor;
                    document.getElementById(`select-glasses-${t.id}`).value = currentSelections[t.id].glasses;
                    document.getElementById(`select-necklace-${t.id}`).value = currentSelections[t.id].necklace;
                    document.getElementById(`select-earrings-${t.id}`).value = currentSelections[t.id].earrings;
                    document.getElementById(`textarea-${t.id}`).value = currentSelections[t.id].textareaVal;
                }
            });
        }

        fetchAllTasks();
        setInterval(fetchAllTasks, 3200);
    </script>
</body>
</html>
