<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Presidential Hackathon | AI 虛擬肖像下載</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;500;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ai-cyan: #00f2ff;
            --ai-pink: #ff00d0;
            --ai-dark: #020617;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--ai-dark);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .cyber-bg {
            background-image: url('https://img.shoplineapp.com/media/image_clips/6a42074e98a89e001272a13a/original.png?1782712141=&owner_id=66221c5c384dbb002ec45c18');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.75);
            border: 1.5px solid rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(12px);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.15);
        }
        .glow-button {
            background: linear-gradient(90deg, var(--ai-cyan), #00aaff);
            color: #020617;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.4);
            transition: all 0.3s ease;
        }
        .glow-button:active {
            transform: scale(0.96);
            box-shadow: 0 0 35px var(--ai-cyan);
        }
        .shimmer-pulse {
            animation: pulse-glow 2.5s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { border-color: rgba(0, 242, 255, 0.2); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
            50% { border-color: rgba(0, 242, 255, 0.6); box-shadow: 0 0 35px rgba(0, 242, 255, 0.3); }
        }
    </style>
</head>
<body class="text-white">

    <div class="cyber-bg w-full px-6 py-10 flex flex-col justify-between">
        
        <!-- 頂部標題區 -->
        <header class="text-center w-full flex-shrink-0 mb-6">
            <span class="text-slate-300 text-[10px] tracking-widest uppercase block mb-1 font-mono">
                2026 Presidential Hackathon
            </span>
            <h1 class="text-2xl font-black tracking-widest text-white drop-shadow-[0_0_10px_rgba(0,242,255,0.4)]">
                總統盃黑客松 肖像下載
            </h1>
            <div class="h-[2px] w-24 bg-gradient-to-r from-transparent via-[#00f2ff] to-transparent mx-auto mt-2"></div>
        </header>

        <!-- 核心內容展示區 -->
        <main class="flex-grow flex flex-col items-center justify-center my-auto w-full max-w-sm mx-auto">
            <div class="glass-card rounded-[2.5rem] p-6 w-full text-center flex flex-col items-center relative overflow-hidden">
                
                <!-- 號碼展示 -->
                <div class="mb-5">
                    <span class="text-[10px] font-mono tracking-widest text-ai-cyan block">PORTRAIT NO</span>
                    <span id="display-task-id" class="text-4xl font-black font-mono tracking-wider text-white">#---</span>
                </div>

                <!-- 圖片展示容器 (加載中或成品呈現) -->
                <div class="relative w-56 h-56 sm:w-64 sm:h-64 mb-6 rounded-3xl overflow-hidden border-2 shimmer-pulse flex items-center justify-center bg-black/40">
                    <!-- 載入中動畫 -->
                    <div id="loading-spinner" class="absolute flex flex-col items-center justify-center text-slate-400 gap-3">
                        <i class="fa-solid fa-spinner animate-spin text-3xl text-ai-cyan"></i>
                        <span class="text-xs tracking-wider">正在為您沖印肖像...</span>
                    </div>
                    <!-- 肖像本體 -->
                    <img id="portrait-img" class="w-full h-full object-cover hidden" alt="AI Portrait" />
                </div>

                <!-- 手機端防呆長按引導 -->
                <div class="mb-4 text-center">
                    <p class="text-ai-cyan font-black text-sm tracking-widest mb-1">
                        <i class="fa-solid fa-hand-pointer mr-1 animate-bounce"></i> 長按上方圖片即可儲存
                    </p>
                    <p class="text-[10px] text-slate-400">iOS (Safari/LINE) 與 Android 適用</p>
                </div>

                <!-- 直接下載按鈕 (備用保底) -->
                <button id="download-btn" disabled class="glow-button w-full py-4 rounded-2xl font-bold tracking-widest text-sm flex items-center justify-center gap-2 opacity-50 cursor-not-allowed">
                    <i class="fa-solid fa-download"></i> 一鍵下載檔案
                </button>

            </div>
        </main>

        <!-- 底部主辦版權資訊 -->
        <footer class="text-center w-full flex-shrink-0 pt-6 opacity-60">
            <p class="text-[9px] leading-relaxed tracking-wider text-slate-300">
                指導單位：經濟部 <br>
                主辦單位：經濟部產業技術司
            </p>
            <p class="text-[8px] font-mono text-ai-cyan mt-1">2026 ALL RIGHTS RESERVED</p>
        </footer>

    </div>

    <!-- 🌟 前端交互邏輯：秒級獲取資料並免 Render 流量阻擋 -->
    <script>
        const API_BASE_URL = "https://aicameraliveprint-back.onrender.com";

        // 從網址 URL 解析 taskId
        const urlParams = new URLSearchParams(window.location.search);
        const taskId = urlParams.get('taskId');

        const displayIdEl = document.getElementById('display-task-id');
        const portraitImg = document.getElementById('portrait-img');
        const spinner = document.getElementById('loading-spinner');
        const downloadBtn = document.getElementById('download-btn');

        if (taskId) {
            displayIdEl.innerText = `#${taskId}`;
            fetchPortraitData();
        } else {
            displayIdEl.innerText = "#ERROR";
            spinner.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-3xl text-rose-500"></i><span class="text-xs text-rose-400 mt-2">網址無效：查無此序號</span>`;
        }

        async function fetchPortraitData() {
            try {
                // 向 Render 高速記憶體快取查詢該單的 A/B 款與客選結果
                const res = await fetch(`${API_BASE_URL}/api/status/${taskId}`);
                const data = await res.json();
                
                if (data.success && data.chosenDesign) {
                    const finalImage = data.chosenDesign === 'A' ? data.resultImageA : data.resultImageB;
                    
                    if (finalImage) {
                        // 載入完成，顯現肖像
                        portraitImg.src = finalImage;
                        portraitImg.classList.remove('hidden');
                        spinner.classList.add('hidden');
                        
                        // 啟用下載按鈕
                        downloadBtn.disabled = false;
                        downloadBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                        
                        // 配置一鍵下載
                        downloadBtn.addEventListener('click', async () => {
                            try {
                                const response = await fetch(finalImage);
                                const blob = await response.blob();
                                const blobUrl = window.URL.createObjectURL(blob);
                                const a = document.createElement('a');
                                a.style.display = 'none';
                                a.href = blobUrl;
                                a.download = `總統盃黑客松_肖像_${taskId}.jpg`;
                                document.body.appendChild(a);
                                a.click();
                                window.URL.revokeObjectURL(blobUrl);
                                document.body.removeChild(a);
                            } catch (e) {
                                // 針對 iOS LINE/FB 內建瀏覽器阻擋下載的保底方案：新分頁開啟
                                window.open(finalImage, '_blank');
                            }
                        });
                    } else {
                        throw new Error("圖片尚未生成完畢");
                    }
                } else {
                    throw new Error("找不到對應的風格或選擇");
                }
            } catch (err) {
                console.error("下載頁讀取失敗，3秒後自動重新嘗試...", err);
                // 3秒後自動輪詢重試（防止客人跑太快，一拿到 QR Code 就秒掃，此時大腦可能還在傳輸）
                setTimeout(fetchPortraitData, 3000);
            }
        }
    </script>
</body>
</html>
