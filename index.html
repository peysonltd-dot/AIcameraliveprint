<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Presidential Hackathon International Track | 總統盃黑客松</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2 family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;500;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 🌟 導入極速且穩定的純前端 QR Code 生成函式庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    
    <style>
        :root {
            --ai-cyan: #00f2ff;
            --ai-pink: #ff00d0;
            --ai-dark: #020617;
        }
        html, body {
            margin: 0;
            padding: 0;
            background-color: var(--ai-dark);
        }
        body {
            touch-action: pan-x pan-y;
            user-select: none; 
            -webkit-user-select: none;
            overflow-x: hidden; 
            font-family: 'Noto Sans TC', sans-serif;
        }
        /* 🌟 背景圖：100% 置中靠上對齊，無黑邊、無網格線 */
        .cyber-bg {
            background-image: url('https://img.shoplineapp.com/media/image_clips/6a4216a4c1e0e46c9bd9dde7/original.png?1782716067=&owner_id=66221c5c384dbb002ec45c18');
            background-size: cover;
            background-position: center top; 
            background-repeat: no-repeat;
            position: relative;
        }

        .kv-title {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(to bottom, #fff 30%, var(--ai-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.6));
        }
        .glow-bar {
            height: 4px;
            width: 320px;
            background: linear-gradient(90deg, transparent, var(--ai-pink), var(--ai-cyan), transparent);
            box-shadow: 0 0 16px var(--ai-pink), 0 0 28px var(--ai-cyan);
            border-radius: 50%;
        }
        .content-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            margin-top: 1rem;
            margin-bottom: 1rem;
            padding-top: 1.5rem;
        }
        @media (min-height: 1100px) and (max-aspect-ratio: 10/16) {
            .content-container { justify-content: flex-start; padding-top: 2rem; } 
        }
        .camera-container {
            width: 80vw; height: 80vw; max-width: 750px; max-height: 750px; 
            position: relative; overflow: hidden; border-radius: 2rem;
            border: 4px solid var(--ai-cyan);
            box-shadow: 0 0 45px rgba(0, 242, 255, 0.5);
            background-color: #000; transition: all 0.3s ease-in-out;
        }
        @media (min-height: 1100px) {
            .camera-container { max-width: 750px; max-height: 750px; }
        }
        .choice-card {
            border: 4px solid #1e293b;
            background: rgba(15, 23, 42, 0.7);
            transition: all 0.25s ease;
            cursor: pointer;
            position: relative;
            z-index: 10;
        }
        .choice-card.selected {
            border-color: var(--ai-cyan);
            box-shadow: 0 0 45px rgba(0, 242, 255, 0.6);
            background: rgba(0, 242, 255, 0.15);
            transform: scale(1.04);
        }
        .face-guide {
            width: 55%; aspect-ratio: 1 / 1.35; border-radius: 50%;
            border: 4px solid var(--ai-cyan);
            box-shadow: 0 0 25px var(--ai-cyan), 0 0 0 9999px rgba(2, 6, 23, 0.6);
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none;
        }
        .radar-spinner {
            position: relative; width: 240px; height: 240px; 
            border-radius: 50%; border: 3px dashed rgba(0, 242, 255, 0.5);
            animation: spin 8s linear infinite;
        }
        .radar-spinner::before {
            content: ''; position: absolute; inset: 18px; border-radius: 50%;
            border: 6px solid transparent; border-top-color: var(--ai-cyan); border-bottom-color: var(--ai-cyan);
            animation: spin 2s linear infinite reverse;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .text-glow-pulse { animation: pulse-glow 2s ease-in-out infinite; }
        @keyframes pulse-glow { 0%, 100% { opacity: 1; text-shadow: 0 0 25px var(--ai-cyan); } 50% { opacity: 0.6; text-shadow: 0 0 10px var(--ai-cyan); } }
        .btn-cyan {
            background: rgba(0, 242, 255, 0.1); border: 2.5px solid var(--ai-cyan); color: var(--ai-cyan);
            letter-spacing: 3px; transition: all 0.3s; box-shadow: 0 0 20px rgba(0, 242, 255, 0.25);
            position: relative;
            z-index: 10;
        }
        .btn-cyan:active:not(:disabled) { background: var(--ai-cyan); color: #000; box-shadow: 0 0 45px var(--ai-cyan); }
        .btn-red {
            background: rgba(255, 0, 208, 0.1); border: 2.5px solid var(--ai-pink); color: var(--ai-pink);
            letter-spacing: 3px; transition: all 0.3s;
            position: relative;
            z-index: 10;
        }
        .btn-red:active { background: var(--ai-pink); color: #000; }
    </style>
</head>
<body class="cyber-bg text-white min-h-[100dvh] w-screen flex flex-col">
    <div id="root" class="h-full w-full relative z-10 flex-grow flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const API_BASE_URL = "https://aicameraliveprint-back.onrender.com";

        // 🌟 中英對照載入中動畫提示詞
        const LOADING_TEXTS_CH = ["啟動視覺網路模組", "正在萃取臉部幾何特徵", "演算極簡線條結構", "套用 AI 大賞專屬模型", "即將生成雙重對照風格"];
        const LOADING_TEXTS_EN = ["BOOTING NEURAL...", "EXTRACTING PORTRAIT...", "VECTOR PROCESSING...", "APPLYING EXCLUSIVE LORA...", "GENERATING DUAL STYLES..."];

        const App = () => {
            const [step, setStep] = useState('home');
            const [taskId, setTaskId] = useState(null);
            const [imgA, setImgA] = useState(null);
            const [imgB, setImgB] = useState(null);
            const [selectedChoice, setSelectedChoice] = useState(null);
            const [cameraError, setCameraError] = useState(false); // 🌟 自訂相機異常 UI (取代 Alert)

            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const qrCanvasRef = useRef(null); // 🌟 用於綁定 QR Code 畫布
            const [countdown, setCountdown] = useState(0);
            const [textIndex, setTextIndex] = useState(0);
            const pollingRef = useRef(null);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [stream, setStream] = useState(null);
            const [returnCountdown, setReturnCountdown] = useState(15); // 🌟 變更點 1：自動返回前台時間從 10 秒改為 15 秒

            const startCamera = async () => {
                try {
                    setCameraError(false);
                    const mediaStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }
                    });
                    setStream(mediaStream);
                    setStep('camera');
                } catch (err) {
                    setCameraError(true); // 🌟 啟動自訂相機警告 UI
                }
            };

            useEffect(() => {
                if (step === 'camera' && stream && videoRef.current) {
                    videoRef.current.srcObject = stream;
                    videoRef.current.play().catch(e => console.log("Play error:", e));
                }
            }, [step, stream]);

            const takePhoto = () => {
                if (countdown > 0) return;
                setCountdown(3);
                let count = 3;
                const timer = setInterval(() => {
                    count -= 1;
                    setCountdown(count);
                    if (count === 0) {
                        clearInterval(timer);
                        capture();
                    }
                }, 1000);
            };

            const capture = async () => {
                const video = videoRef.current;
                const canvas = canvasRef.current;
                if (!video || !canvas) return;
                const ctx = canvas.getContext('2d');
                const size = Math.min(video.videoWidth, video.videoHeight);
                
                canvas.width = size; canvas.height = size;
                ctx.translate(size, 0); ctx.scale(-1, 1);
                ctx.drawImage(video, (video.videoWidth - size) / 2, (video.videoHeight - size) / 2, size, size, 0, 0, size, size);
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                if (stream) stream.getTracks().forEach(t => t.stop());
                setStream(null);
                setStep('loading');
                setSelectedChoice(null);

                try {
                    const res = await fetch(API_BASE_URL + "/api/upload", {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: dataUrl })
                    });
                    const data = await res.json();
                    if (data.success) setTaskId(data.taskId);
                } catch (err) {
                    setTimeout(() => { setTaskId("007"); }, 1500);
                }
            };

            const finalizeChoice = async () => {
                if (!selectedChoice) return;
                setIsSubmitting(true);
                
                try {
                    const response = await fetch(API_BASE_URL + "/api/choice/" + taskId, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ choice: selectedChoice })
                    });
                    await response.json();
                } catch(e) { 
                    console.error("回傳選擇失敗", e); 
                }

                setIsSubmitting(false);
                setReturnCountdown(15); // 🌟 變更點 2：提交選擇後，返回倒數重置為 15 秒
                setStep('completed');
            };

            const handleCancelAndGoHome = () => {
                if (pollingRef.current) clearInterval(pollingRef.current);
                if (stream) stream.getTracks().forEach(t => t.stop());
                setStream(null);
                setTaskId(null);
                setCameraError(false);
                setStep('home');
            };

            useEffect(() => {
                if (step === 'completed' && taskId && qrCanvasRef.current) {
                    const basePath = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '/');
                    const downloadUrl = `${basePath}download.html?taskId=${taskId}`;
                    
                    new QRious({
                        element: qrCanvasRef.current,
                        value: downloadUrl,
                        size: 200,
                        background: '#ffffff',
                        foreground: '#020617', // 暗海藍色前景，提高複雜光線折射下的對焦識別率
                        level: 'H' // 高容錯等級
                    });
                }
            }, [step, taskId]);

            useEffect(() => {
                let returnTimer;
                if (step === 'completed' && returnCountdown > 0) {
                    returnTimer = setTimeout(() => {
                        setReturnCountdown(prev => prev - 1);
                    }, 1000);
                } else if (step === 'completed' && returnCountdown === 0) {
                    handleCancelAndGoHome();
                }
                return () => clearTimeout(returnTimer);
            }, [step, returnCountdown]);

            useEffect(() => {
                let textInterval;
                if (step === 'loading') {
                    textInterval = setInterval(() => { setTextIndex(p => (p + 1) % LOADING_TEXTS_CH.length); }, 1500);

                    if (taskId) {
                        pollingRef.current = setInterval(async () => {
                            try {
                                const res = await fetch(API_BASE_URL + "/api/status/" + taskId);
                                const data = await res.json();
                                if (data.status === 'completed' && data.resultImageA && data.resultImageB) {
                                    setImgA(data.resultImageA);
                                    setImgB(data.resultImageB);
                                    setStep('choice');
                                    clearInterval(pollingRef.current);
                                }
                            } catch (err) {
                                if (taskId === "007") {
                                    setTimeout(() => {
                                        if (canvasRef.current) {
                                            const mockUrl = canvasRef.current.toDataURL();
                                            setImgA(mockUrl); setImgB(mockUrl);
                                            setStep('choice');
                                        }
                                        clearInterval(pollingRef.current);
                                    }, 4000);
                                }
                            }
                        }, 3000);
                    }
                }
                return () => { 
                    clearInterval(textInterval); 
                    if(pollingRef.current) clearInterval(pollingRef.current); 
                };
            }, [step, taskId]);

            return (
                <div className="flex flex-col items-center justify-between min-h-[100dvh] w-full pt-8 pb-12 px-6">
                    
                    {/* Header - 中英雙語頂部標題 */}
                    <div className="text-center z-10 flex flex-col items-center flex-shrink-0 w-full pt-2">
                        <span className="text-slate-300 text-[10px] tracking-widest uppercase block mb-2 font-mono">
                            2026 Presidential Hackathon International Track
                        </span>
                        
                        <h1 className="kv-title text-2xl sm:text-3xl md:text-4xl font-black tracking-widest leading-tight">
                            總統盃黑客松
                        </h1>
                        <div className="glow-bar mt-2"></div>
                    </div>

                    {/* 互動內容控制中樞 */}
                    <div className="content-container z-10">
                        
                        {/* 🌟 1. 雙語首頁引導 */}
                        {step === 'home' && (
                            <div className="text-center mt-4 sm:mt-10 flex flex-col items-center justify-start w-full">
                                <p className="text-ai-cyan text-xl sm:text-3xl md:text-4xl mb-2 tracking-[0.3em] text-glow-pulse font-light">
                                    AI 虛擬肖像
                                </p>
                                <p className="text-slate-300 text-xs sm:text-base tracking-[0.2em] font-mono mb-3">
                                    AI Virtual Portrait
                                </p>
                                <p className="text-ai-pink text-xl sm:text-2xl md:text-3xl tracking-[0.3em] font-black mb-12 drop-shadow-[0_0_15px_rgba(255,0,208,0.8)]">
                                    <i className="fa-solid fa-gift mr-3 text-white/90"></i>專屬禮品兌換 / Exclusive Gift
                                </p>
                                
                                <div className="flex flex-row items-center justify-center gap-6 sm:gap-12 mb-16 w-full max-w-[800px] px-4">
                                    {/* 欄位 1: AI生成 */}
                                    <div className="flex flex-col items-center group">
                                        <div className="w-36 h-36 sm:w-56 sm:h-56 rounded-[2rem] overflow-hidden border-2 border-ai-cyan shadow-[0_0_25px_rgba(0,242,255,0.2)] mb-4 transition-transform duration-500 group-hover:scale-105 group-hover:shadow-[0_0_35px_rgba(0,242,255,0.4)] bg-[#0f172a]/50 p-2">
                                            <img 
                                                src="https://img.shoplineapp.com/media/image_clips/6a1ef28ef1bda7070f35eecc/original.png?1780413070=&owner_id=66221c5c384dbb002ec45c18" 
                                                className="w-full h-full object-contain" 
                                                alt="專屬虛擬頭像" 
                                            />
                                        </div>
                                        <span className="text-ai-cyan font-black tracking-widest text-sm sm:text-xl drop-shadow-md">AI 生成頭像</span>
                                        <span className="text-[10px] sm:text-xs text-slate-400 font-mono tracking-wider mt-0.5">AI Avatar</span>
                                    </div>

                                    {/* 指向箭頭 */}
                                    <div className="flex flex-col items-center pb-12 animate-pulse">
                                        <i className="fa-solid fa-arrow-right-long text-ai-pink text-2xl sm:text-4xl drop-shadow-[0_0_10px_rgba(255,0,208,0.6)]"></i>
                                    </div>

                                    {/* 欄位 2: 現場彩印 */}
                                    <div className="flex flex-col items-center group">
                                        <div className="w-36 h-36 sm:w-56 sm:h-56 rounded-[2rem] overflow-hidden border-2 border-white shadow-[0_0_25px_rgba(255,255,255,0.2)] mb-4 transition-transform duration-500 group-hover:scale-105 group-hover:shadow-[0_0_35px_rgba(255,255,255,0.4)] bg-[#0f172a]/50 p-2">
                                            <img 
                                                src="https://img.shoplineapp.com/media/image_clips/6a1ef3c33ce472c30e346dac/original.png?1780413379=&owner_id=66221c5c384dbb002ec45c18" 
                                                className="w-full h-full object-contain" 
                                                alt="專屬提袋印製" 
                                            />
                                        </div>
                                        <span className="text-white font-black tracking-widest text-sm sm:text-xl drop-shadow-md">現場印製提袋</span>
                                        <span className="text-[10px] sm:text-xs text-slate-400 font-mono tracking-wider mt-0.5">Live Bag Printing</span>
                                    </div>
                                </div>

                                <button onClick={startCamera} className="btn-cyan text-xl sm:text-3xl md:text-4xl font-black px-12 py-6 sm:py-8 rounded-full animate-pulse shadow-[0_0_35px_rgba(0,242,255,0.4)] flex flex-col items-center gap-1">
                                    <span>開始體驗 START</span>
                                    <span className="text-xs sm:text-base font-bold font-mono tracking-widest opacity-80">CLICK HERE TO START</span>
                                </button>
                            </div>
                        )}

                        {/* 🌟 2. 雙語拍照步驟 */}
                        {step === 'camera' && (
                            <div className="flex flex-col items-center w-full">
                                <div className="camera-container">
                                    <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover absolute inset-0" style={{ transform: 'rotateY(180deg)' }} />
                                    <div className="face-guide"></div>
                                    {countdown > 0 && (
                                        <div className="absolute top-6 right-6 w-24 h-24 rounded-2xl border-2 border-ai-cyan bg-[#020617]/95 flex flex-col items-center justify-center shadow-[0_0_20px_rgba(0,242,255,0.4)]">
                                            <span className="text-[44px] font-black text-white font-mono">{countdown}</span>
                                        </div>
                                    )}
                                </div>
                                <div className="mt-8 flex gap-6 w-[85vw] sm:w-[80vw] max-w-[500px] sm:max-w-[750px] px-2">
                                    <button onClick={handleCancelAndGoHome} className="btn-cyan flex-1 py-4 sm:py-5 rounded-2xl text-base sm:text-xl font-bold flex flex-col items-center justify-center leading-tight">
                                        <span>返回首頁</span>
                                        <span className="text-[10px] sm:text-xs font-mono font-bold opacity-80 mt-1">HOME</span>
                                    </button>
                                    <button onClick={takePhoto} className="btn-cyan flex-[2.5] py-4 sm:py-5 rounded-2xl text-xl sm:text-3xl font-black bg-ai-cyan/20 shadow-[0_0_20px_rgba(0,242,255,0.3)] flex flex-col items-center justify-center leading-tight">
                                        <span>拍攝照片 PHOTO</span>
                                        <span className="text-xs sm:text-sm font-mono font-bold opacity-90 mt-1">TAKE PHOTO</span>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* 🌟 3. 雙語加載步驟 */}
                        {step === 'loading' && (
                            <div className="flex flex-col items-center justify-center">
                                <div className="relative flex items-center justify-center mb-8">
                                    <div className="radar-spinner"></div>
                                </div>
                                <div className="h-32 text-center mb-6">
                                    <h2 className="text-2xl sm:text-4xl font-bold text-white tracking-wider mb-2 text-glow-pulse">{LOADING_TEXTS_CH[textIndex]}</h2>
                                    <p className="text-ai-cyan text-sm sm:text-lg font-mono opacity-80 tracking-widest">{LOADING_TEXTS_EN[textIndex]}</p>
                                </div>
                                {taskId && (
                                    <div className="bg-black/40 p-5 sm:p-6 rounded-3xl border-2 border-ai-cyan text-center w-72 shadow-[0_0_30px_rgba(0,242,255,0.2)] mb-6">
                                        <p className="text-[10px] sm:text-[12px] text-slate-400 font-mono tracking-wider">PROGRESS ID</p>
                                        <p className="text-4xl sm:text-5xl font-mono font-black text-ai-cyan">#{taskId}</p>
                                    </div>
                                )}
                                <button onClick={handleCancelAndGoHome} className="btn-red px-8 py-3.5 rounded-2xl text-xs sm:text-base font-bold flex flex-col items-center justify-center">
                                    <span>取消返回首頁</span>
                                    <span className="text-[10px] font-mono opacity-80 mt-0.5">CANCEL AND RETURN</span>
                                </button>
                            </div>
                        )}

                        {/* 🌟 4. 雙語風格二選一 */}
                        {step === 'choice' && (
                            <div className="flex flex-col items-center w-full max-w-[1000px] px-4">
                                <div className="text-center mb-6">
                                    <p className="text-ai-cyan text-lg sm:text-2xl font-bold tracking-widest animate-pulse">✨ 請挑選您最喜愛的款式 ✨</p>
                                    <p className="text-slate-300 text-xs sm:text-base font-mono tracking-widest mt-1">Please Select Your Favorite Style</p>
                                </div>
                                <div className="grid grid-cols-2 gap-6 w-full mb-8">
                                    <div onClick={() => setSelectedChoice('A')} className={`choice-card p-3 rounded-3xl text-center ${selectedChoice === 'A' ? 'selected' : ''}`}>
                                        <img src={imgA} className="w-full aspect-square object-cover rounded-2xl mb-3 border border-slate-800" alt="Style A" />
                                        <span className="text-sm sm:text-2xl font-black tracking-wider block">【 風格 A 款 】</span>
                                        <span className="text-[10px] sm:text-sm font-mono opacity-80 mt-1 block">Style A</span>
                                    </div>
                                    <div onClick={() => setSelectedChoice('B')} className={`choice-card p-3 rounded-3xl text-center ${selectedChoice === 'B' ? 'selected' : ''}`}>
                                        <img src={imgB} className="w-full aspect-square object-cover rounded-2xl mb-3 border border-slate-800" alt="Style B" />
                                        <span className="text-sm sm:text-2xl font-black tracking-wider block">【 風格 B 款 】</span>
                                        <span className="text-[10px] sm:text-sm font-mono opacity-80 mt-1 block">Style B</span>
                                    </div>
                                </div>
                                <div className="flex gap-6 w-full sm:max-w-[700px]">
                                    <button onClick={handleCancelAndGoHome} className="btn-cyan flex-1 py-4 rounded-2xl text-xs sm:text-xl font-bold flex flex-col items-center justify-center">
                                        <span>放棄</span>
                                        <span className="text-[10px] sm:text-xs font-mono mt-0.5">CANCEL</span>
                                    </button>
                                    <button 
                                        disabled={!selectedChoice || isSubmitting} 
                                        onClick={finalizeChoice} 
                                        className={`flex-[2.5] py-4 rounded-2xl text-base sm:text-2xl font-black transition-all duration-300 flex flex-col items-center justify-center ${
                                            selectedChoice 
                                                ? 'btn-cyan bg-cyan-400 text-slate-950 shadow-[0_0_35px_rgba(0,242,255,0.5)]' 
                                                : 'bg-slate-800 text-slate-500 border border-slate-700 cursor-not-allowed'
                                        }`}
                                    >
                                        <span><i className="fa-solid fa-check mr-2"></i>{isSubmitting ? "處理中..." : "確定"}</span>
                                        <span className="text-[10px] sm:text-sm font-mono mt-0.5">{isSubmitting ? "Processing..." : "CONFIRM"}</span>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* 🌟 5. 雙語成功與二維碼下載 */}
                        {step === 'completed' && (
                            <div className="flex flex-col items-center w-full max-w-[850px] px-4 text-center">
                                <h2 className="text-3xl sm:text-5xl font-black text-ai-cyan tracking-widest mb-1 animate-pulse">選擇已送出</h2>
                                <p className="text-slate-300 text-sm sm:text-xl font-mono tracking-widest mb-6">Selection Submitted</p>
                                
                                <div className="bg-[#0f172a]/85 border-2 border-ai-cyan p-6 sm:p-8 rounded-[2.5rem] w-full mb-6 shadow-[0_0_45px_rgba(0,242,255,0.3)] flex flex-col md:flex-row items-center justify-center gap-8 md:gap-12">
                                    
                                    {/* 左側：展示已選擇之成品 */}
                                    <div className="flex flex-col items-center">
                                        <img src={selectedChoice === 'A' ? imgA : imgB} className="w-48 h-48 sm:w-64 sm:h-64 object-cover rounded-3xl mb-4 border-2 border-slate-700 shadow-lg" alt="Selected Style" />
                                        <p className="text-xs sm:text-sm text-slate-400 tracking-[0.2em] font-bold">您的專屬號碼</p>
                                        <p className="text-[10px] text-slate-500 font-mono tracking-wider mb-1">YOUR QUEUE NUMBER</p>
                                        <p className="text-5xl sm:text-7xl font-black text-white font-mono drop-shadow-[0_0_20px_#00f2ff]">#{taskId}</p>
                                    </div>

                                    {/* 右側：QR Code 掃碼下載區 (高對比白底，外國來賓掃碼取圖專用) */}
                                    <div className="flex flex-col items-center bg-slate-900/60 p-5 rounded-3xl border border-slate-700 w-full max-w-[280px]">
                                        <div className="p-3 bg-white rounded-2xl shadow-[0_0_20px_rgba(255,255,255,0.15)] flex items-center justify-center mb-3">
                                            <canvas ref={qrCanvasRef} className="w-40 h-40 object-contain"></canvas>
                                        </div>
                                        <span className="text-ai-cyan text-sm sm:text-base font-black tracking-widest mb-0.5">
                                            <i className="fa-solid fa-mobile-screen-button mr-1.5 animate-bounce"></i> 掃碼下載頭像
                                        </span>
                                        <span className="text-slate-300 text-xs font-mono font-bold tracking-wider mb-1">
                                            Scan to Download
                                        </span>
                                        <span className="text-[9px] sm:text-[10px] text-slate-400">請用手機相機掃描 QR Code</span>
                                        <span className="text-[8px] sm:text-[9px] text-slate-500 font-mono">Use your Phone Camera</span>
                                    </div>

                                </div>

                                <div className="flex items-center justify-center gap-3 text-ai-cyan text-sm sm:text-xl font-bold tracking-widest bg-ai-cyan/10 px-6 py-3.5 rounded-full border border-ai-cyan/30 shadow-inner max-w-md mx-auto">
                                    <i className="fa-solid fa-spinner animate-spin text-lg sm:text-xl"></i>
                                    <span>{returnCountdown} 秒後自動返回</span>
                                    <span className="text-xs sm:text-base font-mono opacity-80">({returnCountdown}s Auto-Return)</span>
                                </div>
                            </div>
                        )}

                    </div>

                    {/* 🌟 自訂相機異常警告彈窗 (取代 alert) */}
                    {cameraError && (
                        <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-md z-50 flex items-center justify-center p-4">
                            <div className="bg-slate-900 border-2 border-rose-500 rounded-3xl p-8 max-w-md w-full text-center shadow-[0_0_45px_rgba(239,68,68,0.5)]">
                                <div className="w-20 h-20 rounded-full bg-rose-500/10 border-2 border-rose-500 flex items-center justify-center mx-auto mb-6 text-rose-500 text-4xl animate-bounce">
                                    <i className="fa-solid fa-camera"></i>
                                </div>
                                <h3 className="text-2xl font-black text-white mb-2">請開通相機權限</h3>
                                <p className="text-slate-400 text-sm leading-relaxed mb-6">
                                    機台偵測不到視訊鏡頭。請點擊瀏覽器網址列旁的「鎖頭」圖示，並將相機存取權限設為「允許」。<br/>
                                    <span class="text-xs font-mono text-rose-400 block mt-2">Please enable camera permissions in your browser settings.</span>
                                </p>
                                <button onClick={() => setCameraError(false)} className="btn-cyan w-full py-4 rounded-2xl font-black text-lg">
                                    確認 / CONFIRM
                                </button>
                            </div>
                        </div>
                    )}

                    <div 
                        onClick={handleCancelAndGoHome}
                        className="w-full flex justify-end px-6 py-2 opacity-50 text-base sm:text-2xl font-mono text-ai-cyan tracking-widest cursor-default select-none active:text-white transition-colors duration-150 z-10"
                        title="工作人員專用跳轉 / Staff Reset"
                    >
                        2026
                    </div>
                    <canvas ref={canvasRef} className="hidden"></canvas>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
