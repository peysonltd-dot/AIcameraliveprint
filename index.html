<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- iOS / iPad 完美相容性設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI 專屬雷雕似顏繪</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            overflow: hidden; /* 隱藏滾動條，確保全螢幕體驗 */
            touch-action: none; /* 防止觸控螢幕預設的滑動行為 */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        /* 自訂美化按鈕點擊效果 */
        .touch-btn:active {
            transform: scale(0.95);
            transition: transform 0.1s;
        }
        /* 網格捲動區保留內部捲動 */
        .scrollable-grid {
            overflow-y: auto;
            touch-action: pan-y;
        }
        /* 隱藏預設卷軸但保留功能 */
        .scrollable-grid::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        const { useState, useEffect, useRef } = React;

        // === Firebase 初始化 (相容本地與環境變數) ===
        // 註：在實際部署時，請將這裡替換為您的 Firebase Config
        let app, auth, db, storage, appId;
        const isFirebaseConfigured = typeof __firebase_config !== 'undefined' || window.localStorage.getItem('fake_firebase');
        
        try {
            const firebaseConfig = typeof __firebase_config !== 'undefined' 
                ? JSON.parse(__firebase_config) 
                : { /* 請填寫您的預設 config */ };
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            storage = getStorage(app);
            appId = typeof __app_id !== 'undefined' ? __app_id : 'photo-booth-app';
        } catch (e) {
            console.warn("Firebase 未初始化，將使用本機測試模式運行前端", e);
        }

        const App = () => {
            const [view, setView] = useState('home'); // 'home', 'camera', 'processing', 'result', 'admin'
            const [user, setUser] = useState(null);
            const [lineArtResult, setLineArtResult] = useState(null);
            const [ticketNumber, setTicketNumber] = useState('');
            const [adminPasswordPrompt, setAdminPasswordPrompt] = useState(false);

            // Firebase 匿名登入 (Firestore 操作前置)
            useEffect(() => {
                if (auth) {
                    const initAuth = async () => {
                        try {
                            await signInAnonymously(auth);
                        } catch (err) {
                            console.error("Auth error:", err);
                        }
                    };
                    initAuth();
                    const unsubscribe = onAuthStateChanged(auth, setUser);
                    return () => unsubscribe();
                } else {
                    setUser({ uid: 'local-test-user' }); // 測試用
                }
            }, []);

            // 進入管理員後台的隱藏熱區處理
            const handleSecretClick = () => {
                const pwd = prompt("請輸入管理員密碼：(測試請輸入 admin)");
                if (pwd === "admin") {
                    setView('admin');
                } else if (pwd !== null) {
                    alert("密碼錯誤");
                }
            };

            return (
                <div className="w-screen h-screen flex flex-col relative bg-neutral-900 text-white">
                    {/* 左上角隱藏的管理員入口熱區 (點擊即可觸發) */}
                    {view === 'home' && (
                        <div 
                            className="absolute top-0 left-0 w-24 h-24 z-50 cursor-pointer"
                            onClick={handleSecretClick}
                            title="Admin Login"
                        ></div>
                    )}

                    {view === 'home' && <HomeView onStart={() => setView('camera')} />}
                    {view === 'camera' && <CameraView 
                        onProcessStart={(img) => { setLineArtResult(img); setView('processing'); }} 
                        onCancel={() => setView('home')} 
                    />}
                    {view === 'processing' && <ProcessingView 
                        sourceImage={lineArtResult}
                        user={user}
                        onComplete={(resultUrl, ticket) => { 
                            setLineArtResult(resultUrl); 
                            setTicketNumber(ticket);
                            setView('result'); 
                        }} 
                        onFail={() => setView('home')}
                    />}
                    {view === 'result' && <ResultView 
                        imageUrl={lineArtResult} 
                        ticket={ticketNumber}
                        onDone={() => setView('home')} 
                    />}
                    {view === 'admin' && <AdminView 
                        user={user}
                        onExit={() => setView('home')} 
                    />}
                </div>
            );
        };

        // ==========================================
        // 1. 首頁視圖 (待機畫面)
        // ==========================================
        const HomeView = ({ onStart }) => (
            <div className="flex-1 flex flex-col items-center justify-center p-8 text-center space-y-12">
                <div className="animate-pulse flex items-center justify-center w-32 h-32 rounded-full bg-white/10 mb-4">
                    <i className="fa-solid fa-wand-magic-sparkles text-6xl text-cyan-400"></i>
                </div>
                <div>
                    <h1 className="text-5xl md:text-7xl font-bold tracking-wider mb-6">AI 專屬雷雕似顏繪</h1>
                    <p className="text-xl md:text-3xl text-gray-400">專屬你的極簡線條藝術</p>
                </div>
                <button 
                    onClick={onStart}
                    className="touch-btn mt-12 px-12 py-6 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-full text-3xl font-bold shadow-lg shadow-cyan-500/50 hover:shadow-cyan-500/80 transition-all flex items-center space-x-4"
                >
                    <i className="fa-solid fa-camera"></i>
                    <span>點擊畫面開始拍照</span>
                </button>
            </div>
        );

        // ==========================================
        // 2. 拍照視圖 (相機調用、切換、倒數)
        // ==========================================
        const CameraView = ({ onProcessStart, onCancel }) => {
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const [cameras, setCameras] = useState([]);
            const [currentCamIdx, setCurrentCamIdx] = useState(0);
            const [countdown, setCountdown] = useState(null);

            // 取得所有相機設備
            useEffect(() => {
                const getDevices = async () => {
                    try {
                        const devices = await navigator.mediaDevices.enumerateDevices();
                        const videoDevices = devices.filter(d => d.kind === 'videoinput');
                        setCameras(videoDevices);
                        if (videoDevices.length > 0) {
                            startCamera(videoDevices[0].deviceId);
                        }
                    } catch (err) {
                        console.error("列舉設備失敗", err);
                        alert("無法存取相機設備，請確認權限。");
                        onCancel();
                    }
                };
                getDevices();

                return () => stopCamera(); // Cleanup
            }, []);

            const startCamera = async (deviceId) => {
                stopCamera();
                try {
                    // 極為重要的設定：audio: false (避免隱私警告), video 設定
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: deviceId ? { deviceId: { exact: deviceId } } : { facingMode: 'user' },
                        audio: false
                    });
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                    }
                } catch (err) {
                    console.error("啟動相機失敗", err);
                }
            };

            const stopCamera = () => {
                if (videoRef.current && videoRef.current.srcObject) {
                    videoRef.current.srcObject.getTracks().forEach(track => track.stop());
                }
            };

            const switchCamera = () => {
                if (cameras.length < 2) return;
                const nextIdx = (currentCamIdx + 1) % cameras.length;
                setCurrentCamIdx(nextIdx);
                startCamera(cameras[nextIdx].deviceId);
            };

            const takePhoto = () => {
                if (countdown !== null) return; // 正在倒數中
                let timer = 3;
                setCountdown(timer);
                
                const interval = setInterval(() => {
                    timer -= 1;
                    if (timer > 0) {
                        setCountdown(timer);
                    } else {
                        clearInterval(interval);
                        setCountdown(null);
                        captureAndProceed();
                    }
                }, 1000);
            };

            const captureAndProceed = () => {
                const video = videoRef.current;
                const canvas = canvasRef.current;
                if (!video || !canvas) return;

                // 保持比例繪製到 canvas
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // 轉為 Base64
                const base64Img = canvas.toDataURL('image/jpeg', 0.8);
                stopCamera();
                onProcessStart(base64Img);
            };

            return (
                <div className="flex-1 relative flex flex-col bg-black">
                    {/* 返回按鈕 */}
                    <button onClick={() => {stopCamera(); onCancel();}} className="absolute top-6 left-6 z-20 text-white/70 hover:text-white text-4xl p-4 touch-btn">
                        <i className="fa-solid fa-arrow-left"></i>
                    </button>

                    {/* 切換鏡頭按鈕 */}
                    {cameras.length > 1 && (
                        <button onClick={switchCamera} className="absolute top-6 right-6 z-20 bg-neutral-800/80 p-4 rounded-full text-white text-3xl touch-btn shadow-lg backdrop-blur-sm">
                            <i className="fa-solid fa-camera-rotate"></i>
                        </button>
                    )}

                    {/* 相機畫面 (iOS 相容性屬性) */}
                    <div className="flex-1 relative overflow-hidden flex items-center justify-center">
                        <video 
                            ref={videoRef} 
                            className="absolute min-w-full min-h-full object-cover"
                            autoPlay 
                            playsInline 
                            webkit-playsinline="true" 
                            muted
                        ></video>
                        
                        {/* 倒數動畫 */}
                        {countdown !== null && (
                            <div className="absolute inset-0 flex items-center justify-center z-30 bg-black/40">
                                <span className="text-9xl font-bold text-white drop-shadow-2xl animate-ping">{countdown}</span>
                            </div>
                        )}
                    </div>

                    {/* 隱藏的 Canvas 用於擷取照片 */}
                    <canvas ref={canvasRef} className="hidden"></canvas>

                    {/* 拍照按鈕 */}
                    <div className="absolute bottom-10 left-0 w-full flex justify-center z-20">
                        <button 
                            onClick={takePhoto}
                            className={`touch-btn w-24 h-24 rounded-full border-4 border-white flex items-center justify-center transition-all ${countdown !== null ? 'opacity-50 scale-90' : 'hover:bg-white/20'}`}
                        >
                            <div className="w-20 h-20 bg-white rounded-full"></div>
                        </button>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 3. 處理中視圖 (AI 溝通與 Firebase 儲存)
        // ==========================================
        const ProcessingView = ({ sourceImage, user, onComplete, onFail }) => {
            const [statusText, setStatusText] = useState("正在將影像傳送至 AI...");

            useEffect(() => {
                processImage();
            }, []);

            const processImage = async () => {
                try {
                    // 1. 呼叫後端 API (圖生圖)
                    setStatusText("AI 正在淬鍊您的線條...");
                    let finalImageUrl = sourceImage; // 預設(防錯)

                    try {
                        // 【重點修改】：此處替換為您在 Render 或其他雲端平台部署的後端 API 網址
                        // 例如: 'https://your-backend-app.onrender.com/api/generate-lineart'
                        const BACKEND_URL = 'https://your-app-name.onrender.com/api/generate-lineart';
                        
                        const response = await fetch(BACKEND_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ image: sourceImage })
                        });
                        
                        if (response.ok) {
                            const data = await response.json();
                            finalImageUrl = data.result; // base64
                        } else {
                            throw new Error("API 伺服器未回應");
                        }
                    } catch (apiErr) {
                        console.warn("無法連接後端 API，將使用本地模擬處理以便預覽", apiErr);
                        // [測試用] 若無後端，在此做簡單的黑白化處理模擬 AI
                        finalImageUrl = await simulateLocalLineArt(sourceImage);
                    }

                    // 2. 上傳至 Firebase
                    setStatusText("正在產生取件號碼...");
                    let nextTicket = "001";

                    if (db && storage && user) {
                        // 取得當前所有紀錄以產生遞增號碼 (遵循系統指示: 不用 orderBy，在記憶體中排序)
                        const collRef = collection(db, 'artifacts', appId, 'public', 'data', 'linearts');
                        const snapshot = await getDocs(collRef);
                        let maxNum = 0;
                        snapshot.forEach(doc => {
                            const t = parseInt(doc.data().ticket, 10);
                            if (!isNaN(t) && t > maxNum) maxNum = t;
                        });
                        nextTicket = String(maxNum + 1).padStart(3, '0');

                        // 上傳圖片到 Storage
                        const imgRef = ref(storage, `artifacts/${appId}/images/${nextTicket}_${Date.now()}.jpg`);
                        await uploadString(imgRef, finalImageUrl, 'data_url');
                        const downloadUrl = await getDownloadURL(imgRef);
                        finalImageUrl = downloadUrl;

                        // 寫入 Firestore
                        await addDoc(collRef, {
                            ticket: nextTicket,
                            imageUrl: downloadUrl,
                            timestamp: Date.now(),
                            status: 'pending' // 供後台人員辨識是否已處理
                        });
                    } else {
                        // 本地測試模式
                        nextTicket = String(Math.floor(Math.random() * 999)).padStart(3, '0');
                        await new Promise(r => setTimeout(r, 1000));
                    }

                    onComplete(finalImageUrl, nextTicket);

                } catch (err) {
                    console.error("處理失敗", err);
                    alert("處理發生錯誤，請重試！");
                    onFail();
                }
            };

            // 用於展示時沒有起 Node server 的應急處理 (影像二值化模擬)
            const simulateLocalLineArt = (base64) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width; canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = "white"; ctx.fillRect(0,0,canvas.width,canvas.height);
                        ctx.drawImage(img, 0, 0);
                        // 套用高對比與黑白
                        ctx.globalCompositeOperation = "color";
                        ctx.fillStyle = "black"; ctx.fillRect(0,0,canvas.width,canvas.height);
                        ctx.globalCompositeOperation = "source-over";
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                    img.src = base64;
                });
            }

            return (
                <div className="flex-1 flex flex-col items-center justify-center space-y-8 bg-neutral-900">
                    <div className="w-24 h-24 border-8 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin"></div>
                    <h2 className="text-3xl font-bold animate-pulse">{statusText}</h2>
                    <p className="text-gray-400">請稍候，完美的作品值得等待</p>
                </div>
            );
        };

        // ==========================================
        // 4. 結果視圖 (顯示線稿與號碼)
        // ==========================================
        const ResultView = ({ imageUrl, ticket, onDone }) => {
            return (
                <div className="flex-1 flex flex-col items-center justify-center p-6 bg-neutral-900">
                    <h2 className="text-4xl font-bold mb-2">生成完畢！</h2>
                    <p className="text-xl text-gray-400 mb-8">請將此號碼出示給工作人員進行雷雕</p>
                    
                    <div className="flex flex-col md:flex-row items-center gap-12 bg-neutral-800 p-8 rounded-3xl shadow-2xl border border-neutral-700 w-full max-w-4xl">
                        {/* 圖片展示 (適應螢幕) */}
                        <div className="w-full md:w-1/2 flex justify-center">
                            <img src={imageUrl} alt="Result" className="w-full max-w-md rounded-lg shadow-inner bg-white" />
                        </div>
                        
                        {/* 取件號碼 */}
                        <div className="w-full md:w-1/2 flex flex-col items-center justify-center">
                            <div className="text-gray-400 text-2xl mb-2">您的專屬取件號碼</div>
                            <div className="text-8xl md:text-9xl font-black text-cyan-400 tracking-widest drop-shadow-lg mb-8">
                                {ticket}
                            </div>
                            <button 
                                onClick={onDone}
                                className="touch-btn w-full py-5 bg-white text-black rounded-full text-2xl font-bold shadow-lg hover:bg-gray-200 transition-colors"
                            >
                                完成並返回首頁 <i className="fa-solid fa-check ml-2"></i>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 5. 管理員後台 (觀看與下載圖檔)
        // ==========================================
        const AdminView = ({ user, onExit }) => {
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!db || !user) {
                    setLoading(false);
                    return;
                }
                const collRef = collection(db, 'artifacts', appId, 'public', 'data', 'linearts');
                
                // 監聽更新
                const unsubscribe = onSnapshot(collRef, (snapshot) => {
                    let docs = [];
                    snapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
                    // 在前端進行排序 (依號碼降冪排序，最新的在前面)
                    docs.sort((a, b) => parseInt(b.ticket) - parseInt(a.ticket));
                    setItems(docs);
                    setLoading(false);
                }, (error) => {
                    console.error("取得資料失敗", error);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [user]);

            // 下載功能
            const downloadImage = async (url, ticket) => {
                try {
                    const response = await fetch(url);
                    const blob = await response.blob();
                    const objectUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = objectUrl;
                    a.download = `LineArt_${ticket}.png`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(objectUrl);
                    a.remove();
                } catch (e) {
                    alert("下載失敗，可能遭遇到 CORS 限制，您可以右鍵/長按圖片另存新檔。");
                }
            };

            return (
                <div className="flex-1 flex flex-col bg-neutral-900 text-white p-6 relative">
                    <div className="flex justify-between items-center border-b border-neutral-700 pb-4 mb-6">
                        <h2 className="text-3xl font-bold flex items-center gap-3">
                            <i className="fa-solid fa-user-shield text-cyan-500"></i> 雷雕任務管理後台
                        </h2>
                        <button onClick={onExit} className="px-6 py-2 bg-red-600 hover:bg-red-700 rounded-lg font-bold transition-colors">
                            離開後台
                        </button>
                    </div>

                    <div className="flex-1 scrollable-grid pr-2">
                        {loading ? (
                            <div className="text-center text-gray-400 mt-20 text-xl">載入中...</div>
                        ) : items.length === 0 ? (
                            <div className="text-center text-gray-400 mt-20 text-xl">目前尚無任何生成紀錄</div>
                        ) : (
                            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                                {items.map(item => (
                                    <div key={item.id} className="bg-neutral-800 rounded-xl p-4 flex flex-col items-center shadow-lg border border-neutral-700">
                                        <div className="w-full aspect-square bg-white rounded-lg mb-4 overflow-hidden flex items-center justify-center">
                                            <img src={item.imageUrl} alt="Art" className="object-cover w-full h-full" />
                                        </div>
                                        <div className="text-3xl font-black text-cyan-400 mb-3">#{item.ticket}</div>
                                        <button 
                                            onClick={() => downloadImage(item.imageUrl, item.ticket)}
                                            className="w-full py-2 bg-white text-black font-bold rounded hover:bg-gray-200 transition-colors flex justify-center items-center gap-2"
                                        >
                                            <i className="fa-solid fa-download"></i> 下載高清圖
                                        </button>
                                        <div className="text-xs text-gray-500 mt-2">
                                            {new Date(item.timestamp).toLocaleTimeString()}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
