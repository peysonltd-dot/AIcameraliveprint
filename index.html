<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI 專屬雷雕似顏繪</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 核心修正：使用 100dvh 解決 iPhone Safari 底部工具列遮擋問題 */
        html, body {
            height: 100dvh;
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #ffffff;
            overflow: hidden;
            touch-action: none; /* 防止 Safari 下拉更新或左右滑動回上一頁 */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        #root {
            height: 100%;
            width: 100%;
        }
        .touch-btn:active {
            transform: scale(0.95);
            transition: transform 0.1s;
        }
        .scrollable-grid {
            overflow-y: auto;
            touch-action: pan-y;
        }
        .scrollable-grid::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        const { useState, useEffect, useRef } = React;

        let app, auth, db, storage, appId;
        
        try {
            const firebaseConfig = typeof __firebase_config !== 'undefined' 
                ? JSON.parse(__firebase_config) 
                : { /* 您的 Firebase 設定 */ };
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            storage = getStorage(app);
            appId = typeof __app_id !== 'undefined' ? __app_id : 'photo-booth-app';
        } catch (e) {
            console.warn("Firebase 未初始化，將使用本機測試模式運行前端");
        }

        const App = () => {
            const [view, setView] = useState('home');
            const [user, setUser] = useState(null);
            const [lineArtResult, setLineArtResult] = useState(null);
            const [ticketNumber, setTicketNumber] = useState('');

            useEffect(() => {
                if (auth) {
                    const initAuth = async () => { await signInAnonymously(auth); };
                    initAuth();
                    const unsubscribe = onAuthStateChanged(auth, setUser);
                    return () => unsubscribe();
                } else {
                    setUser({ uid: 'local-test-user' });
                }
            }, []);

            const handleSecretClick = () => {
                const pwd = prompt("請輸入管理員密碼：(測試請輸入 admin)");
                if (pwd === "admin") setView('admin');
            };

            return (
                // 修正：使用 h-full (繼承 body 的 100dvh) 確保不被裁切
                <div className="w-full h-full flex flex-col relative bg-neutral-900 text-white">
                    {view === 'home' && (
                        <div className="absolute top-0 left-0 w-24 h-24 z-50 cursor-pointer" onClick={handleSecretClick}></div>
                    )}

                    {view === 'home' && <HomeView onStart={() => setView('camera')} />}
                    {view === 'camera' && <CameraView 
                        onProcessStart={(img) => { setLineArtResult(img); setView('processing'); }} 
                        onCancel={() => setView('home')} 
                    />}
                    {view === 'processing' && <ProcessingView 
                        sourceImage={lineArtResult}
                        user={user}
                        onComplete={(resultUrl, ticket) => { 
                            setLineArtResult(resultUrl); 
                            setTicketNumber(ticket);
                            setView('result'); 
                        }} 
                        onFail={() => setView('home')}
                    />}
                    {view === 'result' && <ResultView 
                        imageUrl={lineArtResult} 
                        ticket={ticketNumber}
                        onDone={() => setView('home')} 
                    />}
                    {view === 'admin' && <AdminView user={user} onExit={() => setView('home')} />}
                </div>
            );
        };

        const HomeView = ({ onStart }) => (
            <div className="flex-1 flex flex-col items-center justify-center p-8 text-center space-y-12 pb-[env(safe-area-inset-bottom)]">
                <div className="animate-pulse flex items-center justify-center w-32 h-32 rounded-full bg-white/10 mb-4">
                    <i className="fa-solid fa-wand-magic-sparkles text-6xl text-cyan-400"></i>
                </div>
                <div>
                    <h1 className="text-4xl md:text-7xl font-bold tracking-wider mb-6">AI 專屬雷雕似顏繪</h1>
                    <p className="text-lg md:text-3xl text-gray-400">專屬你的極簡線條藝術</p>
                </div>
                <button 
                    onClick={onStart}
                    className="touch-btn mt-12 px-8 py-5 md:px-12 md:py-6 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-full text-2xl md:text-3xl font-bold shadow-lg flex items-center space-x-4"
                >
                    <i className="fa-solid fa-camera"></i>
                    <span>點擊畫面開始拍照</span>
                </button>
            </div>
        );

        const CameraView = ({ onProcessStart, onCancel }) => {
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const [cameras, setCameras] = useState([]);
            const [currentCamIdx, setCurrentCamIdx] = useState(0);
            const [countdown, setCountdown] = useState(null);

            useEffect(() => {
                const getDevices = async () => {
                    try {
                        const devices = await navigator.mediaDevices.enumerateDevices();
                        const videoDevices = devices.filter(d => d.kind === 'videoinput');
                        setCameras(videoDevices);
                        if (videoDevices.length > 0) startCamera(videoDevices[0].deviceId);
                    } catch (err) {
                        alert("無法存取相機設備");
                        onCancel();
                    }
                };
                getDevices();
                return () => stopCamera();
            }, []);

            const startCamera = async (deviceId) => {
                stopCamera();
                try {
                    // 核心修正：強制要求直向高畫質 (ideal: 1080x1920)，解決畫面過度裁切放大的問題
                    const constraints = {
                        video: deviceId 
                            ? { deviceId: { exact: deviceId }, width: { ideal: 1080 }, height: { ideal: 1920 } } 
                            : { facingMode: 'user', width: { ideal: 1080 }, height: { ideal: 1920 } },
                        audio: false
                    };
                    const stream = await navigator.mediaDevices.getUserMedia(constraints);
                    if (videoRef.current) videoRef.current.srcObject = stream;
                } catch (err) {
                    console.error("相機啟動失敗", err);
                }
            };

            const stopCamera = () => {
                if (videoRef.current && videoRef.current.srcObject) {
                    videoRef.current.srcObject.getTracks().forEach(track => track.stop());
                }
            };

            const switchCamera = () => {
                if (cameras.length < 2) return;
                const nextIdx = (currentCamIdx + 1) % cameras.length;
                setCurrentCamIdx(nextIdx);
                startCamera(cameras[nextIdx].deviceId);
            };

            const takePhoto = () => {
                if (countdown !== null) return;
                let timer = 3;
                setCountdown(timer);
                const interval = setInterval(() => {
                    timer -= 1;
                    if (timer > 0) setCountdown(timer);
                    else {
                        clearInterval(interval);
                        setCountdown(null);
                        captureAndProceed();
                    }
                }, 1000);
            };

            const captureAndProceed = () => {
                const video = videoRef.current;
                const canvas = canvasRef.current;
                if (!video || !canvas) return;
                
                // 為了避免變形的 canvas 繪製，這裡使用 video 的實際解析度
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                
                // 水平翻轉修正 (如果是前鏡頭，通常會有鏡像問題，可以選擇是否翻轉)
                // ctx.translate(canvas.width, 0);
                // ctx.scale(-1, 1);
                
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const base64Img = canvas.toDataURL('image/jpeg', 0.8);
                stopCamera();
                onProcessStart(base64Img);
            };

            return (
                <div className="flex-1 w-full relative flex flex-col bg-black overflow-hidden">
                    {/* 返回按鈕 */}
                    <button onClick={() => {stopCamera(); onCancel();}} className="absolute top-[env(safe-area-inset-top,20px)] left-6 z-40 text-white/70 hover:text-white text-4xl p-4 touch-btn drop-shadow-md">
                        <i className="fa-solid fa-arrow-left"></i>
                    </button>
                    
                    {/* 切換鏡頭按鈕 */}
                    {cameras.length > 1 && (
                        <button onClick={switchCamera} className="absolute top-[env(safe-area-inset-top,20px)] right-6 z-40 bg-neutral-800/60 p-4 rounded-full text-white text-2xl touch-btn shadow-lg backdrop-blur-md border border-white/20">
                            <i className="fa-solid fa-camera-rotate"></i>
                        </button>
                    )}

                    {/* 相機預覽區塊 - 使用 absolute inset-0 確保滿版但不過度擠壓 */}
                    <video 
                        ref={videoRef} 
                        className="absolute inset-0 w-full h-full object-cover" 
                        autoPlay 
                        playsInline 
                        webkit-playsinline="true" 
                        muted>
                    </video>
                        
                    {/* 倒數動畫 */}
                    {countdown !== null && (
                        <div className="absolute inset-0 flex items-center justify-center z-30 bg-black/30 backdrop-blur-sm">
                            <span className="text-9xl font-black text-white drop-shadow-2xl animate-ping">{countdown}</span>
                        </div>
                    )}
                    
                    <canvas ref={canvasRef} className="hidden"></canvas>
                    
                    {/* 拍照按鈕 - 修正：不再被底部裁切，加入底部安全邊距 padding-bottom */}
                    <div className="absolute bottom-0 left-0 right-0 flex justify-center items-end z-40 pb-[calc(env(safe-area-inset-bottom,20px)+30px)] bg-gradient-to-t from-black/80 to-transparent pt-20">
                        <button onClick={takePhoto} className={`touch-btn w-20 h-20 md:w-24 md:h-24 rounded-full border-4 border-white flex items-center justify-center transition-all shadow-xl ${countdown !== null ? 'opacity-50 scale-90' : 'hover:bg-white/20'}`}>
                            <div className="w-16 h-16 md:w-20 md:h-20 bg-white rounded-full transition-transform active:scale-90"></div>
                        </button>
                    </div>
                </div>
            );
        };

        // 離線線稿運算引擎 (Sobel 邊緣偵測) - 保持原本為您設計的功能
        const ProcessingView = ({ sourceImage, user, onComplete, onFail }) => {
            const [statusText, setStatusText] = useState("正在將影像傳送至 AI...");

            useEffect(() => { processImage(); }, []);

            const processImage = async () => {
                try {
                    setStatusText("AI 正在淬鍊您的線條...");
                    let finalImageUrl = sourceImage;
                    
                    try {
                        const BACKEND_URL = 'https://aicameraliveprint-back.onrender.com/api/generate-lineart';
                        const response = await fetch(BACKEND_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ image: sourceImage })
                        });
                        if (response.ok) {
                            const data = await response.json();
                            finalImageUrl = data.result;
                        } else throw new Error("Backend failed");
                    } catch (apiErr) {
                        console.warn("未連接雲端 API，使用前端邊緣偵測模擬線稿效果");
                        finalImageUrl = await simulateEdgeDetection(sourceImage);
                    }

                    setStatusText("正在產生取件號碼...");
                    let nextTicket = "001";
                    if (db && storage && user) {
                        const collRef = collection(db, 'artifacts', appId, 'public', 'data', 'linearts');
                        const snapshot = await getDocs(collRef);
                        let maxNum = 0;
                        snapshot.forEach(doc => {
                            const t = parseInt(doc.data().ticket, 10);
                            if (!isNaN(t) && t > maxNum) maxNum = t;
                        });
                        nextTicket = String(maxNum + 1).padStart(3, '0');
                        const imgRef = ref(storage, `artifacts/${appId}/images/${nextTicket}_${Date.now()}.jpg`);
                        await uploadString(imgRef, finalImageUrl, 'data_url');
                        finalImageUrl = await getDownloadURL(imgRef);
                        await addDoc(collRef, { ticket: nextTicket, imageUrl: finalImageUrl, timestamp: Date.now(), status: 'pending' });
                    } else {
                        nextTicket = String(Math.floor(Math.random() * 999)).padStart(3, '0');
                    }
                    onComplete(finalImageUrl, nextTicket);
                } catch (err) {
                    alert("處理發生錯誤！");
                    onFail();
                }
            };

            const simulateEdgeDetection = (base64) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scale = 800 / Math.max(img.width, img.height); // 提高解析度讓線條更細緻
                        canvas.width = Math.floor(img.width * scale);
                        canvas.height = Math.floor(img.height * scale);
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imageData.data;
                        const w = imageData.width;
                        const h = imageData.height;

                        const gray = new Uint8Array(w * h);
                        for (let i = 0; i < data.length; i += 4) {
                            gray[i/4] = data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114;
                        }

                        const sobelData = new Uint8ClampedArray(data.length);
                        sobelData.fill(255); 

                        for (let y = 1; y < h - 1; y++) {
                            for (let x = 1; x < w - 1; x++) {
                                let p00 = gray[(y-1)*w + (x-1)], p01 = gray[(y-1)*w + x], p02 = gray[(y-1)*w + (x+1)];
                                let p10 = gray[y*w + (x-1)],                              p12 = gray[y*w + (x+1)];
                                let p20 = gray[(y+1)*w + (x-1)], p21 = gray[(y+1)*w + x], p22 = gray[(y+1)*w + (x+1)];

                                let gx = -p00 + p02 - 2*p10 + 2*p12 - p20 + p22;
                                let gy = -p00 - 2*p01 - p02 + p20 + 2*p21 + p22;
                                let mag = Math.sqrt(gx*gx + gy*gy);

                                // 針對雷雕優化，降低雜訊，只抓出明顯輪廓線
                                let isEdge = mag > 60; 
                                let idx = (y * w + x) * 4;
                                let val = isEdge ? 0 : 255; 
                                
                                sobelData[idx] = val;
                                sobelData[idx+1] = val;
                                sobelData[idx+2] = val;
                                sobelData[idx+3] = 255;
                            }
                        }
                        imageData.data.set(sobelData);
                        ctx.putImageData(imageData, 0, 0);
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                    img.src = base64;
                });
            }

            return (
                <div className="flex-1 flex flex-col items-center justify-center space-y-8 bg-neutral-900">
                    <div className="w-24 h-24 border-8 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin shadow-[0_0_15px_rgba(6,182,212,0.5)]"></div>
                    <h2 className="text-3xl font-bold animate-pulse">{statusText}</h2>
                    <p className="text-gray-400 text-center px-4">完美的作品值得等待<br/><span className="text-sm">(目前套用：前端數位邊緣萃取運算)</span></p>
                </div>
            );
        };

        const ResultView = ({ imageUrl, ticket, onDone }) => {
            return (
                <div className="flex-1 flex flex-col items-center justify-center p-6 bg-neutral-900 overflow-y-auto pb-[env(safe-area-inset-bottom)]">
                    <h2 className="text-3xl md:text-4xl font-bold mt-4 mb-2">生成完畢！</h2>
                    <p className="text-sm md:text-xl text-gray-400 mb-6 text-center">請將此號碼出示給工作人員進行雷雕</p>
                    
                    <div className="flex flex-col md:flex-row items-center gap-6 md:gap-12 bg-neutral-800 p-6 md:p-8 rounded-3xl shadow-2xl border border-neutral-700 w-full max-w-4xl">
                        <div className="w-full md:w-1/2 flex justify-center">
                            <img src={imageUrl} alt="Result" className="w-full max-w-sm rounded-lg shadow-inner bg-white" />
                        </div>
                        <div className="w-full md:w-1/2 flex flex-col items-center justify-center">
                            <div className="text-gray-400 text-xl md:text-2xl mb-2">您的專屬取件號碼</div>
                            <div className="text-7xl md:text-9xl font-black text-cyan-400 tracking-widest drop-shadow-lg mb-8">
                                {ticket}
                            </div>
                            <button 
                                onClick={onDone}
                                className="touch-btn w-full py-4 md:py-5 bg-white text-black rounded-full text-xl md:text-2xl font-bold shadow-[0_4px_15px_rgba(255,255,255,0.2)] hover:bg-gray-200"
                            >
                                完成並返回首頁 <i className="fa-solid fa-check ml-2"></i>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const AdminView = ({ user, onExit }) => {
            const [items, setItems] = useState([]);
            
            useEffect(() => {
                if (!db || !user) return;
                const collRef = collection(db, 'artifacts', appId, 'public', 'data', 'linearts');
                const unsubscribe = onSnapshot(collRef, (snapshot) => {
                    let docs = [];
                    snapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
                    docs.sort((a, b) => parseInt(b.ticket) - parseInt(a.ticket));
                    setItems(docs);
                });
                return () => unsubscribe();
            }, [user]);

            const downloadImage = async (url, ticket) => {
                try {
                    const response = await fetch(url);
                    const blob = await response.blob();
                    const a = document.createElement('a');
                    a.href = window.URL.createObjectURL(blob);
                    a.download = `LineArt_${ticket}.png`;
                    a.click();
                } catch (e) {
                    alert("下載失敗，請右鍵另存圖片");
                }
            };

            return (
                <div className="flex-1 flex flex-col bg-neutral-900 text-white p-6 pb-[env(safe-area-inset-bottom)]">
                    <div className="flex justify-between items-center border-b border-neutral-700 pb-4 mb-6 mt-[env(safe-area-inset-top)]">
                        <h2 className="text-2xl md:text-3xl font-bold"><i className="fa-solid fa-user-shield text-cyan-500"></i> 雷雕任務管理</h2>
                        <button onClick={onExit} className="px-4 py-2 bg-red-600 hover:bg-red-500 rounded-lg font-bold transition-colors">離開</button>
                    </div>
                    <div className="flex-1 scrollable-grid pr-2">
                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6">
                            {items.map(item => (
                                <div key={item.id} className="bg-neutral-800 rounded-xl p-4 flex flex-col items-center">
                                    <div className="w-full aspect-square bg-white rounded-lg mb-4 overflow-hidden flex items-center justify-center">
                                        <img src={item.imageUrl} className="object-cover w-full h-full" />
                                    </div>
                                    <div className="text-2xl font-black text-cyan-400 mb-3">#{item.ticket}</div>
                                    <button onClick={() => downloadImage(item.imageUrl, item.ticket)} className="w-full py-2 bg-white text-black font-bold rounded hover:bg-gray-200">下載圖檔</button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
