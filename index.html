<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 BEST AI AWARDS | 智慧創新大賞</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;500;900&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --ai-cyan: #00f2ff;
            --ai-pink: #ff00d0;
            --ai-dark: #020617;
        }
        body {
            touch-action: pan-x pan-y;
            user-select: none; 
            -webkit-user-select: none;
            overflow: hidden; 
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--ai-dark);
        }
        .cyber-bg {
            background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
            position: relative;
        }
        .cyber-bg::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 0;
        }
        .kv-title {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(to bottom, #fff 30%, var(--ai-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5));
        }
        .glow-bar {
            height: 3px;
            width: 180px;
            background: linear-gradient(90deg, transparent, var(--ai-pink), var(--ai-cyan), transparent);
            box-shadow: 0 0 12px var(--ai-pink), 0 0 20px var(--ai-cyan);
            border-radius: 50%;
        }
        .content-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-top: 1rem;
            margin-bottom: 1rem;
        }
        @media (min-height: 1100px) and (max-aspect-ratio: 10/16) {
            .content-container { justify-content: flex-start; padding-top: 5rem; }
        }
        .camera-container {
            width: 75vw; height: 75vw; max-width: 500px; max-height: 500px;
            position: relative; overflow: hidden; border-radius: 1.5rem;
            border: 3px solid var(--ai-cyan);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
            background-color: #000; transition: all 0.3s ease-in-out;
        }
        @media (min-height: 1100px) {
            .camera-container { max-width: 680px; max-height: 680px; }
        }
        .choice-card {
            border: 3px solid #1e293b;
            background: rgba(15, 23, 42, 0.6);
            transition: all 0.25s ease;
            cursor: pointer;
        }
        .choice-card.selected {
            border-color: var(--ai-cyan);
            box-shadow: 0 0 35px rgba(0, 242, 255, 0.5);
            background: rgba(0, 242, 255, 0.1);
            transform: scale(1.03);
        }
        .face-guide {
            width: 55%; aspect-ratio: 1 / 1.35; border-radius: 50%;
            border: 3px solid var(--ai-cyan);
            box-shadow: 0 0 20px var(--ai-cyan), 0 0 0 9999px rgba(2, 6, 23, 0.6);
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none;
        }
        .radar-spinner {
            position: relative; width: 160px; height: 160px;
            border-radius: 50%; border: 2px dashed rgba(0, 242, 255, 0.5);
            animation: spin 8s linear infinite;
        }
        .radar-spinner::before {
            content: ''; position: absolute; inset: 12px; border-radius: 50%;
            border: 4px solid transparent; border-top-color: var(--ai-cyan); border-bottom-color: var(--ai-cyan);
            animation: spin 2s linear infinite reverse;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .text-glow-pulse { animation: pulse-glow 2s ease-in-out infinite; }
        @keyframes pulse-glow { 0%, 100% { opacity: 1; text-shadow: 0 0 20px var(--ai-cyan); } 50% { opacity: 0.6; text-shadow: 0 0 8px var(--ai-cyan); } }
        .btn-cyan {
            background: rgba(0, 242, 255, 0.1); border: 2px solid var(--ai-cyan); color: var(--ai-cyan);
            letter-spacing: 2px; transition: all 0.3s; box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }
        .btn-cyan:active:not(:disabled) { background: var(--ai-cyan); color: #000; box-shadow: 0 0 35px var(--ai-cyan); }
        .btn-red {
            background: rgba(255, 0, 208, 0.1); border: 2px solid var(--ai-pink); color: var(--ai-pink);
            letter-spacing: 2px; transition: all 0.3s;
        }
        .btn-red:active { background: var(--ai-pink); color: #000; }
    </style>
</head>
<body class="cyber-bg text-white min-h-[100dvh] w-screen flex flex-col">
    <div id="root" class="h-full w-full relative z-10 flex-grow flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const API_BASE_URL = "https://aicameraliveprint-back.onrender.com";

        const LOADING_TEXTS_CH = ["啟動視覺網路模組", "正在萃取臉部幾何特徵", "演算極簡線條結構", "套用 AI 大賞專屬模型", "即將生成雙重對照風格"];
        const LOADING_TEXTS_EN = ["BOOTING NEURAL...", "EXTRACTING PORTRAIT...", "VECTOR PROCESSING...", "APPLYING EXCLUSIVE LORA...", "GENERATING DUAL STYLES..."];

        const App = () => {
            const [step, setStep] = useState('home');
            const [taskId, setTaskId] = useState(null);
            
            // 雙圖核心狀態儲存
            const [imgA, setImgA] = useState(null);
            const [imgB, setImgB] = useState(null);
            const [selectedChoice, setSelectedChoice] = useState(null);

            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const [countdown, setCountdown] = useState(0);
            const [textIndex, setTextIndex] = useState(0);
            const pollingRef = useRef(null);
            const [isPrinting, setIsPrinting] = useState(false);
            const [stream, setStream] = useState(null);

            // 🌟 100% 安全鏡頭啟動流：先請求 Stream，成功後才推進 React 切換畫面，避免 ref 讀取到 null 的當機衝突
            const startCamera = async () => {
                try {
                    const mediaStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }
                    });
                    setStream(mediaStream);
                    setStep('camera');
                } catch (err) {
                    alert("請開通相機權限！");
                    setStep('home');
                }
            };

            // 當 React 把 HTML 的 <video> 節點成功掛載並準備妥當後，useEffect 自動將 Stream 指向 Ref
            useEffect(() => {
                if (step === 'camera' && stream && videoRef.current) {
                    videoRef.current.srcObject = stream;
                    videoRef.current.play().catch(e => console.log("Play error:", e));
                }
            }, [step, stream]);

            const takePhoto = () => {
                if (countdown > 0) return;
                setCountdown(3);
                let count = 3;
                const timer = setInterval(() => {
                    count -= 1;
                    setCountdown(count);
                    if (count === 0) {
                        clearInterval(timer);
                        capture();
                    }
                }, 1000);
            };

            const capture = async () => {
                const video = videoRef.current;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const size = Math.min(video.videoWidth, video.videoHeight);
                
                canvas.width = size; canvas.height = size;
                ctx.translate(size, 0); ctx.scale(-1, 1);
                ctx.drawImage(video, (video.videoWidth - size) / 2, (video.videoHeight - size) / 2, size, size, 0, 0, size, size);
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                
                // 停止鏡頭 Stream 防止耗電
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                }
                setStream(null);
                
                setStep('loading');
                setSelectedChoice(null);

                try {
                    const res = await fetch(API_BASE_URL + "/api/upload", {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: dataUrl })
                    });
                    const data = await res.json();
                    if (data.success) setTaskId(data.taskId);
                } catch (err) {
                    setTimeout(() => { setTaskId("007"); }, 1500);
                }
            };

            // 🌟 徹底根除 Babel 死黑 Bug：改採「標準字串拼接」生成印表機 Web 模板，100% 避開巢狀轉義反斜線之解析衝突
            const triggerPrinter = (id, chosenImgUrl) => {
                setIsPrinting(true);
                let iframe = document.getElementById('print-iframe') || document.createElement('iframe');
                iframe.id = 'print-iframe';
                iframe.style.display = 'none';
                if (!iframe.parentElement) document.body.appendChild(iframe);

                const doc = iframe.contentWindow.document;
                doc.open();
                
                const printHTML = "<html><head><style>" +
                    "@page { size: 58mm auto; margin: 0mm; }" +
                    "body { font-family: sans-serif; width: 52mm; margin: 0 auto; padding: 8px 1px; text-align: center; color: #000; background: #fff; }" +
                    ".title { font-size: 13px; font-weight: 900; }" +
                    ".id-num { font-size: 34px; font-weight: 900; margin: 2px 0; }" +
                    ".ticket-img { width: 44mm; height: 44mm; object-fit: cover; margin: 4px auto; border: 1.5px solid #000; border-radius: 4px; display: block; }" +
                    ".footer-msg { font-size: 8.5px; font-weight: bold; margin-top: 5px; border-top: 1px dashed #000; padding-top: 4px; }" +
                    "</style></head><body>" +
                    "<div class='title'>智慧創新大賞</div>" +
                    "<div style='font-size:8px;'>2026 BEST AI AWARDS</div>" +
                    "<div style='font-size:9px; margin-top:3px; font-weight:bold;'>雷雕領取序號</div>" +
                    "<div class='id-num'>#" + id + "</div>" +
                    "<img class='ticket-img' src='" + chosenImgUrl + "' />" +
                    "<div class='footer-msg'>您已確認此客製外觀！<br/>請憑此票券至雷雕體驗區領取成品。</div>" +
                    "</body></html>";
                
                doc.write(printHTML);
                doc.close();

                const img = doc.querySelector('.ticket-img');
                const printIt = () => {
                    iframe.contentWindow.focus();
                    iframe.contentWindow.print();
                    setIsPrinting(false);
                    setTimeout(() => { setStep('home'); setTaskId(null); }, 1500);
                };
                if (img) { img.onload = printIt; img.onerror = printIt; } else { printIt(); }
            };

            const finalizeChoiceAndPrint = async () => {
                if (!selectedChoice) return;
                const chosenImg = selectedChoice === 'A' ? imgA : imgB;
                
                try {
                    await fetch(API_BASE_URL + "/api/choice/" + taskId, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ choice: selectedChoice })
                    });
                } catch(e) { console.error("回傳選擇失敗", e); }

                triggerPrinter(taskId, chosenImg);
            };

            const handleCancelAndGoHome = () => {
                if (pollingRef.current) clearInterval(pollingRef.current);
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                }
                setStream(null);
                setTaskId(null);
                setResultImage(null);
                setStep('home');
            };

            useEffect(() => {
                let textInterval;
                if (step === 'loading') {
                    textInterval = setInterval(() => { setTextIndex(p => (p + 1) % LOADING_TEXTS_CH.length); }, 1500);

                    if (taskId) {
                        pollingRef.current = setInterval(async () => {
                            try {
                                const res = await fetch(API_BASE_URL + "/api/status/" + taskId);
                                const data = await res.json();
                                if (data.status === 'completed' && data.resultImageA && data.resultImageB) {
                                    setImgA(data.resultImageA);
                                    setImgB(data.resultImageB);
                                    setStep('choice');
                                    clearInterval(pollingRef.current);
                                }
                            } catch (err) {
                                if (taskId === "007") {
                                    setTimeout(() => {
                                        const mockUrl = canvasRef.current.toDataURL();
                                        setImgA(mockUrl); setImgB(mockUrl);
                                        setStep('choice');
                                        clearInterval(pollingRef.current);
                                    }, 4000);
                                }
                            }
                        }, 3000);
                    }
                }
                return () => { clearInterval(textInterval); clearInterval(pollingRef.current); };
            }, [step, taskId]);

            return (
                <div className="flex flex-col items-center justify-between h-[100dvh] w-full py-6 px-4">
                    
                    {/* Header */}
                    <div className="text-center z-10 flex flex-col items-center flex-shrink-0 w-full">
                        <img src="https://img.shoplineapp.com/media/image_clips/6a14557eb36f6eb74d460308/original.png?1779717502=&owner_id=66221c5c384dbb002ec45c18" className="w-[240px] sm:w-[350px] h-auto mb-1 filter drop-shadow-[0_0_10px_rgba(0,242,255,0.6)]" />
                        <h1 className="kv-title text-3xl sm:text-5xl font-black mb-1.5 tracking-widest">智慧創新大賞</h1>
                        <div className="glow-bar"></div>
                    </div>

                    {/* 互動內容控制中樞 */}
                    <div className="content-container">
                        
                        {/* 關卡 1：首頁 */}
                        {step === 'home' && (
                            <div className="text-center">
                                <p className="text-ai-cyan text-base sm:text-xl mb-8 tracking-[0.3em] text-glow-pulse font-light">AI 虛擬肖像風格化</p>
                                <button onClick={startCamera} className="btn-cyan text-xl sm:text-3xl font-black px-12 py-5 sm:py-7 rounded-full animate-pulse">開始體驗 START</button>
                            </div>
                        )}

                        {/* 關卡 2：相機畫面 */}
                        {step === 'camera' && (
                            <div className="flex flex-col items-center w-full">
                                <div className="camera-container">
                                    <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover absolute inset-0" style={{ transform: 'rotateY(180deg)' }} />
                                    <div className="face-guide"></div>
                                    {countdown > 0 && (
                                        <div className="absolute top-4 right-4 w-16 h-16 rounded-xl border border-ai-cyan bg-[#020617]/95 flex flex-col items-center justify-center">
                                            <span className="text-[28px] font-black text-white font-mono">{countdown}</span>
                                        </div>
                                    )}
                                </div>
                                <div className="mt-5 flex gap-4 w-[82vw] sm:w-[75vw] lg:w-[80vw] max-w-[400px] sm:max-w-[580px] lg:max-w-[780px] px-2">
                                    <button onClick={handleCancelAndGoHome} className="btn-cyan flex-1 py-3.5 rounded-xl text-sm font-bold">返回首頁</button>
                                    <button onClick={takePhoto} className="btn-cyan flex-[2.5] py-3.5 rounded-xl text-lg font-black bg-ai-cyan/20">拍攝照片 PHOTO</button>
                                </div>
                            </div>
                        )}

                        {/* 關卡 3：背景 AI 運算生成隊列中 */}
                        {step === 'loading' && (
                            <div className="flex flex-col items-center justify-center">
                                <div className="relative flex items-center justify-center mb-6"><div className="radar-spinner"></div></div>
                                <div className="h-20 text-center mb-4">
                                    <h2 className="text-lg sm:text-2xl font-bold text-white tracking-wider mb-1 text-glow-pulse">{LOADING_TEXTS_CH[textIndex]}</h2>
                                    <p className="text-ai-cyan text-xs font-mono opacity-80 tracking-widest">{LOADING_TEXTS_EN[textIndex]}</p>
                                </div>
                                {taskId && (
                                    <div className="bg-black/40 p-4 rounded-2xl border border-ai-cyan text-center w-56 shadow-lg mb-4">
                                        <p className="text-[10px] text-slate-400 font-mono tracking-wider">PROGRESS ID</p>
                                        <p className="text-4xl font-mono font-black text-ai-cyan">#{taskId}</p>
                                    </div>
                                )}
                                <button onClick={handleCancelAndGoHome} className="btn-red px-6 py-2.5 rounded-xl text-xs font-bold">取消返回首頁</button>
                            </div>
                        )}

                        {/* 關卡 4：頂級雙重風格二選一互動介面 */}
                        {step === 'choice' && (
                            <div className="flex flex-col items-center w-full max-w-[750px] px-2">
                                <p className="text-ai-cyan text-sm sm:text-base font-bold tracking-widest mb-3 animate-pulse">
                                    ✨ 請手動挑選您最喜愛的專屬風格款式 ✨
                                </p>
                                
                                <div className="grid grid-cols-2 gap-4 w-full mb-6">
                                    <div onClick={() => setSelectedChoice('A')} className={"choice-card p-2 rounded-2xl text-center " + (selectedChoice === 'A' ? 'selected' : '')}>
                                        <img src={imgA} className="w-full aspect-square object-cover rounded-xl mb-2 border border-slate-800" />
                                        <span className="text-xs sm:text-sm font-black tracking-wider block">【 風格 A 款 】</span>
                                    </div>
                                    <div onClick={() => setSelectedChoice('B')} className={"choice-card p-2 rounded-2xl text-center " + (selectedChoice === 'B' ? 'selected' : '')}>
                                        <img src={imgB} className="w-full aspect-square object-cover rounded-xl mb-2 border border-slate-800" />
                                        <span className="text-xs sm:text-sm font-black tracking-wider block">【 風格 B 款 】</span>
                                    </div>
                                </div>

                                <div className="flex gap-4 w-full sm:max-w-[500px]">
                                    <button onClick={handleCancelAndGoHome} className="btn-cyan flex-1 py-3.5 rounded-xl text-xs sm:text-sm font-bold">放棄返回</button>
                                    <button 
                                        disabled={!selectedChoice || isPrinting} 
                                        onClick={finalizeChoiceAndPrint} 
                                        className={"flex-[2.5] py-3.5 rounded-xl text-base sm:text-lg font-black transition-all duration-300 " + (selectedChoice ? 'btn-cyan bg-cyan-400 text-slate-950 shadow-[0_0_25px_rgba(0,242,255,0.4)]' : 'bg-slate-800 text-slate-500 border border-slate-700 cursor-not-allowed')}
                                    >
                                        <i className="fa-solid fa-print mr-1.5"></i>
                                        {isPrinting ? "正在出票中..." : "確認雷雕列印"}
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Footer */}
                    <div className="w-full flex justify-end px-4 opacity-50 text-xs font-mono text-ai-cyan tracking-widest">2026</div>
                    <canvas ref={canvasRef} className="hidden"></canvas>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
