<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 完美鎖定 viewport，適應 iPhone 瀏海與底部安全區 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI 專屬雷雕似顏繪</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 修正黑屏問題：加入 height: 100vh 作為舊版 iOS 的備援 */
        html, body {
            height: 100vh; /* Fallback for older browsers */
            height: 100dvh;
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #ffffff;
            overflow: hidden;
            touch-action: none; 
            font-family: 'Helvetica Neue', Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        #root {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        .touch-btn:active {
            transform: scale(0.95);
            transition: transform 0.1s;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        const { useState, useEffect, useRef } = React;

        let app, auth, db, storage, appId;
        
        try {
            const firebaseConfig = typeof __firebase_config !== 'undefined' 
                ? JSON.parse(__firebase_config) 
                : {};
            if (Object.keys(firebaseConfig).length > 0) {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                storage = getStorage(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'photo-booth-app';
            }
        } catch (e) {
            console.warn("Firebase 未配置，使用無資料庫模式");
        }

        const App = () => {
            const [view, setView] = useState('home');
            const [user, setUser] = useState(null);
            const [lineArtResult, setLineArtResult] = useState(null);
            const [ticketNumber, setTicketNumber] = useState('');

            useEffect(() => {
                if (auth) {
                    const initAuth = async () => { await signInAnonymously(auth); };
                    initAuth();
                    const unsubscribe = onAuthStateChanged(auth, setUser);
                    return () => unsubscribe();
                } else {
                    setUser({ uid: 'local-test-user' });
                }
            }, []);

            return (
                <div className="w-full h-full flex flex-col relative bg-neutral-900 text-white">
                    {view === 'home' && <HomeView onStart={() => setView('camera')} />}
                    {view === 'camera' && <CameraView 
                        onProcessStart={(img) => { setLineArtResult(img); setView('processing'); }} 
                        onCancel={() => setView('home')} 
                    />}
                    {view === 'processing' && <ProcessingView 
                        sourceImage={lineArtResult}
                        user={user}
                        onComplete={(resultUrl, ticket) => { 
                            setLineArtResult(resultUrl); 
                            setTicketNumber(ticket);
                            setView('result'); 
                        }} 
                        onFail={() => setView('home')}
                    />}
                    {view === 'result' && <ResultView 
                        imageUrl={lineArtResult} 
                        ticket={ticketNumber}
                        onDone={() => setView('home')} 
                    />}
                </div>
            );
        };

        const HomeView = ({ onStart }) => (
            <div className="flex-1 flex flex-col items-center justify-center p-8 text-center space-y-12 pb-[env(safe-area-inset-bottom)]">
                <div className="animate-pulse flex items-center justify-center w-32 h-32 rounded-full bg-white/10 mb-4 shadow-[0_0_30px_rgba(255,255,255,0.1)]">
                    <i className="fa-solid fa-wand-magic-sparkles text-6xl text-cyan-400"></i>
                </div>
                <div>
                    <h1 className="text-4xl md:text-7xl font-bold tracking-wider mb-6">AI 專屬雷雕似顏繪</h1>
                    <p className="text-lg md:text-3xl text-gray-400">專屬你的極簡線條藝術</p>
                </div>
                <button 
                    onClick={onStart}
                    className="touch-btn mt-12 px-8 py-5 md:px-12 md:py-6 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-full text-2xl md:text-3xl font-bold shadow-[0_10px_20px_rgba(6,182,212,0.4)] flex items-center space-x-4"
                >
                    <i className="fa-solid fa-camera"></i>
                    <span>點擊畫面開始拍照</span>
                </button>
            </div>
        );

        const CameraView = ({ onProcessStart, onCancel }) => {
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const [countdown, setCountdown] = useState(null);
            const [flash, setFlash] = useState(false);

            useEffect(() => {
                const startCamera = async () => {
                    try {
                        // 🌟 修正1：拔除 ideal: 1080，讓 iPhone 恢復預設的廣角視野，臉就不會那麼大了！
                        const constraints = { video: { facingMode: 'user' }, audio: false };
                        const stream = await navigator.mediaDevices.getUserMedia(constraints);
                        if (videoRef.current) videoRef.current.srcObject = stream;
                    } catch (err) {
                        alert("無法存取相機設備，請確認權限");
                        onCancel();
                    }
                };
                startCamera();

                return () => {
                    if (videoRef.current && videoRef.current.srcObject) {
                        videoRef.current.srcObject.getTracks().forEach(t => t.stop());
                    }
                };
            }, []);

            const takePhoto = () => {
                if (countdown !== null) return;
                let timer = 3;
                setCountdown(timer);
                const interval = setInterval(() => {
                    timer -= 1;
                    if (timer > 0) {
                        setCountdown(timer);
                    } else {
                        clearInterval(interval);
                        setCountdown(null);
                        triggerFlashAndCapture();
                    }
                }, 1000);
            };

            const triggerFlashAndCapture = () => {
                setFlash(true);
                setTimeout(() => {
                    setFlash(false);
                    captureAndProceed();
                }, 150);
            };

            const captureAndProceed = () => {
                const video = videoRef.current;
                const canvas = canvasRef.current;
                if (!video || !canvas || video.videoWidth === 0) return;
                
                // 1:1 正方形置中裁切
                const size = Math.min(video.videoWidth, video.videoHeight);
                const startX = (video.videoWidth - size) / 2;
                const startY = (video.videoHeight - size) / 2;
                
                canvas.width = 1024;
                canvas.height = 1024;
                const ctx = canvas.getContext('2d');
                
                // 鏡像修正
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(video, startX, startY, size, size, 0, 0, 1024, 1024);
                
                const base64Img = canvas.toDataURL('image/jpeg', 0.85);
                onProcessStart(base64Img); // 傳送資料並切換至 Loading 畫面
            };

            return (
                <div className="flex-1 w-full relative flex flex-col bg-black items-center justify-center">
                    {flash && <div className="absolute inset-0 bg-white z-50"></div>}

                    <button onClick={onCancel} className="absolute top-[env(safe-area-inset-top,20px)] left-6 z-40 text-white/70 hover:text-white text-4xl p-4 touch-btn">
                        <i className="fa-solid fa-arrow-left"></i>
                    </button>

                    <div className="w-[90vw] h-[90vw] max-w-[600px] max-h-[600px] rounded-3xl overflow-hidden relative shadow-2xl bg-neutral-900 border-4 border-neutral-700">
                        <video ref={videoRef} className="absolute inset-0 w-full h-full object-cover transform scale-x-[-1]" autoPlay playsInline muted></video>
                        {countdown !== null && (
                            <div className="absolute inset-0 flex items-center justify-center text-[150px] font-bold text-white drop-shadow-[0_10px_10px_rgba(0,0,0,0.8)] z-30">
                                {countdown}
                            </div>
                        )}
                    </div>
                    
                    {countdown === null && (
                        <button onClick={takePhoto} className="touch-btn mt-12 px-12 py-5 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-full text-3xl font-bold shadow-lg flex items-center space-x-4">
                            <i className="fa-solid fa-camera"></i>
                            <span>拍照</span>
                        </button>
                    )}
                    <canvas ref={canvasRef} className="hidden"></canvas>
                </div>
            );
        };

        const ProcessingView = ({ sourceImage, user, onComplete, onFail }) => {
            const [statusText, setStatusText] = useState("AI 正在仔細觀察您的穿搭...");
            
            useEffect(() => {
                const texts = ["AI 正在仔細觀察您的穿搭...", "捕捉到您的專屬特徵了！準備提筆...", "正在為您繪製極簡線條...", "雷雕圖形最佳化處理中..."];
                let i = 0;
                const interval = setInterval(() => {
                    i = (i + 1) % texts.length;
                    setStatusText(texts[i]);
                }, 3500);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => { 
                const timeoutId = setTimeout(() => {
                    processImage();
                }, 150);
                
                const failTimeout = setTimeout(() => {
                    alert("AI 伺服器排隊中或未回應，請稍後再試！");
                    onFail();
                }, 60000); 

                return () => {
                    clearTimeout(timeoutId);
                    clearTimeout(failTimeout);
                };
            }, []);

            const processImage = async () => {
                try {
                    let finalImageUrl = "";
                    const BACKEND_URL = 'https://aicameraliveprint-back.onrender.com/api/generate-lineart'; 
                    const response = await fetch(BACKEND_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: sourceImage })
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        finalImageUrl = data.resultUrl || data.result; 
                    } else {
                        throw new Error("Backend Fetch Failed");
                    }

                    // 取號機制
                    let ticket = parseInt(localStorage.getItem('ticketNumber') || '0');
                    ticket = ticket >= 999 ? 1 : ticket + 1;
                    localStorage.setItem('ticketNumber', ticket);
                    const nextTicket = ticket.toString().padStart(3, '0');
                    
                    onComplete(finalImageUrl, nextTicket);
                } catch (err) {
                    console.error("後端 API 異常", err);
                    alert("目前排隊人數較多或伺服器異常，請重新嘗試！");
                    onFail(); // 🛑 修正：如果失敗直接回首頁，避免傳送破圖導致 QR Code 崩潰
                }
            };

            return (
                <div className="flex-1 flex flex-col items-center justify-center space-y-8 bg-neutral-900 w-full h-full">
                    <div className="w-24 h-24 border-8 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin shadow-[0_0_15px_rgba(6,182,212,0.5)]"></div>
                    <h2 className="text-3xl font-bold text-center px-6 leading-relaxed text-cyan-50">{statusText}</h2>
                    <p className="text-gray-400 text-center px-4">完美的作品值得等待，約需 10~15 秒</p>
                </div>
            );
        };

        const ResultView = ({ imageUrl, ticket, onDone }) => {
            return (
                <div className="flex-1 flex flex-col items-center justify-center p-6 bg-neutral-900 overflow-y-auto pb-[env(safe-area-inset-bottom)]">
                    <h2 className="text-3xl font-bold mt-4 mb-2">專屬頭像繪製完成！</h2>
                    <p className="text-gray-400 mb-6 text-center">請將專屬號碼出示給現場工作人員</p>
                    
                    <div className="flex flex-col items-center bg-neutral-800 p-6 rounded-3xl shadow-2xl w-full max-w-sm border border-neutral-700">
                        <img src={imageUrl} alt="Result" className="w-full rounded-lg bg-white border-2 border-neutral-600 mb-8" />
                        
                        <div className="text-gray-400 text-xl mb-1">您的專屬取件號碼</div>
                        <div className="text-7xl font-black text-cyan-400 tracking-widest mb-8">{ticket}</div>
                        
                        <button onClick={onDone} className="touch-btn w-full py-4 bg-white text-black rounded-full text-xl font-bold hover:bg-gray-200 shadow-lg">
                            完成並返回首頁 <i className="fa-solid fa-check ml-2"></i>
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
