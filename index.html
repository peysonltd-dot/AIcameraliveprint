<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 互動雷雕拍照機</title>
    <!-- 使用 Tailwind CSS 快速排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* 防止展場大螢幕被誤觸放大縮小，禁止反白選取 */
        body {
            touch-action: pan-x pan-y;
            user-select: none; 
            -webkit-user-select: none;
            overflow: hidden; /* 防止滾動 */
        }
        /* 鏡像翻轉相機畫面，讓客人像照鏡子一樣 */
        .mirror-video {
            transform: scaleX(-1);
        }
        /* 炫彩背景動畫 */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animated-bg {
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
    </style>
</head>
<body class="bg-black text-white h-screen w-screen animated-bg font-sans">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ⚠️ 非常重要：請換成您的 Render 伺服器網址
        const API_BASE_URL = "https://aicameraliveprint-back.onrender.com";

        const App = () => {
            // 系統狀態：home(首頁) -> camera(拍照) -> loading(人工處理中) -> result(結果與號碼牌)
            const [step, setStep] = useState('home');
            const [taskId, setTaskId] = useState(null);
            const [resultImage, setResultImage] = useState(null);
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const [countdown, setCountdown] = useState(0);

            // ==========================================
            // 1. 相機控制邏輯
            // ==========================================
            const startCamera = async () => {
                setStep('camera');
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { 
                            facingMode: "user", // 強制使用前鏡頭 (iPhone) 或預設外接鏡頭 (AIO)
                            width: { ideal: 1080 }, // 高畫質
                            height: { ideal: 1920 }
                        },
                        audio: false
                    });
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                    }
                } catch (err) {
                    console.error("相機啟動失敗:", err);
                    alert("請允許相機權限！");
                    setStep('home');
                }
            };

            const stopCamera = () => {
                if (videoRef.current && videoRef.current.srcObject) {
                    const tracks = videoRef.current.srcObject.getTracks();
                    tracks.forEach(track => track.stop());
                }
            };

            // ==========================================
            // 2. 拍照與上傳邏輯
            // ==========================================
            const takePhoto = () => {
                if (countdown > 0) return; // 防止重複點擊
                
                // 3秒倒數
                setCountdown(3);
                let count = 3;
                const timer = setInterval(() => {
                    count -= 1;
                    setCountdown(count);
                    if (count === 0) {
                        clearInterval(timer);
                        captureAndUpload();
                    }
                }, 1000);
            };

            const captureAndUpload = async () => {
                const video = videoRef.current;
                const canvas = canvasRef.current;
                const context = canvas.getContext('2d');

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                // 因為畫面有鏡像翻轉，拍照存檔時要翻回來
                context.translate(canvas.width, 0);
                context.scale(-1, 1);
                context.drawImage(video, 0, 0, canvas.width, canvas.height);

                const imageData = canvas.toDataURL('image/jpeg', 0.8);
                stopCamera();
                setStep('loading');

                try {
                    // 發送照片，拿取號碼牌 (Task ID)
                    const res = await fetch(`${API_BASE_URL}/api/upload`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: imageData })
                    });
                    const data = await res.json();
                    if (data.success) {
                        setTaskId(data.taskId);
                    } else {
                        throw new Error("無法取得號碼牌");
                    }
                } catch (err) {
                    alert("網路異常，請重新嘗試！");
                    setStep('home');
                }
            };

            // ==========================================
            // 3. 輪詢機制 (每 3 秒問一次後台畫好了沒)
            // ==========================================
            useEffect(() => {
                let pollingInterval;
                if (step === 'loading' && taskId) {
                    pollingInterval = setInterval(async () => {
                        try {
                            const res = await fetch(`${API_BASE_URL}/api/status/${taskId}`);
                            const data = await res.json();
                            
                            if (data.status === 'completed' && data.resultImage) {
                                setResultImage(data.resultImage);
                                setStep('result');
                                clearInterval(pollingInterval);
                            }
                        } catch (err) {
                            console.error("輪詢失敗", err);
                        }
                    }, 3000); // 3 秒問一次
                }
                return () => clearInterval(pollingInterval);
            }, [step, taskId]);

            // ==========================================
            // 4. 自動回首頁機制 (展場必備防呆)
            // ==========================================
            useEffect(() => {
                let timeout;
                if (step === 'result') {
                    // 顯示結果 30 秒後，自動清空並回到首頁迎接下一組客人
                    timeout = setTimeout(() => {
                        resetToHome();
                    }, 30000);
                }
                return () => clearTimeout(timeout);
            }, [step]);

            const resetToHome = () => {
                setStep('home');
                setTaskId(null);
                setResultImage(null);
                setCountdown(0);
            };

            // ==========================================
            // UI 畫面渲染
            // ==========================================
            return (
                <div className="h-full w-full flex flex-col items-center justify-center p-6 relative">
                    
                    {/* 步驟 1：首頁 */}
                    {step === 'home' && (
                        <div className="text-center flex flex-col items-center justify-center h-full space-y-12 animate-fade-in">
                            <h1 className="text-5xl md:text-7xl font-extrabold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 drop-shadow-lg">
                                AI 雷雕專屬肖像
                            </h1>
                            <p className="text-2xl md:text-4xl text-gray-300 font-light">
                                化身極簡漫畫風，刻下獨一無二的記憶
                            </p>
                            <button 
                                onClick={startCamera}
                                className="mt-12 bg-white text-black font-bold text-3xl md:text-5xl px-16 py-8 rounded-full shadow-[0_0_40px_rgba(255,255,255,0.4)] active:scale-95 transition-transform"
                            >
                                <i className="fa-solid fa-camera mr-4"></i> 點擊開始拍照
                            </button>
                        </div>
                    )}

                    {/* 步驟 2：相機畫面 */}
                    {step === 'camera' && (
                        <div className="h-full w-full flex flex-col items-center relative">
                            <div className="w-full h-[75%] bg-gray-900 rounded-3xl overflow-hidden shadow-2xl relative border-4 border-gray-700 mt-8">
                                <video 
                                    ref={videoRef} 
                                    autoPlay 
                                    playsInline 
                                    muted 
                                    className="w-full h-full object-cover mirror-video"
                                />
                                {countdown > 0 && (
                                    <div className="absolute inset-0 flex items-center justify-center bg-black/40 backdrop-blur-sm z-10">
                                        <span className="text-[15rem] font-bold text-white animate-ping">{countdown}</span>
                                    </div>
                                )}
                            </div>
                            <div className="flex-1 w-full flex items-center justify-center space-x-8">
                                <button onClick={() => { stopCamera(); setStep('home'); }} className="bg-gray-700 text-white text-2xl font-bold px-8 py-6 rounded-full hover:bg-gray-600 active:scale-95">
                                    <i className="fa-solid fa-arrow-left"></i> 返回
                                </button>
                                <button 
                                    onClick={takePhoto}
                                    className="bg-gradient-to-r from-cyan-500 to-blue-600 text-white text-4xl font-bold px-16 py-8 rounded-full shadow-[0_0_30px_rgba(6,182,212,0.5)] active:scale-95 transition-transform"
                                >
                                    <i className="fa-solid fa-camera mr-2"></i> 拍 照
                                </button>
                            </div>
                            <canvas ref={canvasRef} className="hidden"></canvas>
                        </div>
                    )}

                    {/* 步驟 3：人工處理等待畫面 */}
                    {step === 'loading' && (
                        <div className="text-center flex flex-col items-center justify-center h-full space-y-10">
                            <div className="relative">
                                <div className="w-40 h-40 border-8 border-gray-700 border-t-cyan-400 rounded-full animate-spin"></div>
                                <i className="fa-solid fa-wand-magic-sparkles absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-4xl text-cyan-400"></i>
                            </div>
                            <h2 className="text-4xl md:text-5xl font-bold text-white">AI 畫師正在為您作畫...</h2>
                            <p className="text-2xl text-gray-400">（因排隊人數較多，約需等待 1-2 分鐘）</p>
                            {taskId && (
                                <div className="mt-8 bg-gray-800/80 p-8 rounded-2xl border border-gray-600">
                                    <p className="text-xl text-gray-300 mb-2">您的專屬號碼牌</p>
                                    <p className="text-7xl font-bold text-cyan-400 tracking-widest">#{taskId}</p>
                                </div>
                            )}
                        </div>
                    )}

                    {/* 步驟 4：結果與取件序號 */}
                    {step === 'result' && (
                        <div className="h-full w-full flex flex-col items-center pt-12 space-y-8 animate-fade-in">
                            <h2 className="text-4xl md:text-5xl font-bold text-green-400">
                                <i className="fa-solid fa-check-circle mr-3"></i> 專屬頭像繪製完成！
                            </h2>
                            <p className="text-2xl text-gray-300">請截圖或記下號碼，前往雷雕機台取件</p>
                            
                            <div className="w-[80%] max-w-lg bg-white rounded-3xl overflow-hidden shadow-[0_0_50px_rgba(255,255,255,0.2)] p-4 border-8 border-gray-800">
                                <img src={resultImage} alt="生成結果" className="w-full h-auto object-contain rounded-xl" />
                            </div>

                            <div className="bg-gradient-to-r from-gray-800 to-gray-900 p-8 rounded-3xl border border-gray-600 shadow-2xl min-w-[300px] text-center">
                                <p className="text-2xl text-gray-400 mb-4">您的取件號碼</p>
                                <p className="text-8xl font-black text-cyan-400 tracking-tighter">#{taskId}</p>
                            </div>

                            <button onClick={resetToHome} className="text-xl text-gray-400 underline pt-4 active:text-white">
                                完成並返回首頁 (30秒後自動跳轉)
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
