<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>似顏繪雷雕拍照機</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            overflow: hidden;
        }
        #camera-container {
            position: relative;
            width: 100vw;
            height: 75vh;
            background-color: #000;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* 鏡像翻轉，像照鏡子一樣 */
        }
        #ui-container {
            height: 25vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #222;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        button:active {
            transform: scale(0.95);
        }
        #countdown-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 150px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            display: none;
            z-index: 10;
        }
        #loading-view, #result-view {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #1a1a1a;
            z-index: 20;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #result-image {
            max-width: 90%;
            max-height: 60vh;
            border: 5px solid white;
            border-radius: 10px;
            margin-bottom: 20px;
            background-color: white; /* 確保背景是白的 */
        }
        .order-number {
            font-size: 80px;
            color: #00bcd4;
            font-weight: bold;
            margin: 10px 0;
        }
        .tips {
            font-size: 18px;
            color: #aaa;
            margin-top: 20px;
        }
        /* 隱藏的畫布，用來擷取畫面 */
        canvas {
            display: none;
        }
    </style>
</head>
<body>

    <div id="main-view">
        <div id="camera-container">
            <video id="videoElement" autoplay playsinline></video>
            <div id="countdown-display">3</div>
        </div>
        <div id="ui-container">
            <button id="capture-btn">📸 點我拍照</button>
        </div>
    </div>

    <div id="loading-view">
        <h2>✨ AI 魔法施展中 ✨</h2>
        <p>正在為您繪製專屬塗鴉...</p>
        <p class="tips">（初次啟動約需等待 40~60 秒，請勿關閉網頁）</p>
    </div>

    <div id="result-view">
        <p>請將此畫面出示給工作人員進行雷雕</p>
        <img id="result-image" src="" alt="AI 線稿">
        <p>您的專屬取件號碼</p>
        <div class="order-number" id="order-number-display">025</div>
        <button onclick="resetApp()" style="background-color: #666; font-size: 18px; padding: 15px 30px; margin-top: 20px;">完成並返回首頁</button>
    </div>

    <canvas id="canvasElement"></canvas>

    <script>
        // ==========================================
        // 🌟 已連接您的專屬 Render 伺服器
        // ==========================================
        const BACKEND_URL = 'https://aicameraliveprint-back.onrender.com/api/generate-lineart';
        // ==========================================

        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvasElement');
        const ctx = canvas.getContext('2d');
        const captureBtn = document.getElementById('capture-btn');
        const countdownDisplay = document.getElementById('countdown-display');
        
        const mainView = document.getElementById('main-view');
        const loadingView = document.getElementById('loading-view');
        const resultView = document.getElementById('result-view');
        const resultImage = document.getElementById('result-image');
        const orderNumberDisplay = document.getElementById('order-number-display');

        let currentOrderNumber = 25; // 接續您剛剛的 25 號

        // 啟動相機
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 1080 }, height: { ideal: 1080 } } 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("無法存取相機，請確認是否已授權相機權限！");
                console.error(err);
            }
        }

        // 拍照與倒數邏輯
        captureBtn.addEventListener('click', () => {
            captureBtn.style.display = 'none';
            countdownDisplay.style.display = 'block';
            let count = 3;
            countdownDisplay.innerText = count;

            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownDisplay.innerText = count;
                } else {
                    clearInterval(timer);
                    countdownDisplay.style.display = 'none';
                    takePictureAndProcess();
                }
            }, 1000);
        });

        // 擷取畫面並送出給後端
        async function takePictureAndProcess() {
            // 擷取正方形畫面
            canvas.width = 1024;
            canvas.height = 1024;
            
            // 處理鏡像翻轉的畫布繪製
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            
            // 將影片繪製到畫布上 (裁切置中)
            const size = Math.min(video.videoWidth, video.videoHeight);
            const x = (video.videoWidth - size) / 2;
            const y = (video.videoHeight - size) / 2;
            ctx.drawImage(video, x, y, size, size, 0, 0, canvas.width, canvas.height);

            // 轉成 Base64 格式
            const base64Image = canvas.toDataURL('image/jpeg', 0.8);

            // 切換到載入畫面
            mainView.style.display = 'none';
            loadingView.style.display = 'flex';

            try {
                console.log("正在呼叫後端 API...", BACKEND_URL);
                
                // 設定 90 秒的 Timeout (為了容忍 Render 剛開機的冷啟動時間)
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 90000);

                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Image }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (!response.ok) {
                    throw new Error(`伺服器回應錯誤: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.success && data.result) {
                    showResult(data.result);
                } else {
                    throw new Error('後端回傳格式錯誤');
                }

            } catch (error) {
                console.error("❌ 連線後端失敗:", error);
                alert("連線到 AI 伺服器失敗，或是伺服器剛醒來請重試一次！\n錯誤訊息: " + error.message);
                
                // 失敗時，啟動備用的前端陽春濾鏡 (防呆用)
                applyFallbackFilter(base64Image);
            }
        }

        // 顯示最終結果
        function showResult(imgSrc) {
            loadingView.style.display = 'none';
            resultView.style.display = 'flex';
            resultImage.src = imgSrc;
            
            // 號碼牌遞增
            currentOrderNumber++;
            orderNumberDisplay.innerText = currentOrderNumber.toString().padStart(3, '0');
        }

        // 重置機台，準備接待下一組客人
        function resetApp() {
            resultView.style.display = 'none';
            mainView.style.display = 'block';
            captureBtn.style.display = 'block';
        }

        // 備用方案：如果斷網或 Render 沒開，使用前端 Canvas 硬轉黑白
        function applyFallbackFilter(base64Image) {
            console.warn("啟動備用離線濾鏡...");
            const img = new Image();
            img.onload = () => {
                ctx.setTransform(1, 0, 0, 1, 0, 0); // 重置翻轉
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                    const threshold = avg > 120 ? 255 : 0; // 簡易二值化
                    data[i] = data[i + 1] = data[i + 2] = threshold;
                }
                ctx.putImageData(imageData, 0, 0);
                showResult(canvas.toDataURL('image/jpeg'));
            };
            img.src = base64Image;
        }

        // 初始化啟動
        window.onload = startCamera;

    </script>
</body>
</html>
