<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 互動雷雕拍照機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* 防止展場大螢幕被誤觸放大縮小 */
        body {
            touch-action: pan-x pan-y;
            user-select: none; 
            -webkit-user-select: none;
            overflow: hidden; 
        }
        /* 鏡像翻轉相機畫面 */
        .mirror-video {
            transform: scaleX(-1);
        }
        /* 炫彩背景動畫 */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animated-bg {
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        /* 🌟 終極鎖定：相機專用 3:4 直立容器 */
        .camera-box {
            height: 65vh; /* 高度佔螢幕 65% */
            width: calc(65vh * 0.75); /* 寬度永遠是高度的 0.75 倍 (3:4) */
            max-width: 90vw; /* 防止在極窄手機上爆框 */
            max-height: calc(90vw * 1.333); /* 配合窄手機限縮高度 */
            margin: 0 auto;
        }

        /* 🌟 終極鎖定：結果圖專用 1:1 正方容器 */
        .result-box {
            height: 45vh;
            width: 45vh; /* 寬高一模一樣，絕對正方形 */
            max-width: 85vw;
            max-height: 85vw;
            margin: 0 auto;
        }
    </style>
</head>
<body class="bg-black text-white h-screen w-screen animated-bg font-sans">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ⚠️ 請確認您的 Render 後端網址正確
        const API_BASE_URL = "https://aicameraliveprint-back.onrender.com";

        const App = () => {
            const [step, setStep] = useState('home');
            const [taskId, setTaskId] = useState(null);
            const [resultImage, setResultImage] = useState(null);
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const [countdown, setCountdown] = useState(0);

            const startCamera = async () => {
                setStep('camera');
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { 
                            facingMode: "user", 
                            width: { ideal: 1080 }, 
                            height: { ideal: 1920 }
                        },
                        audio: false
                    });
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                    }
                } catch (err) {
                    console.error("相機啟動失敗:", err);
                    alert("請允許相機權限！");
                    setStep('home');
                }
            };

            const stopCamera = () => {
                if (videoRef.current && videoRef.current.srcObject) {
                    const tracks = videoRef.current.srcObject.getTracks();
                    tracks.forEach(track => track.stop());
                }
            };

            const takePhoto = () => {
                if (countdown > 0) return; 
                
                setCountdown(3);
                let count = 3;
                const timer = setInterval(() => {
                    count -= 1;
                    setCountdown(count);
                    if (count === 0) {
                        clearInterval(timer);
                        captureAndUpload();
                    }
                }, 1000);
            };

            const captureAndUpload = async () => {
                const video = videoRef.current;
                const canvas = canvasRef.current;
                const context = canvas.getContext('2d');

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                context.translate(canvas.width, 0);
                context.scale(-1, 1);
                context.drawImage(video, 0, 0, canvas.width, canvas.height);

                const imageData = canvas.toDataURL('image/jpeg', 0.8);
                stopCamera();
                setStep('loading');

                try {
                    const res = await fetch(`${API_BASE_URL}/api/upload`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: imageData })
                    });
                    const data = await res.json();
                    if (data.success) {
                        setTaskId(data.taskId);
                    } else {
                        throw new Error("無法取得號碼牌");
                    }
                } catch (err) {
                    alert("網路異常，請重新嘗試！");
                    setStep('home');
                }
            };

            useEffect(() => {
                let pollingInterval;
                if (step === 'loading' && taskId) {
                    pollingInterval = setInterval(async () => {
                        try {
                            const res = await fetch(`${API_BASE_URL}/api/status/${taskId}`);
                            const data = await res.json();
                            
                            if (data.status === 'completed' && data.resultImage) {
                                setResultImage(data.resultImage);
                                setStep('result');
                                clearInterval(pollingInterval);
                            }
                        } catch (err) {
                            console.error("輪詢失敗", err);
                        }
                    }, 3000); 
                }
                return () => clearInterval(pollingInterval);
            }, [step, taskId]);

            useEffect(() => {
                let timeout;
                if (step === 'result') {
                    timeout = setTimeout(() => {
                        resetToHome();
                    }, 30000);
                }
                return () => clearTimeout(timeout);
            }, [step]);

            const resetToHome = () => {
                setStep('home');
                setTaskId(null);
                setResultImage(null);
                setCountdown(0);
            };

            return (
                <div className="h-full w-full flex flex-col items-center justify-center p-4 relative">
                    
                    {step === 'home' && (
                        <div className="text-center flex flex-col items-center justify-center h-full space-y-12 animate-fade-in">
                            <h1 className="text-5xl md:text-7xl font-extrabold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 drop-shadow-lg">
                                AI 雷雕專屬肖像
                            </h1>
                            <p className="text-2xl md:text-4xl text-gray-300 font-light">
                                化身極簡漫畫風，刻下獨一無二的記憶
                            </p>
                            <button 
                                onClick={startCamera}
                                className="mt-12 bg-white text-black font-bold text-3xl md:text-5xl px-16 py-8 rounded-full shadow-[0_0_40px_rgba(255,255,255,0.4)] active:scale-95 transition-transform"
                            >
                                <i className="fa-solid fa-camera mr-4"></i> 點擊開始拍照
                            </button>
                        </div>
                    )}

                    {step === 'camera' && (
                        <div className="h-full w-full flex flex-col items-center justify-center relative">
                            
                            {/* 🌟 套用絕對比例 CSS 類別 */}
                            <div className="camera-box bg-gray-900 rounded-3xl overflow-hidden shadow-2xl relative border-4 border-gray-700 my-4 flex-shrink-0">
                                <video 
                                    ref={videoRef} 
                                    autoPlay 
                                    playsInline 
                                    muted 
                                    className="absolute inset-0 w-full h-full object-cover mirror-video"
                                />
                                
                                {/* 虛線防呆框也絕對置中 */}
                                <div className="absolute inset-0 flex items-center justify-center pointer-events-none p-6 md:p-10">
                                    <div className="w-full h-full border-4 border-dashed border-white/60 rounded-[40%] flex items-end justify-center pb-8 shadow-[0_0_0_9999px_rgba(0,0,0,0.5)]">
                                        <span className="text-white text-sm md:text-lg font-bold bg-black/60 px-5 py-2 rounded-full shadow-lg">請將臉部對準虛線框</span>
                                    </div>
                                </div>

                                {countdown > 0 && (
                                    <div className="absolute inset-0 flex items-center justify-center bg-black/40 backdrop-blur-sm z-20">
                                        <span className="text-[8rem] md:text-[12rem] font-bold text-white animate-ping">{countdown}</span>
                                    </div>
                                )}
                            </div>

                            <div className="w-full flex items-center justify-center space-x-8 mt-4 flex-shrink-0">
                                <button onClick={() => { stopCamera(); setStep('home'); }} className="bg-gray-700 text-white text-xl md:text-2xl font-bold px-8 py-4 rounded-full hover:bg-gray-600 active:scale-95 transition-transform">
                                    <i className="fa-solid fa-arrow-left"></i> 返回
                                </button>
                                <button 
                                    onClick={takePhoto}
                                    className="bg-gradient-to-r from-cyan-500 to-blue-600 text-white text-2xl md:text-3xl font-bold px-12 py-4 rounded-full shadow-[0_0_30px_rgba(6,182,212,0.5)] active:scale-95 transition-transform"
                                >
                                    <i className="fa-solid fa-camera mr-2"></i> 拍 照
                                </button>
                            </div>
                            <canvas ref={canvasRef} className="hidden"></canvas>
                        </div>
                    )}

                    {step === 'loading' && (
                        <div className="text-center flex flex-col items-center justify-center h-full space-y-8">
                            <div className="relative">
                                <div className="w-32 h-32 md:w-40 md:h-40 border-8 border-gray-700 border-t-cyan-400 rounded-full animate-spin"></div>
                                <i className="fa-solid fa-wand-magic-sparkles absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-3xl md:text-4xl text-cyan-400"></i>
                            </div>
                            <h2 className="text-3xl md:text-5xl font-bold text-white">AI 畫師正在為您作畫...</h2>
                            <p className="text-xl md:text-2xl text-gray-400">（因排隊人數較多，約需等待 1-2 分鐘）</p>
                            {taskId && (
                                <div className="mt-8 bg-gray-800/80 p-6 md:p-8 rounded-2xl border border-gray-600">
                                    <p className="text-lg md:text-xl text-gray-300 mb-2">您的專屬號碼牌</p>
                                    <p className="text-6xl md:text-7xl font-bold text-cyan-400 tracking-widest">#{taskId}</p>
                                </div>
                            )}
                        </div>
                    )}

                    {step === 'result' && (
                        <div className="h-full w-full flex flex-col items-center justify-center space-y-6 animate-fade-in py-8">
                            <h2 className="text-3xl md:text-4xl font-bold text-green-400 text-center">
                                <i className="fa-solid fa-check-circle mr-2"></i> 專屬頭像繪製完成！
                            </h2>
                            <p className="text-lg md:text-xl text-gray-300 text-center mb-2">請截圖或記下號碼，前往雷雕機台取件</p>
                            
                            {/* 🌟 套用絕對正方形 CSS 類別 */}
                            <div className="result-box bg-white rounded-3xl overflow-hidden shadow-[0_0_50px_rgba(255,255,255,0.2)] border-8 border-gray-800 flex items-center justify-center flex-shrink-0">
                                <img src={resultImage} alt="生成結果" className="w-full h-full object-contain" />
                            </div>

                            <div className="bg-gradient-to-r from-gray-800 to-gray-900 px-12 py-4 rounded-3xl border border-gray-600 shadow-2xl flex flex-col items-center flex-shrink-0 mt-4">
                                <p className="text-xl text-gray-400 mb-2">您的取件號碼</p>
                                <p className="text-6xl md:text-7xl font-black text-cyan-400 tracking-tighter">#{taskId}</p>
                            </div>

                            <button onClick={resetToHome} className="text-lg text-gray-400 underline pt-4 active:text-white pb-8">
                                完成並返回首頁 (30秒後自動跳轉)
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
