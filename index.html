<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 AI AWARDS | 客人拍照選圖中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b1329; font-family: -apple-system, sans-serif; overflow: hidden; }
        .polaroid { background: white; padding: 12px 12px 24px 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); border-radius: 4px; transition: all 0.4s ease; cursor: pointer; }
        .polaroid:hover { transform: scale(1.03); box-shadow: 0 20px 45px #00f2ff30; border: 2px solid #00f2ff; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col items-center justify-center p-4">

    <div id="stage-capture" class="w-full max-w-md text-center flex flex-col gap-6">
        <h2 class="text-3xl font-black text-white tracking-widest glow-text">AI 次元頭像拍貼機</h2>
        <div class="w-full aspect-square bg-slate-950 rounded-3xl overflow-hidden border-2 border-slate-800 relative shadow-2xl">
            <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
            <canvas id="canvas" class="hidden w-full h-full object-cover"></canvas>
        </div>
        <button onclick="takePhotoAndUpload()" id="snap-btn" class="w-20 h-20 bg-gradient-to-tr from-cyan-400 to-blue-500 rounded-full mx-auto border-4 border-white shadow-[0_0_25px_rgba(0,242,255,0.5)] active:scale-95 transition flex items-center justify-center"><i class="fa-solid fa-camera text-slate-950 text-2xl"></i></button>
    </div>

    <div id="stage-loading" class="hidden text-center flex flex-col items-center gap-4">
        <div class="w-24 h-24 border-4 border-cyan-400 border-t-transparent rounded-full animate-spin shadow-[0_0_20px_rgba(0,242,255,0.2)]"></div>
        <h3 class="text-xl font-bold tracking-widest text-cyan-400 mt-4">AI 正在捕捉您的五官神韻...</h3>
        <p class="text-xs text-slate-400 font-mono">流水號：<span id="load-task-id">---</span> | 預計等待 6~8 秒</p>
    </div>

    <div id="stage-choice" class="hidden w-full max-w-2xl text-center flex flex-col gap-8">
        <div>
            <span class="text-xs font-mono font-bold text-cyan-400 tracking-widest block mb-1">GENERATION COMPLETE</span>
            <h2 class="text-2xl font-black text-white">您的專屬Q版頭像已繪製完成！</h2>
            <p class="text-xs text-slate-400 mt-1">請點擊您最喜愛的一款花色，即可現場啟動雷雕製程</p>
        </div>
        
        <div class="grid grid-cols-2 gap-6 md:gap-10 px-2">
            <div onclick="selectDesign('A')" class="polaroid">
                <img id="img-style-A" class="w-full aspect-square object-cover rounded-md bg-slate-100" />
                <div class="text-slate-800 font-black text-sm mt-3 tracking-wider">🌟 風格 A 款</div>
            </div>
            <div onclick="selectDesign('B')" class="polaroid">
                <img id="img-style-B" class="w-full aspect-square object-cover rounded-md bg-slate-100" />
                <div class="text-slate-800 font-black text-sm mt-3 tracking-wider">🎨 風格 B 款</div>
            </div>
        </div>
    </div>

    <div id="stage-success" class="hidden text-center flex flex-col items-center gap-4">
        <div class="w-20 h-20 rounded-full bg-emerald-500/10 border-2 border-emerald-400 flex items-center justify-center text-emerald-400 text-3xl animate-bounce"><i class="fa-solid fa-circle-check"></i></div>
        <h2 class="text-2xl font-black text-white mt-2">雷雕發送成功！</h2>
        <p class="text-sm text-slate-400">出票機正在為您列印兌換券<BR>請向工作人員領取您的客製化禮品</p>
        <button onclick="resetToHome()" class="mt-6 bg-slate-800 border border-slate-700 hover:bg-slate-700 text-slate-300 px-6 py-2 rounded-xl text-sm transition">重新拍照</button>
    </div>

    <script>
        const API_BASE_URL = "https://aicameraliveprint-back.onrender.com";
        let activeTaskId = null; let pollingInterval = null;
        const video = document.getElementById('video');

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 1024, height: 1024 } });
                video.srcObject = stream;
            } catch { alert("鏡頭啟動失敗，請確認網頁 HTTPS 權限！"); }
        }

        async function takePhotoAndUpload() {
            const btn = document.getElementById('snap-btn'); btn.disabled = true;
            const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d');
            canvas.width = 1024; canvas.height = 1024;
            ctx.drawImage(video, 0, 0, 1024, 1024);
            const base64Image = canvas.toDataURL('image/jpeg', 0.85);

            document.getElementById('stage-capture').classList.add('hidden');
            document.getElementById('stage-loading').classList.remove('hidden');

            try {
                const res = await fetch(`${API_BASE_URL}/api/upload`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ image: base64Image })
                }).then(r => r.json());
                
                if (res.success) {
                    activeTaskId = res.taskId; document.getElementById('load-task-id').innerText = `#${res.taskId}`;
                    pollingInterval = setInterval(checkAIStatus, 1500);
                }
            } catch { alert("連線失敗！"); resetToHome(); }
        }

        async function checkAIStatus() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/status/${activeTaskId}`).then(r => r.json());
                if (res.success && res.status === 'completed' && res.resultImageA && res.resultImageB) {
                    clearInterval(pollingInterval);
                    document.getElementById('img-style-A').src = res.resultImageA;
                    document.getElementById('img-style-B').src = res.resultImageB;
                    document.getElementById('stage-loading').classList.add('hidden');
                    document.getElementById('stage-choice').classList.remove('hidden');
                }
            } catch (e) {}
        }

        async function selectDesign(choice) {
            try {
                await fetch(`${API_BASE_URL}/api/choice/${activeTaskId}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ choice: choice })
                });
                document.getElementById('stage-choice').classList.add('hidden');
                document.getElementById('stage-success').classList.remove('hidden');
            } catch { alert("傳輸失敗！"); }
        }

        function resetToHome() {
            clearInterval(pollingInterval); activeTaskId = null;
            document.getElementById('stage-loading').classList.add('hidden');
            document.getElementById('stage-choice').classList.add('hidden');
            document.getElementById('stage-success').classList.add('hidden');
            document.getElementById('stage-capture').classList.remove('hidden');
            document.getElementById('snap-btn').disabled = false;
        }

        initCamera();
    </script>
</body>
</html>
