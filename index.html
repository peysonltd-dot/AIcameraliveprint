<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 BEST AI AWARDS | 智慧創新大賞</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;500;900&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --ai-cyan: #00f2ff;
            --ai-pink: #ff00d0;
            --ai-dark: #020617;
        }

        body {
            touch-action: pan-x pan-y;
            user-select: none; 
            -webkit-user-select: none;
            overflow: hidden; 
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--ai-dark);
        }

        /* 深藍色像素方塊動態背景 */
        .cyber-bg {
            background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
            position: relative;
        }
        .cyber-bg::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 0;
        }

        .kv-title {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(to bottom, #fff 30%, var(--ai-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5));
        }

        /* 仿照主視覺內頁的霓虹粉與青色發光漸層條 */
        .glow-bar {
            height: 3px;
            width: 180px;
            background: linear-gradient(90deg, transparent, var(--ai-pink), var(--ai-cyan), transparent);
            box-shadow: 0 0 12px var(--ai-pink), 0 0 20px var(--ai-cyan);
            border-radius: 50%;
        }

        /* 🌟 核心升級：動態相應式內容容器 */
        .content-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* 預設：在 iPad / 平板上完美垂直置中 */
            width: 100%;
            margin-top: 1rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease-in-out;
        }

        /* 🚀 智慧判定：只有在超長直立式大螢幕（高度大於 1100px 且寬高比極度扁窄）下，才自動優化上移，避開視線死角 */
        @media (min-height: 1100px) and (max-aspect-ratio: 10/16) {
            .content-container {
                justify-content: flex-start;
                padding-top: 6rem;
            }
        }

        /* 🌟 核心升級：大幅放大拍照圖框 (動態適配手機、iPad 平板、大螢幕) */
        .camera-container {
            width: 82vw;
            height: 82vw;
            max-width: 400px;
            max-height: 400px;
            position: relative;
            overflow: hidden;
            border-radius: 1.5rem;
            border: 3px solid var(--ai-cyan);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4), inset 0 0 30px rgba(0, 242, 255, 0.2);
            background-color: #000;
            z-index: 10;
            transition: all 0.3s ease-in-out;
        }

        /* 平板 / iPad 與一般中大螢幕 */
        @media (min-width: 640px) and (min-height: 700px) {
            .camera-container {
                width: 75vw;
                height: 75vw;
                max-width: 580px; /* 大幅放大！確保 iPad 呈現大器畫面 */
                max-height: 580px;
            }
        }

        /* 43 吋超大直立螢幕 */
        @media (min-width: 1000px) and (min-height: 1100px) {
            .camera-container {
                width: 80vw;
                height: 80vw;
                max-width: 780px; /* 直立式大螢幕放大極限 */
                max-height: 780px;
            }
        }

        /* 1:1.35 鵝蛋臉導引框 (隨比例自動完美放大) */
        .face-guide {
            width: 55%;
            aspect-ratio: 1 / 1.35; 
            border-radius: 50%;
            border: 3px solid var(--ai-cyan);
            box-shadow: 0 0 20px var(--ai-cyan), 0 0 0 9999px rgba(2, 6, 23, 0.6);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 15;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 5px;
            background: var(--ai-cyan);
            box-shadow: 0 0 20px var(--ai-cyan);
            opacity: 0.7;
            top: 0;
            animation: scan 2.5s linear infinite;
            z-index: 20;
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { top: 100%; opacity: 0; }
        }

        /* Loading 雷達動畫 */
        .radar-spinner {
            position: relative;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 2px dashed rgba(0, 242, 255, 0.5);
            animation: spin 8s linear infinite;
        }
        .radar-spinner::before {
            content: '';
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: var(--ai-cyan);
            border-bottom-color: var(--ai-cyan);
            animation: spin 2s linear infinite reverse;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .text-glow-pulse {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 1; text-shadow: 0 0 20px var(--ai-cyan); }
            50% { opacity: 0.6; text-shadow: 0 0 8px var(--ai-cyan); }
        }

        .btn-cyan {
            background: rgba(0, 242, 255, 0.1);
            border: 2px solid var(--ai-cyan);
            color: var(--ai-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            z-index: 10;
        }
        .btn-cyan:active {
            background: var(--ai-cyan);
            color: #000;
            box-shadow: 0 0 35px var(--ai-cyan);
        }

        /* 警告 / 返回首頁專用紅色調按鈕 */
        .btn-red {
            background: rgba(255, 0, 208, 0.1);
            border: 2px solid var(--ai-pink);
            color: var(--ai-pink);
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(255, 0, 208, 0.2);
            z-index: 10;
        }
        .btn-red:active {
            background: var(--ai-pink);
            color: #000;
            box-shadow: 0 0 35px var(--ai-pink);
        }
    </style>
</head>
<body class="cyber-bg text-white min-h-[100dvh] w-screen flex flex-col">
    <div id="root" class="h-full w-full relative z-10 flex-grow flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const API_BASE_URL = "https://aicameraliveprint-back.onrender.com";

        const LOADING_TEXTS_CH = [
            "啟動視覺神經網路模組",
            "正在萃取臉部幾何特徵",
            "演算極簡線條結構中",
            "套用 AI 大賞專屬模型",
            "即將生成專屬雷雕底圖"
        ];
        const LOADING_TEXTS_EN = [
            "BOOTING NEURAL NETWORK...",
            "EXTRACTING FACIAL FEATURES...",
            "CALCULATING VECTOR LINES...",
            "APPLYING EXCLUSIVE LORA...",
            "FINALIZING IMAGE GENERATION..."
        ];

        const App = () => {
            const [step, setStep] = useState('home');
            const [taskId, setTaskId] = useState(null);
            const [resultImage, setResultImage] = useState(null);
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const [countdown, setCountdown] = useState(0);
            const [textIndex, setTextIndex] = useState(0);
            const pollingRef = useRef(null);
            
            // 智慧出票系統：倒數返回首頁秒數、列印狀態
            const [returnCountdown, setReturnCountdown] = useState(10); // 預設 10 秒自動返回首頁
            const [isPrinting, setIsPrinting] = useState(false);

            const startCamera = async () => {
                setStep('camera');
                try {
                    // 智慧解析度配適：讓不同相機在行動端與 PC 都能完美相容並維持高張數
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
                        audio: false 
                    });
                    
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                        // iOS 安全防禦，強制寫入 playsinline 阻止 Safari 劫持為影片播放器
                        videoRef.current.setAttribute('playsinline', '');
                        videoRef.current.setAttribute('webkit-playsinline', '');
                        videoRef.current.play().catch(e => console.log("Play error:", e));
                    }
                } catch (err) {
                    alert("請允許相機權限才能進行體驗喔！");
                    setStep('home');
                }
            };

            const takePhoto = () => {
                if (countdown > 0) return;
                setCountdown(3);
                let count = 3;
                const timer = setInterval(() => {
                    count -= 1;
                    setCountdown(count);
                    if (count === 0) {
                        clearInterval(timer);
                        capture();
                    }
                }, 1000);
            };

            const capture = async () => {
                const video = videoRef.current;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');

                const vWidth = video.videoWidth;
                const vHeight = video.videoHeight;
                // 智慧中央等比裁切：不論輸入是直式或橫式畫面，皆能裁切成 1:1 正方形
                const size = Math.min(vWidth, vHeight);
                
                canvas.width = size; 
                canvas.height = size;

                // 畫布翻轉，使生成出的照片與照鏡子預覽 100% 一致
                ctx.translate(size, 0); 
                ctx.scale(-1, 1);

                const startX = (vWidth - size) / 2;
                const startY = (vHeight - size) / 2;
                ctx.drawImage(video, startX, startY, size, size, 0, 0, size, size);
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                
                stopMediaStream();
                setStep('loading');
                setTextIndex(0);

                try {
                    const res = await fetch(`${API_BASE_URL}/api/upload`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: dataUrl })
                    });
                    const data = await res.json();
                    if (data.success) {
                        setTaskId(data.taskId);
                    }
                } catch (err) { 
                    console.log("後端未回應，開啟體驗模擬序號");
                    setTimeout(() => { 
                        setTaskId("007"); 
                    }, 1500);
                }
            };

            // 修正後的媒體串流關閉函式：指向 srcObject.getTracks() 進行停止
            const stopMediaStream = () => {
                if (videoRef.current && videoRef.current.srcObject) {
                    videoRef.current.srcObject.getTracks().forEach(t => t.stop());
                }
            };

            const handleCancelAndGoHome = () => {
                if (pollingRef.current) clearInterval(pollingRef.current);
                stopMediaStream();
                setTaskId(null);
                setResultImage(null);
                setStep('home');
            };

            // 智慧出票系統：背景生成隱藏 Iframe 進行熱感應列印的核心函式 (相容 58mm 與 80mm 出票機)
            const triggerPrinter = (id, imgUrl) => {
                setIsPrinting(true);
                // 建立或獲取隱藏的 Iframe
                let iframe = document.getElementById('print-iframe');
                if (!iframe) {
                    iframe = document.createElement('iframe');
                    iframe.id = 'print-iframe';
                    iframe.style.position = 'fixed';
                    iframe.style.right = '0';
                    iframe.style.bottom = '0';
                    iframe.style.width = '0';
                    iframe.style.height = '0';
                    iframe.style.border = '0';
                    document.body.appendChild(iframe);
                }

                const doc = iframe.contentWindow.document;
                doc.open();
                doc.write(`
                    <html>
                    <head>
                        <style>
                            @page { size: 58mm auto; margin: 0mm; }
                            body {
                                font-family: 'Noto Sans TC', sans-serif;
                                width: 52mm;
                                margin: 0 auto;
                                padding: 8px 1px;
                                text-align: center;
                                color: #000;
                                background: #fff;
                            }
                            .title { font-size: 13px; font-weight: 900; margin-bottom: 2px; letter-spacing: 1px; }
                            .subtitle { font-size: 8px; letter-spacing: 1px; margin-bottom: 6px; border-bottom: 1px dashed #000; padding-bottom: 4px; text-transform: uppercase; }
                            .id-title { font-size: 9px; font-weight: bold; margin-top: 4px; color: #333; letter-spacing: 1px; }
                            .id-num { font-size: 32px; font-weight: 900; margin: 0px 0; letter-spacing: 1px; line-height: 1.1; }
                            .ticket-img { width: 44mm; height: 44mm; object-fit: cover; margin: 4px auto; border: 1.5px solid #000; border-radius: 4px; display: block; }
                            .footer-msg { font-size: 8px; line-height: 1.3; margin-top: 6px; border-top: 1px dashed #000; padding-top: 5px; font-weight: bold; }
                            .time { font-size: 6px; color: #666; margin-top: 4px; }
                        </style>
                    </head>
                    <body>
                        <div class="title">智慧創新大賞</div>
                        <div class="subtitle">2026 BEST AI AWARDS</div>
                        <div class="id-title">雷雕領取序號</div>
                        <div class="id-num">#${id}</div>
                        ${imgUrl ? `<img class="ticket-img" src="${imgUrl}" />` : ''}
                        <div class="footer-msg">
                            請憑此票券至雷雕體驗區<br/>
                            領取您的專屬雷雕紀念品！
                        </div>
                        <div class="time">列印時間: ${new Date().toLocaleString('zh-TW')}</div>
                    </body>
                    </html>
                `);
                doc.close();

                // 確保圖片在列印前完全加載
                const ticketImg = doc.querySelector('.ticket-img');
                if (ticketImg) {
                    ticketImg.onload = () => {
                        iframe.contentWindow.focus();
                        iframe.contentWindow.print();
                        setTimeout(() => setIsPrinting(false), 2000);
                    };
                    ticketImg.onerror = () => {
                        iframe.contentWindow.focus();
                        iframe.contentWindow.print();
                        setTimeout(() => setIsPrinting(false), 2000);
                    };
                } else {
                    iframe.contentWindow.focus();
                    iframe.contentWindow.print();
                    setTimeout(() => setIsPrinting(false), 2000);
                }
            };

            useEffect(() => {
                let textInterval;

                if (step === 'loading') {
                    textInterval = setInterval(() => {
                        setTextIndex((prev) => (prev + 1) % LOADING_TEXTS_CH.length);
                    }, 1500);

                    if (taskId) {
                        pollingRef.current = setInterval(async () => {
                            try {
                                const res = await fetch(`${API_BASE_URL}/api/status/${taskId}`);
                                const data = await res.json();
                                if (data.status === 'completed') {
                                    setResultImage(data.resultImage);
                                    setStep('result');
                                    setReturnCountdown(10); // 重置為 10 秒倒數
                                    clearInterval(pollingRef.current);
                                    
                                    // 自動觸發列印實體號碼牌
                                    triggerPrinter(taskId, data.resultImage);
                                }
                            } catch (err) {
                                if (taskId === "007") {
                                    setTimeout(() => {
                                        const mockCanvasUrl = canvasRef.current.toDataURL();
                                        setResultImage(mockCanvasUrl);
                                        setStep('result');
                                        setReturnCountdown(10);
                                        clearInterval(pollingRef.current);
                                        
                                        // 自動觸發列印
                                        triggerPrinter(taskId, mockCanvasUrl);
                                    }, 4000);
                                }
                            }
                        }, 3000);
                    }
                }
                return () => {
                    clearInterval(textInterval);
                    if (pollingRef.current) clearInterval(pollingRef.current);
                };
            }, [step, taskId]);

            // 自動倒數返回首頁邏輯
            useEffect(() => {
                let returnTimer;
                if (step === 'result' && returnCountdown > 0) {
                    returnTimer = setTimeout(() => {
                        setReturnCountdown(prev => prev - 1);
                    }, 1000);
                } else if (step === 'result' && returnCountdown === 0) {
                    handleCancelAndGoHome();
                }
                return () => clearTimeout(returnTimer);
            }, [step, returnCountdown]);

            return (
                <div className="flex flex-col items-center justify-between h-[100dvh] w-full py-8 sm:py-10 px-4 sm:px-6">
                    
                    {/* Header */}
                    <div className="text-center z-10 mt-2 flex flex-col items-center flex-shrink-0 w-full">
                        {/* 替換成您提供的高清原圖 LOGO，並加上霓虹發光特效 */}
                        <img 
                            src="https://img.shoplineapp.com/media/image_clips/6a14557eb36f6eb74d460308/original.png?1779717502=&owner_id=66221c5c384dbb002ec45c18" 
                            alt="2026 BEST AI AWARDS"
                            className="w-[260px] sm:w-[320px] md:w-[420px] h-auto mb-2 sm:mb-3 filter drop-shadow-[0_0_12px_rgba(0,242,255,0.7)] select-none pointer-events-none"
                            onError={(e) => {
                                e.target.onerror = null;
                                e.target.style.display = 'none';
                            }}
                        />
                        
                        <h1 className="kv-title text-4xl sm:text-5xl lg:text-6xl font-black mb-2 sm:mb-3 tracking-widest">智慧創新大賞</h1>
                        <div className="glow-bar"></div>
                    </div>

                    {/* 內容區區塊：使用動態 CSS 類別，在 iPad/平板上完全垂直置中，在 43 吋大螢幕上自動優化上抬 */}
                    <div className="content-container">
                        
                        {/* 狀態 1：首頁 */}
                        {step === 'home' && (
                            <div className="text-center flex flex-col items-center justify-center">
                                {/* 文案：AI 虛擬肖像風格化 */}
                                <p className="text-ai-cyan text-lg sm:text-xl md:text-2xl mb-8 sm:mb-12 tracking-[0.35em] font-light text-glow-pulse">AI 虛擬肖像風格化</p>
                                <button 
                                    onClick={startCamera} 
                                    className="btn-cyan text-2xl sm:text-3xl md:text-4xl font-black px-12 sm:px-16 md:px-20 py-5 sm:py-8 md:py-10 rounded-full border-2 shadow-[0_0_20px_rgba(0,242,255,0.2)]"
                                >
                                    開始體驗 START
                                </button>
                            </div>
                        )}

                        {/* 狀態 2：相機拍攝 */}
                        {step === 'camera' && (
                            <div className="flex flex-col items-center w-full">
                                {/* 拍照圖框：已大幅放大 (iPad 達 580px, 大螢幕達 780px) */}
                                <div className="camera-container relative">
                                    <video 
                                        ref={videoRef} 
                                        autoPlay={true}
                                        playsInline={true}
                                        muted={true}
                                        className="w-full h-full object-cover absolute top-0 left-0" 
                                        style={{ transform: 'rotateY(180deg)', WebkitTransform: 'rotateY(180deg)' }}
                                    />
                                    <div className="face-guide"></div>
                                    
                                    {/* 右上角 HUD 科技計時器 */}
                                    {countdown > 0 && (
                                        <div className="absolute top-4 right-4 sm:top-6 sm:right-6 flex flex-col items-center justify-center w-16 h-16 sm:w-24 sm:h-24 rounded-2xl border-2 border-ai-cyan bg-[#020617]/90 shadow-[0_0_25px_rgba(0,242,255,0.5)] z-30">
                                            <span className="text-[9px] sm:text-[11px] text-ai-cyan font-bold tracking-[0.15em] opacity-80 mb-0.5 sm:mb-1">COUNT</span>
                                            <span className="text-3xl sm:text-5xl font-black text-white font-mono drop-shadow-[0_0_12px_#00f2ff]">{countdown}</span>
                                        </div>
                                    )}
                                </div>
                                
                                {/* 拍照控制按鈕區：🌟 補正 className、並將最大寬度限制鎖定為與上方的相機圖框完全一致 (避免在 iPad 偏左擠壓) */}
                                <div className="mt-6 sm:mt-8 md:mt-10 flex gap-4 md:gap-6 justify-center w-[82vw] sm:w-[75vw] lg:w-[80vw] max-w-[400px] sm:max-w-[580px] lg:max-w-[780px] px-2 flex-shrink-0">
                                    <button onClick={handleCancelAndGoHome} className="btn-cyan flex-1 py-4 md:py-5 rounded-2xl text-base sm:text-lg md:text-xl font-bold">返回首頁</button>
                                    <button onClick={takePhoto} className="btn-cyan flex-[2.5] py-4 md:py-5 rounded-2xl text-xl sm:text-2xl md:text-3xl font-black bg-ai-cyan/25">拍攝照片 PHOTO</button>
                                </div>
                            </div>
                        )}

                        {/* 狀態 3：AI 處理載入中 */}
                        {step === 'loading' && (
                            <div className="flex flex-col items-center justify-center w-full max-w-[800px] z-20">
                                
                                {/* 動態雷達 */}
                                <div className="relative flex items-center justify-center mb-8 sm:mb-10">
                                    <div className="radar-spinner"></div>
                                    <div className="absolute text-ai-cyan text-5xl sm:text-6xl opacity-90"><i className="fa-solid fa-microchip animate-pulse"></i></div>
                                </div>
                                
                                {/* 多行跳動科技文字 */}
                                <div className="h-24 sm:h-28 flex flex-col items-center justify-center text-center px-4 w-full mb-6 sm:mb-8">
                                    <h2 className="text-xl sm:text-2xl md:text-3xl font-black text-white tracking-widest text-glow-pulse mb-3 sm:mb-4">
                                        {LOADING_TEXTS_CH[textIndex]}
                                    </h2>
                                    <p className="text-ai-cyan text-xs sm:text-sm md:text-base font-mono opacity-80 tracking-[0.2em] sm:tracking-[0.25em]">
                                        {LOADING_TEXTS_EN[textIndex]}
                                    </p>
                                </div>

                                {/* 序號卡片上移 */}
                                <div className="w-full flex flex-col items-center gap-6 sm:gap-8">
                                    {taskId && (
                                        <div className="relative overflow-hidden bg-black/55 p-6 sm:p-8 rounded-3xl border-2 border-ai-cyan backdrop-blur-md w-64 sm:w-72 md:w-80 text-center shadow-[0_0_35px_rgba(0,242,255,0.25)]">
                                            <div className="scan-line" style={{animationDuration: '4s'}}></div>
                                            <p className="text-xs sm:text-sm text-gray-400 mb-1 tracking-[0.3em] font-bold">PROGRESS ID</p>
                                            <p className="text-5xl sm:text-6xl md:text-7xl font-black text-ai-cyan font-mono drop-shadow-[0_0_15px_rgba(0,242,255,0.6)]">
                                                #{taskId}
                                            </p>
                                        </div>
                                    )}

                                    <button 
                                        onClick={handleCancelAndGoHome} 
                                        className="btn-red px-8 sm:px-10 py-3 sm:py-4 rounded-xl text-base sm:text-lg font-bold shadow-[0_0_15px_rgba(255,0,208,0.2)]"
                                    >
                                        取消並返回首頁 CANCEL
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* 狀態 4：顯示結果並自動列印 */}
                        {step === 'result' && (
                            <div className="flex flex-col items-center w-full">
                                <div className="camera-container p-2 bg-white/5 mb-4 sm:mb-6">
                                    <img src={resultImage} className="w-full h-full object-cover rounded-2xl" />
                                </div>
                                
                                {/* 自動出票與倒數狀態顯示 */}
                                <div className="bg-ai-cyan/15 border-2 border-ai-cyan p-4 sm:p-6 rounded-3xl text-center mb-6 sm:mb-8 w-full max-w-[800px] shadow-[0_0_30px_rgba(0,242,255,0.15)] flex flex-col gap-2">
                                    <p className="text-gray-300 text-xs sm:text-sm tracking-[0.2em] sm:tracking-[0.25em] font-bold">專屬雷雕領取序號</p>
                                    <p className="text-5xl sm:text-6xl md:text-7xl font-black text-white font-mono drop-shadow-[0_0_10px_#fff]">#{taskId}</p>
                                    
                                    {/* 動態進度條與提示 */}
                                    <div className="mt-3 pt-3 border-t border-cyan-500/20 text-center">
                                        <p className="text-cyan-400 text-xs sm:text-sm font-semibold tracking-wider animate-pulse flex items-center justify-center gap-2">
                                            <i className="fa-solid fa-print"></i>
                                            {isPrinting ? "📟 正在為您列印實體號碼牌..." : "📟 票券已自動印出！請拿取您的票券"}
                                        </p>
                                        <p className="text-gray-400 text-[11px] mt-1.5 font-mono">
                                            {returnCountdown} 秒後自動返回體驗首頁
                                        </p>
                                    </div>
                                </div>
                                
                                {/* 控制按鈕：🌟 補正 className、並將最大寬度限制鎖定為與上方的相機圖框完全一致 */}
                                <div className="flex gap-4 w-[82vw] sm:w-[75vw] lg:w-[80vw] max-w-[400px] sm:max-w-[580px] lg:max-w-[780px]">
                                    <button 
                                        onClick={() => triggerPrinter(taskId, resultImage)} 
                                        className="btn-cyan flex-1 py-4 sm:py-5 rounded-2xl text-base sm:text-lg font-bold flex items-center justify-center gap-2"
                                    >
                                        <i className="fa-solid fa-arrows-rotate"></i>手動補印票券
                                    </button>
                                    <button 
                                        onClick={handleCancelAndGoHome} 
                                        className="btn-cyan flex-[1.5] py-4 sm:py-5 rounded-2xl text-lg sm:text-xl font-black bg-ai-cyan/15"
                                    >
                                        返回首頁 (GO)
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* 將右下角文字精簡為 "2026" */}
                    <div className="w-full flex justify-end items-end px-4 opacity-60 z-10 pb-1 sm:pb-2 flex-shrink-0">
                        <div className="font-bold text-xs sm:text-sm md:text-base font-mono text-ai-cyan tracking-[0.2em] drop-shadow-[0_0_5px_#00f2ff]">
                            2026
                        </div>
                    </div>

                    <canvas ref={canvasRef} className="hidden"></canvas>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
