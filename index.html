<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 BEST AI AWARDS | 智慧創新大賞</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@300;500;900&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --ai-cyan: #00f2ff;
            --ai-dark: #020617;
        }

        body {
            touch-action: pan-x pan-y;
            user-select: none; 
            -webkit-user-select: none;
            overflow: hidden; 
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--ai-dark);
        }

        .cyber-bg {
            background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
            position: relative;
        }
        .cyber-bg::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 0;
        }

        .kv-title {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(to bottom, #fff 30%, var(--ai-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5));
        }

        .camera-container {
            width: 85vw;
            max-width: 450px;
            aspect-ratio: 1 / 1;
            position: relative;
            overflow: hidden;
            border-radius: 1rem;
            border: 2px solid var(--ai-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3), inset 0 0 20px rgba(0, 242, 255, 0.2);
            background-color: #000;
            z-index: 10;
        }

        .face-guide {
            width: 55%;
            aspect-ratio: 1 / 1.35; 
            border-radius: 50%;
            border: 2px solid var(--ai-cyan);
            box-shadow: 0 0 15px var(--ai-cyan), 0 0 0 999px rgba(2, 6, 23, 0.6);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 15;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: var(--ai-cyan);
            box-shadow: 0 0 15px var(--ai-cyan);
            opacity: 0.6;
            top: 0;
            animation: scan 2.5s linear infinite;
            z-index: 20;
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { top: 100%; opacity: 0; }
        }

        .radar-spinner {
            position: relative;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px dashed rgba(0, 242, 255, 0.5);
            animation: spin 8s linear infinite;
        }
        .radar-spinner::before {
            content: '';
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: var(--ai-cyan);
            border-bottom-color: var(--ai-cyan);
            animation: spin 2s linear infinite reverse;
        }
        .text-glow-pulse {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 1; text-shadow: 0 0 15px var(--ai-cyan); }
            50% { opacity: 0.5; text-shadow: 0 0 5px var(--ai-cyan); }
        }

        .btn-cyan {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--ai-cyan);
            color: var(--ai-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
            z-index: 10;
        }
        .btn-cyan:active {
            background: var(--ai-cyan);
            color: #000;
            box-shadow: 0 0 30px var(--ai-cyan);
        }
    </style>
</head>
<body class="cyber-bg text-white min-h-[100dvh] w-screen flex flex-col">
    <div id="root" class="h-full w-full relative z-10 flex-grow flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const API_BASE_URL = "https://aicameraliveprint-back.onrender.com";

        const LOADING_TEXTS_CH = [
            "啟動視覺神經網路模組",
            "正在萃取臉部幾何特徵",
            "演算極簡線條結構中",
            "套用 AI 大賞專屬模型",
            "即將生成專屬雷雕底圖"
        ];
        const LOADING_TEXTS_EN = [
            "BOOTING NEURAL NETWORK...",
            "EXTRACTING FACIAL FEATURES...",
            "CALCULATING VECTOR LINES...",
            "APPLYING EXCLUSIVE LORA...",
            "FINALIZING IMAGE GENERATION..."
        ];

        const App = () => {
            const [step, setStep] = useState('home');
            const [taskId, setTaskId] = useState(null);
            const [resultImage, setResultImage] = useState(null);
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const [countdown, setCountdown] = useState(0);
            const [textIndex, setTextIndex] = useState(0);

            const startCamera = async () => {
                setStep('camera');
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
                        audio: false 
                    });
                    
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                        // 🌟 iOS 終極特效藥 1：強制觸發 play()！
                        // 這樣就能打破 iOS 預設的「暫停」狀態，消滅畫面上的暫停按鈕
                        videoRef.current.play().catch(e => console.log("Play error:", e));
                    }
                } catch (err) {
                    alert("請允許相機權限才能進行體驗喔！");
                    setStep('home');
                }
            };

            const takePhoto = () => {
                if (countdown > 0) return;
                setCountdown(3);
                let count = 3;
                const timer = setInterval(() => {
                    count -= 1;
                    setCountdown(count);
                    if (count === 0) {
                        clearInterval(timer);
                        capture();
                    }
                }, 1000);
            };

            const capture = async () => {
                const video = videoRef.current;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');

                const vWidth = video.videoWidth;
                const vHeight = video.videoHeight;
                const size = Math.min(vWidth, vHeight);
                
                canvas.width = size; 
                canvas.height = size;

                ctx.translate(size, 0); 
                ctx.scale(-1, 1);

                const startX = (vWidth - size) / 2;
                const startY = (vHeight - size) / 2;
                ctx.drawImage(video, startX, startY, size, size, 0, 0, size, size);
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                
                if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
                
                setStep('loading');
                setTextIndex(0);

                try {
                    const res = await fetch(`${API_BASE_URL}/api/upload`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: dataUrl })
                    });
                    const data = await res.json();
                    if (data.success) setTaskId(data.taskId);
                } catch (err) { 
                    console.log("API 未連線，進入模擬測試模式");
                    setTimeout(() => { setTaskId("DEMO-002"); }, 1500);
                }
            };

            useEffect(() => {
                let statusInterval;
                let textInterval;

                if (step === 'loading') {
                    textInterval = setInterval(() => {
                        setTextIndex((prev) => (prev + 1) % LOADING_TEXTS_CH.length);
                    }, 1500);

                    if (taskId) {
                        statusInterval = setInterval(async () => {
                            try {
                                const res = await fetch(`${API_BASE_URL}/api/status/${taskId}`);
                                const data = await res.json();
                                if (data.status === 'completed') {
                                    setResultImage(data.resultImage);
                                    setStep('result');
                                }
                            } catch (err) {
                                if (taskId.startsWith("DEMO")) {
                                    setTimeout(() => {
                                        setResultImage(canvasRef.current.toDataURL());
                                        setStep('result');
                                    }, 4000);
                                }
                            }
                        }, 3000);
                    }
                }
                return () => {
                    clearInterval(statusInterval);
                    clearInterval(textInterval);
                };
            }, [step, taskId]);

            return (
                <div className="flex flex-col items-center justify-between h-[100dvh] w-full py-8 px-4">
                    
                    <div className="text-center z-10 mt-2">
                        <div className="text-ai-cyan text-xs md:text-sm tracking-[0.3em] font-bold mb-1 opacity-80">2026 BEST AI AWARDS</div>
                        <h1 className="kv-title text-4xl md:text-5xl font-black mb-2">智慧創新大賞</h1>
                        <div className="h-1 w-16 bg-ai-cyan mx-auto rounded-full shadow-[0_0_10px_#00f2ff]"></div>
                    </div>

                    <div className="flex-grow flex flex-col items-center justify-center w-full my-4">
                        
                        {step === 'home' && (
                            <div className="text-center animate-pulse">
                                <p className="text-ai-cyan text-lg mb-8 tracking-widest font-light">AI 虛擬肖像雷雕體驗</p>
                                <button onClick={startCamera} className="btn-cyan text-2xl md:text-3xl font-bold px-12 py-6 rounded-full border-2">
                                    開始體驗 START
                                </button>
                            </div>
                        )}

                        {step === 'camera' && (
                            <div className="flex flex-col items-center w-full">
                                <div className="camera-container relative">
                                    {/* 🌟 iOS 終極特效藥 2：明確寫入 autoPlay={true} playsInline={true} */}
                                    {/* 🌟 iOS 終極特效藥 3：改用 rotateY(180deg) 進行 3D 翻轉，iPhone 絕對無法忽視 */}
                                    <video 
                                        ref={videoRef} 
                                        autoPlay={true}
                                        playsInline={true}
                                        muted={true}
                                        className="w-full h-full object-cover absolute top-0 left-0" 
                                        style={{ transform: 'rotateY(180deg)', WebkitTransform: 'rotateY(180deg)' }}
                                    />
                                    <div className="scan-line"></div>
                                    <div className="face-guide"></div>
                                    {countdown > 0 && (
                                        <div className="absolute inset-0 flex items-center justify-center bg-black/40 z-30 backdrop-blur-sm">
                                            <span className="text-[150px] font-bold text-white drop-shadow-[0_0_20px_#00f2ff]">{countdown}</span>
                                        </div>
                                    )}
                                </div>
                                <div className="mt-8 flex gap-4 md:gap-6 justify-center w-full max-w-[450px]">
                                    <button onClick={() => {
                                        if (videoRef.current && videoRef.current.srcObject) {
                                            videoRef.current.srcObject.getTracks().forEach(t => t.stop());
                                        }
                                        setStep('home');
                                    }} className="btn-cyan flex-1 py-4 rounded-xl text-lg">返回</button>
                                    <button onClick={takePhoto} className="btn-cyan flex-[2] py-4 rounded-xl text-2xl font-bold bg-ai-cyan/20">拍攝 PHOTO</button>
                                </div>
                            </div>
                        )}

                        {step === 'loading' && (
                            <div className="flex flex-col items-center justify-start w-full h-full pt-4 md:pt-10 z-20">
                                
                                <div className="relative flex items-center justify-center mb-8 mt-4">
                                    <div className="radar-spinner"></div>
                                    <div className="absolute text-ai-cyan text-5xl opacity-90"><i className="fa-solid fa-microchip"></i></div>
                                </div>
                                
                                <div className="h-24 flex flex-col items-center justify-center text-center px-4 w-full">
                                    <h2 className="text-xl md:text-2xl font-bold text-white tracking-widest text-glow-pulse mb-3 transition-opacity duration-300">
                                        {LOADING_TEXTS_CH[textIndex]}
                                    </h2>
                                    <p className="text-ai-cyan text-[10px] md:text-xs font-mono opacity-70 tracking-widest transition-opacity duration-300">
                                        {LOADING_TEXTS_EN[textIndex]}
                                    </p>
                                </div>

                                <div className="mt-auto mb-10 w-full flex justify-center">
                                    {taskId && (
                                        <div className="relative overflow-hidden bg-black/40 p-6 md:p-8 rounded-2xl border border-ai-cyan/50 backdrop-blur-md w-64 md:w-72 text-center shadow-[0_0_25px_rgba(0,242,255,0.15)]">
                                            <div className="scan-line" style={{animationDuration: '4s'}}></div>
                                            <p className="text-xs text-gray-400 mb-1 tracking-[0.2em]">PROGRESS ID</p>
                                            <p className="text-5xl md:text-6xl font-black text-ai-cyan font-mono drop-shadow-[0_0_10px_rgba(0,242,255,0.5)]">
                                                #{taskId}
                                            </p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {step === 'result' && (
                            <div className="flex flex-col items-center w-full">
                                <div className="camera-container p-1 bg-white/5 mb-6">
                                    <img src={resultImage} className="w-full h-full object-cover rounded-xl" />
                                </div>
                                <div className="bg-ai-cyan/10 border border-ai-cyan p-4 rounded-2xl text-center mb-6 w-full max-w-[450px] shadow-[0_0_20px_rgba(0,242,255,0.1)]">
                                    <p className="text-gray-400 text-xs tracking-widest mb-1">專屬雷雕領取序號</p>
                                    <p className="text-5xl font-black text-white font-mono">#{taskId}</p>
                                </div>
                                <button onClick={() => setStep('home')} className="btn-cyan px-10 py-4 rounded-full text-lg font-bold w-full max-w-[450px]">
                                    完成並返回首頁
                                </button>
                            </div>
                        )}
                    </div>

                    <div className="w-full flex justify-between items-end px-2 opacity-50 z-10 pb-2">
                        <div className="text-[9px] md:text-[10px] tracking-tighter leading-relaxed">
                            指導單位：經濟部 <br />
                            主辦單位：經濟部產業技術司
                        </div>
                        <div className="font-bold text-[9px] md:text-xs font-mono">2026 AI INNOVATION</div>
                    </div>

                    <canvas ref={canvasRef} className="hidden"></canvas>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
