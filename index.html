<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 互動雷雕拍照機</title>
    <!-- 使用 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* 防止展場大螢幕被誤觸放大縮小 */
        body {
            touch-action: pan-x pan-y;
            user-select: none; 
            -webkit-user-select: none;
            overflow: hidden; 
        }
        /* 鏡像翻轉相機畫面 */
        .mirror-video {
            transform: scaleX(-1);
        }
        /* 炫彩背景動畫 */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animated-bg {
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        /* =========================================
           🌟 終極鎖定 CSS (無視手機型號，絕對不變形)
           ========================================= */
        
        /* 1. 相機外框：改為 1:1 絕對正方形 */
        .camera-container {
            width: 85vw;
            max-width: 450px; /* 放寬限制，讓正方形畫面更大方 */
            aspect-ratio: 1 / 1;
            position: relative;
            overflow: hidden;
            border-radius: 1.5rem;
            border: 4px solid #374151;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            background-color: #111827;
        }

        /* 2. 人臉導引框：永遠保持 1:1.35 的完美鵝蛋臉 */
        .face-guide {
            width: 50%; /* 縮小到 50%，強迫客人把手機拿遠！ */
            aspect-ratio: 1 / 1.35; 
            border-radius: 50%;
            border: 4px dashed rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.55); /* 周圍加上半透明黑底遮罩 */
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%); /* 絕對置中 */
            pointer-events: none;
        }

        /* 3. 提示文字：獨立定位，不影響框線形狀 */
        .face-guide-text {
            position: absolute;
            bottom: -45px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            background-color: rgba(0, 0, 0, 0.75);
            padding: 8px 16px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            backdrop-filter: blur(4px);
        }

        /* 4. 結果圖外框：永遠保持 1:1 絕對正方形 */
        .result-container {
            width: 85vw;
            max-width: 350px;
            aspect-ratio: 1 / 1;
            background-color: white;
            border-radius: 1.5rem;
            border: 8px solid #1f2937;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
    </style>
</head>
<body class="bg-black text-white min-h-[100dvh] w-screen animated-bg font-sans overflow-hidden">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ⚠️ 請確認您的 Render 後端網址正確
        const API_BASE_URL = "https://aicameraliveprint-back.onrender.com";

        const App = () => {
            const [step, setStep] = useState('home');
            const [taskId, setTaskId] = useState(null);
            const [resultImage, setResultImage] = useState(null);
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const [countdown, setCountdown] = useState(0);

            const startCamera = async () => {
                setStep('camera');
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { 
                            facingMode: "user", 
                            width: { ideal: 1280 }, /* 請求標準橫式高畫質即可 */
                            height: { ideal: 720 }
                        },
                        audio: false
                    });
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                    }
                } catch (err) {
                    console.error("相機啟動失敗:", err);
                    alert("請允許相機權限！");
                    setStep('home');
                }
            };

            const stopCamera = () => {
                if (videoRef.current && videoRef.current.srcObject) {
                    const tracks = videoRef.current.srcObject.getTracks();
                    tracks.forEach(track => track.stop());
                }
            };

            const takePhoto = () => {
                if (countdown > 0) return; 
                
                setCountdown(3);
                let count = 3;
                const timer = setInterval(() => {
                    count -= 1;
                    setCountdown(count);
                    if (count === 0) {
                        clearInterval(timer);
                        captureAndUpload();
                    }
                }, 1000);
            };

            const captureAndUpload = async () => {
                const video = videoRef.current;
                const canvas = canvasRef.current;
                const context = canvas.getContext('2d');

                // --- 修改為 1:1 完美置中裁切邏輯 ---
                // 找出畫面的短邊，裁切成完美的正方形
                const size = Math.min(video.videoWidth, video.videoHeight);
                canvas.width = size;
                canvas.height = size;
                
                // 計算置中裁切的起始座標 (X, Y)
                const startX = (video.videoWidth - size) / 2;
                const startY = (video.videoHeight - size) / 2;

                // 鏡像翻轉
                context.translate(canvas.width, 0);
                context.scale(-1, 1);
                
                // drawImage: 擷取視訊原始畫面「正中間」的正方形，畫到 Canvas 上
                context.drawImage(video, startX, startY, size, size, 0, 0, size, size);

                const imageData = canvas.toDataURL('image/jpeg', 0.8);
                stopCamera();
                setStep('loading');

                try {
                    const res = await fetch(`${API_BASE_URL}/api/upload`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: imageData })
                    });
                    const data = await res.json();
                    if (data.success) {
                        setTaskId(data.taskId);
                    } else {
                        throw new Error("無法取得號碼牌");
                    }
                } catch (err) {
                    alert("網路異常，請重新嘗試！");
                    setStep('home');
                }
            };

            useEffect(() => {
                let pollingInterval;
                if (step === 'loading' && taskId) {
                    pollingInterval = setInterval(async () => {
                        try {
                            const res = await fetch(`${API_BASE_URL}/api/status/${taskId}`);
                            const data = await res.json();
                            
                            if (data.status === 'completed' && data.resultImage) {
                                setResultImage(data.resultImage);
                                setStep('result');
                                clearInterval(pollingInterval);
                            }
                        } catch (err) {
                            console.error("輪詢失敗", err);
                        }
                    }, 3000); 
                }
                return () => clearInterval(pollingInterval);
            }, [step, taskId]);

            useEffect(() => {
                let timeout;
                if (step === 'result') {
                    timeout = setTimeout(() => {
                        resetToHome();
                    }, 30000);
                }
                return () => clearTimeout(timeout);
            }, [step]);

            const resetToHome = () => {
                setStep('home');
                setTaskId(null);
                setResultImage(null);
                setCountdown(0);
            };

            return (
                <div className="h-full min-h-[100dvh] w-full flex flex-col items-center justify-center p-4 relative pb-10">
                    
                    {/* 步驟 1：首頁 */}
                    {step === 'home' && (
                        <div className="text-center flex flex-col items-center justify-center h-full space-y-12 animate-fade-in">
                            <h1 className="text-4xl md:text-7xl font-extrabold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 drop-shadow-lg">
                                AI 雷雕專屬肖像
                            </h1>
                            <p className="text-xl md:text-4xl text-gray-300 font-light">
                                化身極簡漫畫風，刻下獨一無二的記憶
                            </p>
                            <button 
                                onClick={startCamera}
                                className="mt-12 bg-white text-black font-bold text-2xl md:text-5xl px-12 py-6 md:px-16 md:py-8 rounded-full shadow-[0_0_40px_rgba(255,255,255,0.4)] active:scale-95 transition-transform"
                            >
                                <i className="fa-solid fa-camera mr-4"></i> 開始拍照
                            </button>
                        </div>
                    )}

                    {/* 步驟 2：相機畫面 */}
                    {step === 'camera' && (
                        <div className="h-full w-full flex flex-col items-center justify-center relative">
                            
                            {/* 🌟 套用嚴格綁定的 CSS 類別 */}
                            <div className="camera-container mb-6">
                                <video 
                                    ref={videoRef} 
                                    autoPlay 
                                    playsInline 
                                    muted 
                                    className="absolute inset-0 w-full h-full object-cover mirror-video"
                                />
                                
                                {/* 🌟 完美鵝蛋臉導引框 */}
                                <div className="face-guide">
                                    <div className="face-guide-text">請將臉部對準虛線框</div>
                                </div>

                                {/* 倒數計時 */}
                                {countdown > 0 && (
                                    <div className="absolute inset-0 flex items-center justify-center z-20">
                                        <span className="text-[12rem] md:text-[14rem] font-bold text-white drop-shadow-[0_0_30px_rgba(0,0,0,1)] animate-ping">{countdown}</span>
                                    </div>
                                )}
                            </div>

                            {/* 控制按鈕 */}
                            <div className="w-[85vw] max-w-[380px] flex items-center justify-between flex-shrink-0">
                                <button onClick={() => { stopCamera(); setStep('home'); }} className="bg-gray-700 text-white text-xl font-bold px-8 py-5 rounded-full hover:bg-gray-600 active:scale-95 transition-transform shadow-lg">
                                    <i className="fa-solid fa-arrow-left"></i> 返回
                                </button>
                                <button 
                                    onClick={takePhoto}
                                    className="bg-gradient-to-r from-cyan-500 to-blue-600 text-white text-2xl font-bold px-12 py-5 rounded-full shadow-[0_0_30px_rgba(6,182,212,0.6)] active:scale-95 transition-transform"
                                >
                                    <i className="fa-solid fa-camera mr-2"></i> 拍 照
                                </button>
                            </div>
                            <canvas ref={canvasRef} className="hidden"></canvas>
                        </div>
                    )}

                    {/* 步驟 3：人工處理等待畫面 */}
                    {step === 'loading' && (
                        <div className="text-center flex flex-col items-center justify-center h-full space-y-8">
                            <div className="relative">
                                <div className="w-28 h-28 md:w-40 md:h-40 border-8 border-gray-700 border-t-cyan-400 rounded-full animate-spin"></div>
                                <i className="fa-solid fa-wand-magic-sparkles absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-3xl md:text-4xl text-cyan-400"></i>
                            </div>
                            <h2 className="text-3xl md:text-5xl font-bold text-white">AI 畫師正在為您作畫...</h2>
                            <p className="text-lg md:text-2xl text-gray-400">（因排隊人數較多，約需等待 1-2 分鐘）</p>
                            {taskId && (
                                <div className="mt-6 bg-gray-800/80 p-6 md:p-8 rounded-2xl border border-gray-600 shadow-xl">
                                    <p className="text-md md:text-xl text-gray-300 mb-2">您的專屬號碼牌</p>
                                    <p className="text-6xl md:text-7xl font-bold text-cyan-400 tracking-widest">#{taskId}</p>
                                </div>
                            )}
                        </div>
                    )}

                    {/* 步驟 4：結果與取件序號 */}
                    {step === 'result' && (
                        <div className="h-full w-full flex flex-col items-center justify-center space-y-6 animate-fade-in py-4">
                            <h2 className="text-2xl md:text-4xl font-bold text-green-400 text-center">
                                <i className="fa-solid fa-check-circle mr-2"></i> 專屬頭像繪製完成！
                            </h2>
                            <p className="text-md md:text-xl text-gray-300 text-center mb-2">請截圖或記下號碼，前往雷雕機台取件</p>
                            
                            {/* 🌟 確保雷雕結果圖一定是 1:1 正方形 */}
                            <div className="result-container shadow-[0_0_50px_rgba(255,255,255,0.2)]">
                                <img src={resultImage} alt="生成結果" className="w-full h-full object-contain" />
                            </div>

                            <div className="bg-gradient-to-r from-gray-800 to-gray-900 px-12 py-5 rounded-3xl border border-gray-600 shadow-2xl flex flex-col items-center flex-shrink-0 mt-4">
                                <p className="text-lg text-gray-400 mb-2">您的取件號碼</p>
                                <p className="text-6xl font-black text-cyan-400 tracking-tighter">#{taskId}</p>
                            </div>

                            <button onClick={resetToHome} className="text-md text-gray-400 underline pt-4 active:text-white pb-4">
                                完成並返回首頁 (30秒後自動跳轉)
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
